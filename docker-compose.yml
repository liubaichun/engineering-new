version: '3.8'

services:
  web:
    build: .
    ports:
      - "8001:8080"
    environment:
      - POSTGRES_DB=engineering
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=10.3.0.10
      - POSTGRES_PORT=5432
      - DEBUG=True
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    command: gunicorn --bind :8080 --workers 2 config.wsgi:application
