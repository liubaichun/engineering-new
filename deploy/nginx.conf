# 企业管理系统 - Nginx 配置模板
# 保存到 /etc/nginx/sites-available/engineering.conf
# 然后软链接到 /etc/nginx/sites-enabled/engineering.conf
#
# 验证配置: sudo nginx -t
# 重载配置: sudo nginx -s reload

upstream engineering_app {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name 43.156.139.37;

    # 强制跳转到 HTTPS（生产环境启用）
    # return 301 https://$server_name$request_uri;

    client_max_body_size 100M;

    access_log /var/log/nginx/engineering_access.log;
    error_log  /var/log/nginx/engineering_error.log;

    location /static/ {
        alias /root/engineering-new/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /root/engineering-new/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://engineering_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

