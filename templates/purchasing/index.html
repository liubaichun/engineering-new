{% extends "base.html" %}

{% block title %}采购管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
iframe.tab-iframe { width: 100% !important; border: none; background: transparent; display: block; }
</style>
{% endblock %}

{% block content %}
<ul class="nav nav-tabs mb-4" id="purchasingTab" role="tablist">
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'requests' or not active_tab %} active{% endif %}" href="#" onclick="showTab('requests');return false;">
            <i class="bi bi-card-list me-1"></i>采购申请
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'orders' %} active{% endif %}" href="#" onclick="showTab('orders');return false;">
            <i class="bi bi-file-earming-text me-1"></i>采购订单
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'receives' %} active{% endif %}" href="#" onclick="showTab('receives');return false;">
            <i class="bi bi-box-seam me-1"></i>采购入库
        </a>
    </li>
</ul>

<div class="tab-content" style="width:100%; margin:0 -32px;">
    <div id="requests" style="display:{% if active_tab == 'requests' or not active_tab %}block{% else %}none{% endif %};">
        <iframe src="/purchasing/requests/" class="tab-iframe" id="frame-requests" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="orders" style="display:{% if active_tab == 'orders' %}block{% else %}none{% endif %};">
        <iframe src="/purchasing/orders/" class="tab-iframe" id="frame-orders" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="receives" style="display:{% if active_tab == 'receives' %}block{% else %}none{% endif %};">
        <iframe src="/purchasing/receives/" class="tab-iframe" id="frame-receives" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
</div>

<script>
function showTab(tab) {
    var tabs = ['requests','orders','receives'];
    tabs.forEach(function(t) {
        var div = document.getElementById(t);
        var link = document.querySelector('#purchasingTab .nav-link[onclick*="'+t+'"]');
        if (t === tab) {
            div.style.display = 'block';
            if (link) link.classList.add('active');
        } else {
            div.style.display = 'none';
            if (link) link.classList.remove('active');
        }
    });
}
function resizeIframe(iframe) {
    try {
        var h = iframe.contentWindow.document.body.scrollHeight;
        if (h > 0) iframe.style.height = Math.max(h + 50, 600) + 'px';
    } catch(e) {}
}
</script>
{% endblock %}
