<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采购申请管理</title>
<link href="/static/bootstrap-5.3.0.min.css" rel="stylesheet">
<link href="/static/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="/static/bootstrap-5.3.0.bundle.min.js"></script>
<script src="/static/axios.min.js"></script>
<style>
.card-stat { border-left: 4px solid #0d6efd; }
.card-stat2 { border-left: 4px solid #198754; }
.card-stat3 { border-left: 4px solid #ffc107; }
.card-stat4 { border-left: 4px solid #dc3545; }
.stat-num { font-size:1.6rem; font-weight:700; }
.table-actions .btn { padding: 2px 8px; font-size: 12px; }
.badge-draft { background:#6c757d; }
.badge-submitted { background:#0d6efd; }
.badge-approved { background:#198754; }
.badge-rejected { background:#dc3545; }
.badge-closed { background:#adb5bd; }
.badge-partially { background:#fd7e14; }
.modal-wide { max-width: 800px; }
.table-responsive { font-size: 14px; }
</style>
</head>
<body>
{% include 'base.html' %}
<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-cart-plus"></i> 采购申请管理</h4>
    <button class="btn btn-primary btn-sm" onclick="showCreateModal()">
      <i class="bi bi-plus-lg"></i> 新建申请
    </button>
  </div>

  <!-- 统计卡片 -->
  <div class="row g-3 mb-3" id="statsRow">
    <div class="col-md-2">
      <div class="card card-stat h-100">
        <div class="card-body py-2">
          <div class="text-muted small">全部申请</div>
          <div class="stat-num text-primary" id="stat-total">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card card-stat2 h-100">
        <div class="card-body py-2">
          <div class="text-muted small">已审批</div>
          <div class="stat-num text-success" id="stat-approved">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card card-stat3 h-100">
        <div class="card-body py-2">
          <div class="text-muted small">待提交</div>
          <div class="stat-num text-warning" id="stat-draft">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card card-stat4 h-100">
        <div class="card-body py-2">
          <div class="text-muted small">已驳回</div>
          <div class="stat-num text-danger" id="stat-rejected">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body py-2">
          <div class="text-muted small">本月预估总额</div>
          <div class="stat-num text-dark" id="stat-amount">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 搜索过滤 -->
  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="申请单号/标题...">
        </div>
        <div class="col-md-2">
          <select class="form-select form-select-sm" id="filterStatus">
            <option value="">全部状态</option>
            <option value="draft">草稿</option>
            <option value="submitted">已提交</option>
            <option value="approved">已审批</option>
            <option value="rejected">已驳回</option>
            <option value="closed">已关闭</option>
            <option value="partially_ordered">部分下单</option>
            <option value="ordered">已完全下单</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select form-select-sm" id="filterType">
            <option value="">全部类型</option>
            <option value="project">项目采购</option>
            <option value="inventory">库存补货</option>
            <option value="asset">资产采购</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-primary btn-sm w-100" onclick="loadData(1)">
            <i class="bi bi-search"></i> 搜索
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 列表 -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>申请单号</th>
              <th>标题</th>
              <th>类型</th>
              <th>申请人</th>
              <th>部门</th>
              <th>关联项目</th>
              <th>预估金额</th>
              <th>状态</th>
              <th>期望日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="paginationArea" class="d-flex justify-content-center mt-3"></div>
    </div>
  </div>
</div>

<!-- 新建/编辑弹窗 -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-wide">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">新建采购申请</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="formId">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">申请单号</label>
            <input type="text" class="form-control" id="f-request_no" placeholder="自动生成" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">采购类型 <span class="text-danger">*</span></label>
            <select class="form-select" id="f-request_type" required>
              <option value="inventory">库存补货</option>
              <option value="project">项目采购</option>
              <option value="asset">资产采购</option>
            </select>
          </div>
          <div class="col-md-8">
            <label class="form-label">申请标题 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="f-title" required placeholder="简要描述采购内容">
          </div>
          <div class="col-md-4">
            <label class="form-label">期望到货日期</label>
            <input type="date" class="form-control" id="f-expected_date">
          </div>
          <div class="col-md-6">
            <label class="form-label">申请人 <span class="text-danger">*</span></label>
            <select class="form-select" id="f-applicant" required>
              <option value="">请选择</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">关联项目</label>
            <select class="form-select" id="f-project">
              <option value="">无</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">部门</label>
            <input type="text" class="form-control" id="f-department" placeholder="所属部门">
          </div>
          <div class="col-12">
            <label class="form-label">申购理由</label>
            <textarea class="form-control" id="f-reason" rows="2" placeholder="说明采购原因"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label">备注</label>
            <textarea class="form-control" id="f-remark" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveForm()">
          <i class="bi bi-check-lg"></i> 保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-wide">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">申请详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailContent"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/purchasing/requests/';
const API_STATS = '/api/purchasing/requests/summary/';
const API_ITEM = '/api/purchasing/request-items/';
const API_ORDER = '/api/purchasing/orders/';
let modal, detailModal;
let currentPage = 1;
let currentObj = null;

document.addEventListener('DOMContentLoaded', function() {
  modal = new bootstrap.Modal(document.getElementById('formModal'));
  detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
  loadEmployees();
  loadProjects();
  loadData(1);
  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') loadData(1);
  });
  document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
  document.getElementById('filterType').addEventListener('change', () => loadData(1));
});

async function loadEmployees() {
  try {
    const r = await axios.get('/api/finance/employees/', { params: { page_size: 500 } });
    const sel = document.getElementById('f-applicant');
    (r.data.results || r.data).forEach(function(emp) {
      sel.add(new Option(emp.name, emp.id));
    });
  } catch(e) { console.warn('employees load failed', e); }
}

async function loadProjects() {
  try {
    const r = await axios.get('/api/tasks/projects/', { params: { page_size: 500 } });
    const sel = document.getElementById('f-project');
    (r.data.results || r.data).forEach(function(p) {
      sel.add(new Option(p.name, p.id));
    });
  } catch(e) { console.warn('projects load failed', e); }
}

async function loadData(page) {
  currentPage = page;
  const params = { page: page, page_size: 20 };
  const s = document.getElementById('searchInput').value.trim();
  if (s) params.search = s;
  const st = document.getElementById('filterStatus').value;
  if (st) params.status = st;
  const rt = document.getElementById('filterType').value;
  if (rt) params.request_type = rt;
  try {
    const r = await axios.get(API, { params: params });
    renderTable(r.data.results || r.data);
    renderPagination(r.data);
    updateStats();
  } catch(e) { console.error(e); }
}

async function updateStats() {
  try {
    const r = await axios.get(API_STATS);
    const d = r.data;
    document.getElementById('stat-total').textContent = d.total_count || 0;
    document.getElementById('stat-amount').textContent = d.total_amount > 0 ? '¥'+d.total_amount.toLocaleString() : '—';
    const byStatus = {};
    (d.by_status || []).forEach(s => { byStatus[s.status] = s.count; });
    document.getElementById('stat-draft').textContent = byStatus['draft'] || 0;
    document.getElementById('stat-approved').textContent = byStatus['approved'] || 0;
    document.getElementById('stat-rejected').textContent = byStatus['rejected'] || 0;
  } catch(e) {}
}

function statusBadge(s) {
  const m = { draft: '草稿', submitted: '已提交', approved: '已审批', partially_ordered: '部分下单',
               ordered: '已下单', closed: '已关闭', rejected: '已驳回' };
  const cls = { draft: 'badge-draft', submitted: 'badge-submitted', approved: 'badge-approved',
                rejected: 'badge-rejected', closed: 'badge-closed', partially_ordered: 'badge-partially', ordered: 'badge-submitted' };
  return `<span class="badge ${cls[s] || 'badge-draft'}">${m[s] || s}</span>`;
}

function typeBadge(t) {
  const m = { project: '项目采购', inventory: '库存补货', asset: '资产采购' };
  return `<span class="badge bg-info">${m[t] || t}</span>`;
}

function renderTable(data) {
  const tb = document.getElementById('tableBody');
  if (!data || data.length === 0) {
    tb.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">暂无数据</td></tr>';
    return;
  }
  tb.innerHTML = data.map(function(r) {
    return `<tr>
      <td><a href="javascript:void(0)" onclick="showDetail(${r.id})">${r.request_no}</a></td>
      <td>${r.title}</td>
      <td>${typeBadge(r.request_type)}</td>
      <td>${r.applicant_name || '—'}</td>
      <td>${r.department || '—'}</td>
      <td>${r.project_name || '—'}</td>
      <td class="text-end fw-semibold">${r.total_amount > 0 ? '¥'+r.total_amount.toLocaleString() : '—'}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${r.expected_date || '—'}</td>
      <td class="table-actions">
        ${actionButtons(r)}
      </td>
    </tr>`;
  }).join('');
}

function actionButtons(r) {
  let html = `<button class="btn btn-outline-primary btn-sm" onclick="showDetail(${r.id})">查看</button> `;
  if (r.status === 'draft' || r.status === 'rejected') {
    html += `<button class="btn btn-outline-secondary btn-sm" onclick="editItem(${r.id})">编辑</button> `;
    html += `<button class="btn btn-success btn-sm" onclick="doAction(${r.id},'submit')">提交</button> `;
  }
  if (r.status === 'submitted') {
    html += `<button class="btn btn-primary btn-sm" onclick="doAction(${r.id},'approve')">审批</button> `;
    html += `<button class="btn btn-danger btn-sm" onclick="doAction(${r.id},'reject')">驳回</button> `;
  }
  if (r.status !== 'closed' && r.status !== 'ordered') {
    html += `<button class="btn btn-outline-dark btn-sm" onclick="doAction(${r.id},'close')">关闭</button> `;
  }
  return html;
}

function renderPagination(data) {
  if (!data.count) return;
  const total = Math.ceil(data.count / data.page_size);
  const cur = data.current_page || 1;
  if (total <= 1) return;
  let html = '<ul class="pagination pagination-sm mb-0">';
  html += `<li class="page-item ${cur<=1?'disabled':''}"><a class="page-link" href="javascript:loadData(${cur-1})">&laquo;</a></li>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= cur - 2 && i <= cur + 2)) {
      html += `<li class="page-item ${i===cur?'active':''}"><a class="page-link" href="javascript:loadData(${i})">${i}</a></li>`;
    } else if (i === cur - 3 || i === cur + 3) {
      html += '<li class="page-item disabled"><span class="page-link">…</span></li>';
    }
  }
  html += `<li class="page-item ${cur>=total?'disabled':''}"><a class="page-link" href="javascript:loadData(${cur+1})">&raquo;</a></li>`;
  html += '</ul>';
  document.getElementById('paginationArea').innerHTML = html;
}

function showCreateModal() {
  currentObj = null;
  document.getElementById('modalTitle').textContent = '新建采购申请';
  document.getElementById('formId').value = '';
  document.getElementById('f-request_no').value = '自动生成';
  document.getElementById('f-title').value = '';
  document.getElementById('f-request_type').value = 'inventory';
  document.getElementById('f-applicant').value = '';
  document.getElementById('f-project').value = '';
  document.getElementById('f-department').value = '';
  document.getElementById('f-expected_date').value = '';
  document.getElementById('f-reason').value = '';
  document.getElementById('f-remark').value = '';
  modal.show();
}

async function editItem(id) {
  try {
    const r = await axios.get(API + id + '/');
    const d = r.data;
    currentObj = d;
    document.getElementById('modalTitle').textContent = '编辑采购申请';
    document.getElementById('formId').value = d.id;
    document.getElementById('f-request_no').value = d.request_no;
    document.getElementById('f-title').value = d.title;
    document.getElementById('f-request_type').value = d.request_type;
    document.getElementById('f-applicant').value = d.applicant;
    document.getElementById('f-project').value = d.project || '';
    document.getElementById('f-department').value = d.department || '';
    document.getElementById('f-expected_date').value = d.expected_date || '';
    document.getElementById('f-reason').value = d.reason || '';
    document.getElementById('f-remark').value = d.remark || '';
    modal.show();
  } catch(e) { alert('加载失败'); }
}

async function saveForm() {
  const id = document.getElementById('formId').value;
  const payload = {
    title: document.getElementById('f-title').value,
    request_type: document.getElementById('f-request_type').value,
    applicant: parseInt(document.getElementById('f-applicant').value),
    project: parseInt(document.getElementById('f-project').value) || null,
    department: document.getElementById('f-department').value,
    expected_date: document.getElementById('f-expected_date').value || null,
    reason: document.getElementById('f-reason').value,
    remark: document.getElementById('f-remark').value,
  };
  try {
    if (id) {
      await axios.patch(API + id + '/', payload);
    } else {
      await axios.post(API, payload);
    }
    modal.hide();
    loadData(currentPage);
  } catch(e) {
    alert('保存失败: ' + (e.response?.data?.detail || e.message));
  }
}

async function showDetail(id) {
  try {
    const r = await axios.get(API + id + '/');
    const d = r.data;
    document.getElementById('detailContent').innerHTML = `
      <div class="row">
        <div class="col-md-6">
          <dl class="row mb-2">
            <dt class="col-4 text-muted">申请单号</dt><dd class="col-8">${d.request_no}</dd>
            <dt class="col-4 text-muted">标题</dt><dd class="col-8">${d.title}</dd>
            <dt class="col-4 text-muted">类型</dt><dd class="col-8">${typeBadge(d.request_type)}</dd>
            <dt class="col-4 text-muted">申请人</dt><dd class="col-8">${d.applicant_name}</dd>
            <dt class="col-4 text-muted">部门</dt><dd class="col-8">${d.department || '—'}</dd>
            <dt class="col-4 text-muted">关联项目</dt><dd class="col-8">${d.project_name || '—'}</dd>
          </dl>
        </div>
        <div class="col-md-6">
          <dl class="row mb-2">
            <dt class="col-4 text-muted">状态</dt><dd class="col-8">${statusBadge(d.status)}</dd>
            <dt class="col-4 text-muted">预估总额</dt><dd class="col-8 fw-bold text-danger">¥${d.total_amount > 0 ? d.total_amount.toLocaleString() : '0.00'}</dd>
            <dt class="col-4 text-muted">期望到货</dt><dd class="col-8">${d.expected_date || '—'}</dd>
            <dt class="col-4 text-muted">提交时间</dt><dd class="col-8">${d.submitted_at ? d.submitted_at.slice(0,10) : '—'}</dd>
            <dt class="col-4 text-muted">审批时间</dt><dd class="col-8">${d.approved_at ? d.approved_at.slice(0,10) : '—'}</dd>
          </dl>
        </div>
        <div class="col-12">
          <dl class="row">
            <dt class="col-2 text-muted">申购理由</dt><dd class="col-10">${d.reason || '—'}</dd>
            <dt class="col-2 text-muted">备注</dt><dd class="col-10">${d.remark || '—'}</dd>
          </dl>
        </div>
      </div>
      <h6 class="mt-2">明细 (${(d.items||[]).length} 项)</h6>
      <table class="table table-sm table-bordered">
        <thead><tr><th>物料</th><th>规格说明</th><th>数量</th><th>单位</th><th>预估单价</th><th>预估金额</th></tr></thead>
        <tbody>
          ${(d.items||[]).map(function(i) {
            return `<tr><td>${i.material_name||i.material}(${i.material_code||''})</td><td>${i.description||'—'}</td>
                    <td>${i.quantity}</td><td>${i.unit}</td><td class="text-end">¥${i.estimated_unit_price}</td>
                    <td class="text-end fw-semibold">¥${i.estimated_amount}</td></tr>`;
          }).join('')}
        </tbody>
      </table>`;
    detailModal.show();
  } catch(e) { alert('加载失败'); }
}

async function doAction(id, action) {
  if (!confirm('确认执行此操作？')) return;
  try {
    await axios.post(API + id + '/' + action + '/');
    loadData(currentPage);
  } catch(e) { alert('操作失败: ' + (e.response?.data?.error || e.message)); }
}
</script>
</body>
</html>
