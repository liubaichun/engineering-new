{% extends "base.html" %}

{% block title %}采购订单管理{% endblock %}

{% block content %}
<style>
.stat-card { border-left: 4px solid #0d6efd; }
.stat-card2 { border-left: 4px solid #198754; }
.stat-num { font-size:1.6rem; font-weight:700; }
.badge-draft{background:#6c757d}.badge-sent{background:#0d6efd}.badge-confirmed{background:#6610f2}
.badge-shipped{background:#17a2b8}.badge-received{background:#198754}.badge-completed{background:#28a745}
.badge-cancelled{background:#dc3545}.badge-partial{background:#fd7e14}
.modal-wide{max-width:900px}.table-responsive{font-size:14px}
.table-actions .btn { padding: 2px 6px; font-size: 12px; }
</style>

<div class="container-fluid" style="margin-top:20px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-file-earmark-minus"></i> 采购订单管理</h4>
    <button class="btn btn-primary btn-sm" onclick="showCreateModal()">
      <i class="bi bi-plus-lg"></i> 新建订单
    </button>
  </div>

  <!-- 统计 -->
  <div class="row g-3 mb-3">
    <div class="col-md-2">
      <div class="card stat-card h-100">
        <div class="card-body py-2">
          <div class="text-muted small">全部订单</div>
          <div class="stat-num text-primary" id="stat-total">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card stat-card2 h-100">
        <div class="card-body py-2">
          <div class="text-muted small">执行中</div>
          <div class="stat-num text-success" id="stat-active">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card h-100">
        <div class="card-body py-2">
          <div class="text-muted small">已完成</div>
          <div class="stat-num text-info" id="stat-completed">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card h-100">
        <div class="card-body py-2">
          <div class="text-muted small">已取消</div>
          <div class="stat-num text-danger" id="stat-cancelled">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 筛选 -->
  <div class="card mb-3">
    <div class="card-body py-2 d-flex gap-2 flex-wrap align-items-center">
      <input type="text" class="form-control form-control-sm" style="width:180px" id="searchInput" placeholder="订单号/供应商">
      <select class="form-select form-select-sm" style="width:130px" id="filterStatus">
        <option value="">全部状态</option>
        <option value="draft">草稿</option>
        <option value="sent">已发送</option>
        <option value="confirmed">已确认</option>
        <option value="shipped">已发货</option>
        <option value="received">已入库</option>
        <option value="completed">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
      <button class="btn btn-outline-primary btn-sm" onclick="loadData(1)"><i class="bi bi-search"></i> 搜索</button>
    </div>
  </div>

  <!-- 列表 -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>订单号</th>
              <th>供应商</th>
              <th>关联申请</th>
              <th>订单金额</th>
              <th>已入库金额</th>
              <th>状态</th>
              <th>下单日期</th>
              <th>预计到货</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="paginationArea" class="d-flex justify-content-center mt-3"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block modal %}
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-wide">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">新建采购订单</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="formId">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">订单号</label>
            <input type="text" class="form-control" id="f-order_no" placeholder="自动生成" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">供应商 <span class="text-danger">*</span></label>
            <select class="form-select" id="f-supplier" required><option value="">请选择</option></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">关联采购申请</label>
            <select class="form-select" id="f-request"><option value="">无</option></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">下单日期</label>
            <input type="date" class="form-control" id="f-order_date">
          </div>
          <div class="col-md-6">
            <label class="form-label">预计到货日期</label>
            <input type="date" class="form-control" id="f-expected_date">
          </div>
          <div class="col-12">
            <label class="form-label">备注</label>
            <textarea class="form-control" id="f-remark" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveForm()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-wide">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">订单详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailContent"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
var API = '/api/purchasing/orders/';
var modal, detailModal;
var currentPage = 1;

document.addEventListener('DOMContentLoaded', function() {
  modal = new bootstrap.Modal(document.getElementById('formModal'));
  detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
  loadSuppliers();
  loadRequests();
  loadData(1);
});

async function loadSuppliers() {
  try {
    var r = await axios.get('/api/crm/suppliers/', { params: { page_size: 500 } });
    var sel = document.getElementById('f-supplier');
    (r.data.results || r.data).forEach(function(s) {
      sel.add(new Option(s.name, s.id));
    });
  } catch(e) {}
}

async function loadRequests() {
  try {
    var r = await axios.get('/api/purchasing/requests/', { params: { page_size: 500, status: 'approved' } });
    var sel = document.getElementById('f-request');
    (r.data.results || r.data).forEach(function(req) {
      sel.add(new Option(req.request_no + ' — ' + (req.title||''), req.id));
    });
  } catch(e) {}
}

async function loadData(page) {
  currentPage = page;
  var params = { page: page, page_size: 20 };
  var s = document.getElementById('searchInput').value.trim();
  if (s) params.search = s;
  var st = document.getElementById('filterStatus').value;
  if (st) params.status = st;
  try {
    var r = await axios.get(API, { params: params });
    renderTable(r.data.results || r.data);
    renderPagination(r.data);
    updateStats(r.data.results || r.data);
  } catch(e) { console.error(e); }
}

function updateStats(items) {
  document.getElementById('stat-total').textContent = items.length || 0;
  document.getElementById('stat-active').textContent = (items.filter(function(i) { return ['sent','confirmed','shipped','partial'].indexOf(i.status) >= 0; })).length;
  document.getElementById('stat-completed').textContent = (items.filter(function(i) { return i.status === 'completed'; })).length;
  document.getElementById('stat-cancelled').textContent = (items.filter(function(i) { return i.status === 'cancelled'; })).length;
}

function statusBadge(s) {
  var m = { draft:'草稿', sent:'已发送', confirmed:'已确认', shipped:'已发货', received:'已入库', completed:'已完成', cancelled:'已取消', partial:'部分入库' };
  var cls = { draft:'badge-draft', sent:'badge-sent', confirmed:'badge-confirmed', shipped:'badge-shipped', received:'badge-received', completed:'badge-completed', cancelled:'badge-cancelled', partial:'badge-partial' };
  return '<span class="badge ' + (cls[s]||'badge-draft') + '">' + (m[s]||s) + '</span>';
}

function renderTable(data) {
  var tb = document.getElementById('tableBody');
  if (!data || data.length === 0) {
    tb.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">暂无数据</td></tr>';
    return;
  }
  tb.innerHTML = data.map(function(r) {
    return '<tr>' +
      '<td><a href="javascript:void(0)" onclick="showDetail(' + r.id + ')">' + (r.order_no||'') + '</a></td>' +
      '<td>' + (r.supplier_name||'—') + '</td>' +
      '<td>' + (r.purchase_request_no||'—') + '</td>' +
      '<td class="text-end fw-semibold">' + (r.total_amount>0?'¥'+r.total_amount.toLocaleString():'—') + '</td>' +
      '<td class="text-end">' + (r.received_amount>0?'¥'+r.received_amount.toLocaleString():'—') + '</td>' +
      '<td>' + statusBadge(r.status) + '</td>' +
      '<td>' + (r.order_date||'—') + '</td>' +
      '<td>' + (r.expected_date||'—') + '</td>' +
      '<td class="table-actions">' +
        '<button class="btn btn-outline-primary btn-sm" onclick="showDetail(' + r.id + ')">查看</button> ' +
        (r.status==='draft'?'<button class="btn btn-outline-secondary btn-sm" onclick="editItem(' + r.id + ')">编辑</button> ':'') +
      '</td></tr>';
  }).join('');
}

function renderPagination(data) {
  if (!data.count) return;
  var total = Math.ceil(data.count / data.page_size);
  var cur = data.current_page || 1;
  if (total <= 1) return;
  var html = '<ul class="pagination pagination-sm mb-0">';
  html += '<li class="page-item ' + (cur<=1?'disabled':'') + '"><a class="page-link" href="javascript:loadData(' + (cur-1) + ')">&laquo;</a></li>';
  for (var i=1; i<=Math.min(total,5); i++) {
    html += '<li class="page-item ' + (i===cur?'active':'') + '"><a class="page-link" href="javascript:loadData(' + i + ')">' + i + '</a></li>';
  }
  html += '<li class="page-item ' + (cur>=total?'disabled':'') + '"><a class="page-link" href="javascript:loadData(' + (cur+1) + ')">&raquo;</a></li>';
  html += '</ul>';
  document.getElementById('paginationArea').innerHTML = html;
}

function showCreateModal() {
  document.getElementById('modalTitle').textContent = '新建采购订单';
  document.getElementById('formId').value = '';
  document.getElementById('f-order_no').value = '自动生成';
  document.getElementById('f-supplier').value = '';
  document.getElementById('f-request').value = '';
  document.getElementById('f-order_date').value = '';
  document.getElementById('f-expected_date').value = '';
  document.getElementById('f-remark').value = '';
  modal.show();
}

async function editItem(id) {
  try {
    var r = await axios.get(API + id + '/');
    var d = r.data;
    document.getElementById('modalTitle').textContent = '编辑采购订单';
    document.getElementById('formId').value = d.id;
    document.getElementById('f-order_no').value = d.order_no || '';
    document.getElementById('f-supplier').value = d.supplier || '';
    document.getElementById('f-request').value = d.purchase_request || '';
    document.getElementById('f-order_date').value = d.order_date || '';
    document.getElementById('f-expected_date').value = d.expected_date || '';
    document.getElementById('f-remark').value = d.remark || '';
    modal.show();
  } catch(e) { alert('加载失败'); }
}

async function saveForm() {
  var id = document.getElementById('formId').value;
  var payload = {
    supplier: parseInt(document.getElementById('f-supplier').value) || null,
    purchase_request: parseInt(document.getElementById('f-request').value) || null,
    order_date: document.getElementById('f-order_date').value || null,
    expected_date: document.getElementById('f-expected_date').value || null,
    remark: document.getElementById('f-remark').value,
  };
  try {
    if (id) {
      await axios.patch(API + id + '/', payload);
    } else {
      await axios.post(API, payload);
    }
    modal.hide();
    loadData(currentPage);
  } catch(e) {
    alert('保存失败: ' + (e.response?.data?.detail || e.message));
  }
}

async function showDetail(id) {
  try {
    var r = await axios.get(API + id + '/');
    var d = r.data;
    document.getElementById('detailContent').innerHTML = '<div class="row">' +
      '<div class="col-md-6"><dl class="row"><dt class="col-4 text-muted">订单号</dt><dd class="col-8">' + (d.order_no||'') + '</dd>' +
      '<dt class="col-4 text-muted">供应商</dt><dd class="col-8">' + (d.supplier_name||'—') + '</dd>' +
      '<dt class="col-4 text-muted">关联申请</dt><dd class="col-8">' + (d.purchase_request_no||'—') + '</dd></dl></div>' +
      '<div class="col-md-6"><dl class="row"><dt class="col-4 text-muted">状态</dt><dd class="col-8">' + statusBadge(d.status) + '</dd>' +
      '<dt class="col-4 text-muted">订单金额</dt><dd class="col-8 fw-bold text-danger">¥' + (d.total_amount>0?d.total_amount.toLocaleString():'0.00') + '</dd>' +
      '<dt class="col-4 text-muted">已入库</dt><dd class="col-8">¥' + (d.received_amount>0?d.received_amount.toLocaleString():'0.00') + '</dd></dl></div>' +
      '<div class="col-12"><h6>明细 (' + ((d.items||[]).length) + ' 项)</h6>' +
      '<table class="table table-sm table-bordered"><thead><tr><th>物料</th><th>数量</th><th>单位</th><th>单价</th><th>金额</th><th>已入库</th></tr></thead><tbody>' +
      (d.items||[]).map(function(i) {
        return '<tr><td>'+(i.material_name||i.material||'')+'</td><td>'+i.quantity+'</td><td>'+(i.unit||'')+'</td><td class="text-end">¥'+i.unit_price+'</td><td class="text-end fw-semibold">¥'+i.amount+'</td><td>'+i.received_quantity+'</td></tr>';
      }).join('') + '</tbody></table></div>';
    detailModal.show();
  } catch(e) { alert('加载失败'); }
}
</script>
{% endblock %}
