{% extends "base.html" %}
{% load static %}

{% block title %}权限矩阵 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.permission-matrix {
    font-size: 0.82rem;
}
.permission-matrix .matrix-table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
}
.permission-matrix .matrix-table th,
.permission-matrix .matrix-table td {
    border: 1px solid #e2e8f0;
    padding: 6px 8px;
    text-align: center;
    vertical-align: middle;
}
.permission-matrix .matrix-table thead th {
    background: #f8fafc;
    font-weight: 600;
    color: #334155;
    position: sticky;
    top: 0;
    z-index: 2;
}
.permission-matrix .company-header {
    min-width: 160px;
}
.permission-matrix .module-header {
    min-width: 100px;
    text-align: left !important;
}
.permission-matrix .perm-cell {
    white-space: nowrap;
}
.permission-matrix .perm-cell label {
    display: inline-flex;
    align-items: center;
    gap: 1px;
    margin: 0 3px;
    cursor: pointer;
    font-size: 0.78rem;
}
.permission-matrix .perm-cell input[type="checkbox"] {
    width: 14px;
    height: 14px;
    cursor: pointer;
}
.permission-matrix .primary-cell {
    text-align: center !important;
}
.permission-matrix .primary-cell input[type="radio"] {
    width: 14px;
    height: 14px;
    cursor: pointer;
}
.permission-matrix .matrix-table tbody tr:nth-child(9n+1) td {
    border-top: 2px solid #cbd5e1;
}
.permission-matrix .matrix-table tbody td:first-child {
    background: #f8fafc;
    font-weight: 600;
    color: #475569;
    text-align: left !important;
}
.permission-matrix .unsaved {
    background: #fff7ed !important;
}
.permission-matrix .badge-module {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.72rem;
    background: #e0f2fe;
    color: #0369a1;
}
.permission-matrix .sticky-left {
    position: sticky;
    left: 0;
    z-index: 1;
    background: #f8fafc;
}
</style>
{% endblock %}

{% block content %}
<div class="permission-matrix">
    <!-- 页面标题 + 操作栏 -->
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
        <div>
            <h4><i class="bi bi-grid-3x3 me-2"></i>权限矩阵</h4>
            <p class="text-muted mb-0" style="font-size: 0.9rem;">
                用户 × 公司 × 模块 五档权限配置
            </p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <select id="userSelect" class="form-select form-select-sm" style="width: 180px;" onchange="loadMatrix()">
                <option value="">— 选择用户 —</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="saveAll()" id="saveBtn" disabled>
                <i class="bi bi-save me-1"></i>保存修改
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="refreshMatrix()" title="刷新">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- 矩阵区域 -->
    <div class="card" style="overflow: auto; max-height: calc(100vh - 200px);">
        <div class="card-body p-2">
            <div id="matrixLoading" class="text-center py-5 text-muted">
                <div class="spinner-border text-primary mb-2"></div>
                <p>加载中...</p>
            </div>
            <div id="matrixEmpty" class="text-center py-5 text-muted" style="display:none;">
                <i class="bi bi-people fs-1 d-block mb-2"></i>
                <p>请从上方选择一位用户</p>
            </div>
            <div id="matrixContainer" style="display:none;">
                <!-- 表头 -->
                <table class="matrix-table" id="matrixTable">
                    <thead id="matrixHead"></thead>
                    <tbody id="matrixBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 说明 -->
    <div class="mt-2 text-muted" style="font-size: 0.8rem;">
        <i class="bi bi-info-circle me-1"></i>
        <strong>五档权限：</strong>查看 / 新建 / 编辑 / 删除 / 审批 &nbsp;|&nbsp;
        <strong>主体企业(★)：</strong>用户登录后默认进入的公司上下文
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentUserId = null;
let matrixData = null;     // 完整矩阵数据
let unsavedChanges = new Set();
let userList = [];         // 用户列表缓存

// ─── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadUsers();
    // 自动加载第一个用户的矩阵（移除占位符选项，直接选到真实用户）
    const sel = document.getElementById('userSelect');
    if (sel.options.length > 1) {  // 有真实用户选项时
        sel.selectedIndex = 1;  // 选第一个真实用户（跳过占位符"选择用户"）
        loadMatrix();
    }
});

// ─── Load 用户列表 ────────────────────────────────────────────────────────────
async function loadUsers() {
    try {
        const resp = await fetch('/api/core/users/?page_size=200', { credentials: 'include' });
        const data = await resp.json();
        userList = data.results || [];
        const sel = document.getElementById('userSelect');
        userList.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.username}（${u.email || '无邮箱'}）`;
            sel.appendChild(opt);
        });
    } catch (e) {
        console.error('加载用户列表失败', e);
    }
}

// ─── Load 矩阵 ───────────────────────────────────────────────────────────────
async function loadMatrix() {
    const userId = document.getElementById('userSelect').value;
    if (!userId) {
        matrixData = null;
        document.getElementById('matrixLoading').style.display = 'none';
        document.getElementById('matrixEmpty').style.display = 'block';
        document.getElementById('matrixContainer').style.display = 'none';
        document.getElementById('saveBtn').disabled = true;
        return;
    }
    currentUserId = parseInt(userId);
    unsavedChanges.clear();

    document.getElementById('matrixEmpty').style.display = 'none';
    document.getElementById('matrixContainer').style.display = 'none';
    document.getElementById('matrixLoading').style.display = 'block';

    try {
        const resp = await fetch(
            `/api/permission-registry/users/${currentUserId}/permissions/`,
            { credentials: 'include' }
        );
        if (!resp.ok) throw new Error(resp.status);
        matrixData = await resp.json();
        renderMatrix();
    } catch (e) {
        alert('加载权限矩阵失败: ' + e.message);
        console.error(e);
    } finally {
        document.getElementById('matrixLoading').style.display = 'none';
    }
}

function refreshMatrix() {
    if (currentUserId) loadMatrix();
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderMatrix() {
    const { modules, companies, matrix } = matrixData;
    document.getElementById('matrixContainer').style.display = 'block';

    // ── 表头 ──
    const thead = document.getElementById('matrixHead');
    let thHtml = '<tr><th class="module-header sticky-left">模块 / 公司</th>';
    companies.forEach(c => {
        thHtml += `<th class="company-header">${escapeHtml(c.name)}</th>`;
    });
    thHtml += '</tr>';
    thead.innerHTML = thHtml;

    // ── 表体：按 module 分行 ──
    const tbody = document.getElementById('matrixBody');
    let bodyHtml = '';

    modules.forEach(mod => {
        // 模块标题行
        bodyHtml += `<tr data-module-id="${mod.id}">`;
        bodyHtml += `<td class="sticky-left">
            <span class="badge-module">${escapeHtml(mod.label || mod.name)}</span>
            <span class="text-muted ms-1" style="font-size:0.72rem;">${escapeHtml(mod.name)}</span>
        </td>`;

        companies.forEach(comp => {
            // 找 (company_id, module_id) 对应的记录
            const rec = matrix.find(
                r => r.company_id === comp.id && r.module_id === mod.id
            );
            bodyHtml += renderCell(mod, comp, rec || null);
        });
        bodyHtml += '</tr>';
    });

    tbody.innerHTML = bodyHtml;
}

function renderCell(module, company, rec) {
    const cid = company.id;
    const mid = module.id;
    const pid = rec ? rec.permission_id : null;
    const hasRec = rec && rec.has_record;

    // 五档复选框
    const perms = ['view', 'create', 'edit', 'delete', 'approve'];
    const labels = { view: 'V', create: 'C', edit: 'E', delete: 'D', approve: 'A' };
    let permHtml = perms.map(p => {
        const checked = hasRec && rec['can_' + p] ? 'checked' : '';
        // 始终可操作（无记录时后端自动创建）
        return `<label title="${labels[p]}">
            <input type="checkbox"
                data-company="${cid}" data-module="${mid}" data-perm="${p}"
                data-pid="${pid || ''}"
                ${checked}
                onchange="onPermChange(this)">
        </label>`;
    }).join('');

    // 主体企业单选（同一公司下所有模块共用一个 primary）
    const primaryChecked = hasRec && rec.is_primary ? 'checked' : '';
    const primaryHtml = `<input type="radio"
        name="primary_${cid}"
        data-company="${cid}" data-module="${mid}" data-pid="${pid || ''}"
        ${primaryChecked}
        onchange="onPrimaryChange(this)"
        title="主体企业">`;

    return `<td class="perm-cell" data-company="${cid}" data-module="${mid}">
        <div class="d-flex justify-content-center align-items-center gap-1">
            <span title="主体企业(★)">${primaryHtml}</span>
            <span class="border-start mx-1" style="height:16px;"></span>
            ${permHtml}
        </div>
    </td>`;
}

// ─── 交互 ────────────────────────────────────────────────────────────────────
function onPermChange(el) {
    const { company, module, perm, pid } = el.dataset;
    markUnsaved(company, module);

    // 如果勾选了任意权限但没有 pid，需要先知道 pid（保存时后端创建）
    // 如果没有勾选任何权限，后端会删除记录或保留空白
}

function onPrimaryChange(el) {
    const { company } = el.dataset;
    // 同一公司下只有一个模块可以设 primary，但 JS 端不拦截（后端保证）
    // 视觉上：取消同公司其他 primary 选中状态
    document.querySelectorAll(`input[name="primary_${company}"]`).forEach(r => {
        if (r !== el) r.checked = false;
    });
    markUnsaved(company, el.dataset.module);
}

function markUnsaved(companyId, moduleId) {
    const cell = document.querySelector(
        `td[data-company="${companyId}"][data-module="${moduleId}"]`
    );
    if (cell) {
        cell.classList.add('unsaved');
        cell.closest('tr').classList.add('unsaved');
    }
    document.getElementById('saveBtn').disabled = false;
    unsavedChanges.add(`${companyId}-${moduleId}`);
}

// ─── Save ────────────────────────────────────────────────────────────────────
async function saveAll() {
    if (!currentUserId || unsavedChanges.size === 0) return;

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>保存中...';

    try {
        // 收集所有有记录（含空记录）的权限项
        // 对于每个 (company_id, module_id)，收集五档 + is_primary
        const companyModules = new Map(); // key: `${c}-${m}`, value: {company_id, module_id, can_view, ..., is_primary}

        document.querySelectorAll('td.perm-cell').forEach(cell => {
            const company = parseInt(cell.dataset.company);
            const module = parseInt(cell.dataset.module);
            const key = `${company}-${module}`;

            // 找该单元格下的所有 checkbox
            const checkboxes = cell.querySelectorAll('input[type="checkbox"]');
            const primaryRadio = cell.querySelector('input[type="radio"]');

            const entry = {
                company_id: company,
                module_id: module,
                can_view: false, can_create: false,
                can_edit: false, can_delete: false, can_approve: false,
                is_primary: false,
            };

            checkboxes.forEach(cb => {
                const p = cb.dataset.perm;
                entry['can_' + p] = cb.checked;
            });
            if (primaryRadio) {
                entry.is_primary = primaryRadio.checked;
            }

            // 只有至少有一个权限被勾选才发送（避免创建太多空记录）
            const anyPerm = entry.can_view || entry.can_create ||
                            entry.can_edit || entry.can_delete || entry.can_approve;
            if (anyPerm || entry.is_primary) {
                companyModules.set(key, entry);
            }
        });

        const permissions = Array.from(companyModules.values());

        const resp = await fetch(
            `/api/permission-registry/users/${currentUserId}/permissions/batch/`,
            {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ permissions }),
            }
        );

        // 先拿 status（不依赖 body），再安全读 body（带超时兜底）
        const status = resp.status;
        const data = status >= 200 && status < 300
            ? await Promise.race([
                resp.clone().json(),
                new Promise(resolve => setTimeout(() => resolve({}), 8000))
              ]).catch(() => ({}))
            : {};

        if (!resp.ok) {
            throw new Error(data.detail || `HTTP ${resp.status}`);
        }

        // 成功后重新加载矩阵
        unsavedChanges.clear();
        await loadMatrix();
        // 显示后端返回的实际消息（区分超管提示 vs 普通成功）
        alert(data.detail || '保存成功');
    } catch (e) {
        alert('保存失败: ' + e.message);
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="bi bi-save me-1"></i>保存修改';
    }
}

// ─── Util ────────────────────────────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
{% endblock %}
