{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 企业信息化管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            width: 100%;
            max-width: 480px;
            padding: 0 16px;
        }
        .reset-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 36px;
        }
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand h3 {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .brand p {
            color: #6b7280;
            font-size: 0.875rem;
            margin: 0;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.9rem;
            border: 1.5px solid #e5e7eb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-reset {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
        }
        .btn-reset:hover {
            background: var(--primary-hover);
            color: #fff;
        }
        .btn-reset:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.875rem;
            padding: 12px 16px;
        }
        .info-text {
            color: #6b7280;
            font-size: 0.8rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="brand">
                <h3>忘记密码</h3>
                <p>输入您注册时使用的邮箱地址</p>
            </div>

            <div id="alertBox" class="alert alert-danger" style="display:none;"></div>

            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label">邮箱地址</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="请输入注册邮箱" required autocomplete="email">
                </div>
                <p class="info-text">
                    <i class="bi bi-info-circle"></i> 重置链接将发送到您的邮箱，链接30分钟内有效。
                </p>
                <button type="submit" class="btn btn-reset" id="submitBtn">
                    <span id="btnText">发送重置链接</span>
                </button>
            </form>

            <div class="back-link">
                <a href="/login/">
                    <i class="bi bi-arrow-left"></i> 返回登录
                </a>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const alertBox = document.getElementById('alertBox');
        const email = document.getElementById('email').value.trim();

        alertBox.style.display = 'none';
        btn.disabled = true;
        btnText.textContent = '发送中...';

        try {
            const response = await fetch('/api/core/auth/password-reset/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email })
            });
            const data = await response.json();

            if (data.status === 'success') {
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'block';
                alertBox.textContent = data.message;
                document.getElementById('resetForm').reset();
            } else {
                alertBox.className = 'alert alert-danger';
                alertBox.style.display = 'block';
                alertBox.textContent = data.message || '发送失败，请重试。';
            }
        } catch (err) {
            alertBox.className = 'alert alert-danger';
            alertBox.style.display = 'block';
            alertBox.textContent = '网络错误，请稍后重试。';
        } finally {
            btn.disabled = false;
            btnText.textContent = '发送重置链接';
        }
    });
    </script>
</body>
</html>
