{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置新密码 - 企业信息化管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            width: 100%;
            max-width: 480px;
            padding: 0 16px;
        }
        .reset-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 36px;
        }
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand h3 {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .brand p {
            color: #6b7280;
            font-size: 0.875rem;
            margin: 0;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.9rem;
            border: 1.5px solid #e5e7eb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-reset {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
        }
        .btn-reset:hover {
            background: var(--primary-hover);
            color: #fff;
        }
        .btn-reset:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.875rem;
            padding: 12px 16px;
        }
        .password-rules {
            color: #6b7280;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .password-rules li {
            margin-bottom: 2px;
        }
        .password-rules .ok { color: #22c55e; }
        .password-rules .fail { color: #ef4444; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="brand">
                <h3>设置新密码</h3>
                <p>请输入您的新密码</p>
            </div>

            <div id="alertBox" class="alert" style="display:none;"></div>

            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="至少8位，包含大小写字母和数字" required>
                    <ul class="password-rules mt-1 mb-0" id="passwordRules">
                        <li id="ruleLen"><i class="bi bi-circle"></i> 至少8个字符</li>
                        <li id="ruleUpper"><i class="bi bi-circle"></i> 包含大写字母</li>
                        <li id="ruleLower"><i class="bi bi-circle"></i> 包含小写字母</li>
                        <li id="ruleDigit"><i class="bi bi-circle"></i> 包含数字</li>
                    </ul>
                </div>
                <div class="mb-3">
                    <label class="form-label">确认新密码</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="再次输入新密码" required>
                </div>
                <button type="submit" class="btn btn-reset" id="submitBtn">
                    <span id="btnText">确认重置密码</span>
                </button>
            </form>

            <div class="back-link">
                <a href="/login/">
                    <i class="bi bi-arrow-left"></i> 返回登录
                </a>
            </div>
        </div>
    </div>

    <script>
    function checkPassword(pw) {
        const rules = {
            ruleLen: pw.length >= 8,
            ruleUpper: /[A-Z]/.test(pw),
            ruleLower: /[a-z]/.test(pw),
            ruleDigit: /[0-9]/.test(pw)
        };
        for (const [id, ok] of Object.entries(rules)) {
            const el = document.getElementById(id);
            if (ok) {
                el.className = 'ok';
                el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + el.textContent.replace(/^.*】/, '');
            } else {
                el.className = '';
                el.innerHTML = '<i class="bi bi-circle"></i> ' + el.textContent.replace(/^.*】/, '');
            }
        }
        return Object.values(rules).every(Boolean);
    }

    document.getElementById('new_password').addEventListener('input', function() {
        checkPassword(this.value);
    });

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const alertBox = document.getElementById('alertBox');
        const newPw = document.getElementById('new_password').value;
        const confirmPw = document.getElementById('confirm_password').value;

        alertBox.style.display = 'none';

        if (newPw !== confirmPw) {
            alertBox.className = 'alert alert-danger';
            alertBox.style.display = 'block';
            alertBox.textContent = '两次密码输入不一致';
            return;
        }

        if (!checkPassword(newPw)) {
            alertBox.className = 'alert alert-danger';
            alertBox.style.display = 'block';
            alertBox.textContent = '密码不符合要求，请检查上述条件';
            return;
        }

        btn.disabled = true;
        btnText.textContent = '处理中...';

        // 从URL提取uidb64和token
        const pathParts = window.location.pathname.split('/');
        const uidb64 = pathParts[2];
        const token = pathParts[3];

        try {
            const response = await fetch(`/api/core/auth/password-reset/${uidb64}/${token}/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    new_password: newPw,
                    confirm_password: confirmPw
                })
            });
            const data = await response.json();

            if (data.status === 'success') {
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'block';
                alertBox.textContent = data.message;
                document.getElementById('resetForm').reset();
                setTimeout(() => { window.location.href = '/login/'; }, 2000);
            } else {
                alertBox.className = 'alert alert-danger';
                alertBox.style.display = 'block';
                alertBox.textContent = data.message || '重置失败，请重试。';
            }
        } catch (err) {
            alertBox.className = 'alert alert-danger';
            alertBox.style.display = 'block';
            alertBox.textContent = '网络错误，请稍后重试。';
        } finally {
            btn.disabled = false;
            btnText.textContent = '确认重置密码';
        }
    });
    </script>
</body>
</html>
