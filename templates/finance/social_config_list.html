{% extends "base.html" %}

{% block title %}社保公积金配置 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
}
.config-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    border-top: 4px solid var(--primary);
}
.config-card .company-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
}
.config-card .company-code {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 16px;
}
.config-section {
    margin-bottom: 14px;
}
.config-section-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-color);
}
.config-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 0.85rem;
}
.config-row .label { color: var(--text-secondary); }
.config-row .value { font-weight: 600; color: var(--text-primary); }
.config-row .value.highlight { color: var(--primary); }
.config-footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
    display: flex;
    gap: 8px;
}
.loading-spinner { text-align: center; padding: 40px; }
.empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
.empty-state i { font-size: 2.5rem; margin-bottom: 12px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 4px; }
.modal-field input, .modal-field select { width: 100%; }
</style>
{% endblock %}

{% block content %}
<main class="main-content">
    <div class="page-header">
        <h4><i class="bi bi-shield-check me-2"></i>社保公积金配置</h4>
        <p class="text-muted mb-0" style="font-size:0.85rem">管理各公司的社保及公积金缴纳比例配置</p>
    </div>

    <div id="summaryStats" class="config-grid"></div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>配置明细</strong>
        </div>
        <div class="card-body p-0">
            <div id="configTable" class="table-responsive"></div>
        </div>
    </div>
</main>

<!-- 编辑弹窗 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-shield-check me-2"></i>编辑社保公积金配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>公司</label>
                        <input type="text" id="editCompany" class="form-control" readonly>
                    </div>
                    <div class="col-md-6 modal-field">
                        <label>社保基数（元）</label>
                        <input type="number" id="editSocialBase" class="form-control" step="0.01" min="0" placeholder="如：6000">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>公积金基数（元）</label>
                        <input type="number" id="editHousingBase" class="form-control" step="0.01" min="0" placeholder="如：6000">
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>养老保险 — 个人比例（%）</label>
                        <input type="number" id="editPensionEmp" class="form-control" step="0.01" min="0" max="100" placeholder="8">
                    </div>
                    <div class="col-md-6 modal-field">
                        <label>养老保险 — 公司比例（%）</label>
                        <input type="number" id="editPensionCo" class="form-control" step="0.01" min="0" max="100" placeholder="16">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>医疗保险 — 个人比例（%）</label>
                        <input type="number" id="editMedicalEmp" class="form-control" step="0.01" min="0" max="100" placeholder="2">
                    </div>
                    <div class="col-md-6 modal-field">
                        <label>医疗保险 — 公司比例（%）</label>
                        <input type="number" id="editMedicalCo" class="form-control" step="0.01" min="0" max="100" placeholder="6">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>失业保险 — 个人比例（%）</label>
                        <input type="number" id="editUnempEmp" class="form-control" step="0.01" min="0" max="100" placeholder="0.3">
                    </div>
                    <div class="col-md-6 modal-field">
                        <label>失业保险 — 公司比例（%）</label>
                        <input type="number" id="editUnempCo" class="form-control" step="0.01" min="0" max="100" placeholder="0.6">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>工伤保险 — 公司比例（%）</label>
                        <input type="number" id="editInjuryCo" class="form-control" step="0.01" min="0" max="100" placeholder="0.4">
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-md-6 modal-field">
                        <label>住房公积金 — 个人比例（%）</label>
                        <input type="number" id="editHfEmp" class="form-control" step="0.01" min="0" max="100" placeholder="5">
                    </div>
                    <div class="col-md-6 modal-field">
                        <label>住房公积金 — 公司比例（%）</label>
                        <input type="number" id="editHfCo" class="form-control" step="0.01" min="0" max="100" placeholder="5">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveConfig()"><i class="bi bi-check2 me-1"></i>保存配置</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editModal;

document.addEventListener('DOMContentLoaded', function() {
    editModal = new bootstrap.Modal(document.getElementById('editModal'));
    loadConfigs();
});

async function loadConfigs() {
    const container = document.getElementById('configTable');
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border text-primary"></div></div>';

    try {
        const resp = await fetch('/api/finance/social-configs/', { credentials: 'include' });
        if (!resp.ok) throw new Error('获取配置失败');
        const data = await resp.json();
        const configs = data.results || data;
        renderConfigs(configs);
        renderSummary(configs);
    } catch (err) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><p>加载失败：' + err.message + '</p></div>';
    }
}

function renderSummary(configs) {
    const stats = document.getElementById('summaryStats');
    stats.innerHTML = '<div class="config-card"><div class="company-name">共 ' + configs.length + ' 家公司</div><div class="company-code">已配置社保方案</div></div>';
}

function renderConfigs(configs) {
    const container = document.getElementById('configTable');
    if (!configs || configs.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-shield"></i><p>暂无配置记录</p></div>';
        return;
    }

    let html = '<table class="table mb-0"><thead><tr><th>公司</th><th>社保基数</th><th>个人缴纳</th><th>公司缴纳</th><th>操作</th></tr></thead><tbody>';
    configs.forEach(cfg => {
        // 统一 parseFloat，避免字符串拼接问题（API 返回 "8.00" 格式）
        const pensionEmp = parseFloat(cfg.pension_rate_employee) || 0;
        const pensionCo  = parseFloat(cfg.pension_rate_company)  || 0;
        const medicalEmp  = parseFloat(cfg.medical_rate_employee)  || 0;
        const medicalCo  = parseFloat(cfg.medical_rate_company)  || 0;
        const unempEmp   = parseFloat(cfg.unemployment_rate_employee) || 0;
        const unempCo    = parseFloat(cfg.unemployment_rate_company)  || 0;
        const injuryCo   = parseFloat(cfg.injury_rate_company) || 0;
        const hfEmp      = parseFloat(cfg.housing_fund_rate_employee) || 0;
        const hfCo       = parseFloat(cfg.housing_fund_rate_company)  || 0;
        const socialBase = parseFloat(cfg.social_base) || 0;
        const housingBase= parseFloat(cfg.housing_fund_base) || 0;
        const empSocial = (socialBase * (pensionEmp + medicalEmp + unempEmp) / 100).toFixed(2);
        const coSocial = (socialBase * (pensionCo + medicalCo + unempCo + injuryCo) / 100).toFixed(2);
        const empHf = (housingBase * hfEmp / 100).toFixed(2);
        const coHf = (housingBase * hfCo / 100).toFixed(2);

        html += '<tr>';
        html += '<td><strong>' + (cfg.company_name || '-') + '</strong></td>';
        html += '<td>社保 ' + socialBase.toLocaleString() + ' / 公积金 ' + housingBase.toLocaleString() + '</td>';
        html += '<td><span class="text-primary fw-bold">' + empSocial + '</span><br><small class="text-muted">+公积金 ' + empHf + '</small></td>';
        html += '<td><span class="text-success fw-bold">' + coSocial + '</span><br><small class="text-muted">+公积金 ' + coHf + '</small></td>';
        html += '<td><button class="btn btn-sm btn-outline-primary" onclick="editConfig(' + cfg.id + ')"><i class="bi bi-pencil"></i> 编辑</button></td>';
        html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

function editConfig(id) {
    fetch('/api/finance/social-configs/' + id + '/', { credentials: 'include' })
        .then(r => r.json())
        .then(cfg => {
            document.getElementById('editId').value = cfg.id;
            document.getElementById('editCompany').value = cfg.company_name || '';
            document.getElementById('editSocialBase').value = cfg.social_base || '';
            document.getElementById('editHousingBase').value = cfg.housing_fund_base || '';
            document.getElementById('editPensionEmp').value = cfg.pension_rate_employee || '';
            document.getElementById('editPensionCo').value = cfg.pension_rate_company || '';
            document.getElementById('editMedicalEmp').value = cfg.medical_rate_employee || '';
            document.getElementById('editMedicalCo').value = cfg.medical_rate_company || '';
            document.getElementById('editUnempEmp').value = cfg.unemployment_rate_employee || '';
            document.getElementById('editUnempCo').value = cfg.unemployment_rate_company || '';
            document.getElementById('editInjuryCo').value = cfg.injury_rate_company || '';
            document.getElementById('editHfEmp').value = cfg.housing_fund_rate_employee || '';
            document.getElementById('editHfCo').value = cfg.housing_fund_rate_company || '';
            editModal.show();
        });
}

async function saveConfig() {
    const id = document.getElementById('editId').value;
    const data = {
        social_base: parseFloat(document.getElementById('editSocialBase').value) || 0,
        housing_fund_base: parseFloat(document.getElementById('editHousingBase').value) || 0,
        pension_rate_employee: parseFloat(document.getElementById('editPensionEmp').value) || 0,
        pension_rate_company: parseFloat(document.getElementById('editPensionCo').value) || 0,
        medical_rate_employee: parseFloat(document.getElementById('editMedicalEmp').value) || 0,
        medical_rate_company: parseFloat(document.getElementById('editMedicalCo').value) || 0,
        unemployment_rate_employee: parseFloat(document.getElementById('editUnempEmp').value) || 0,
        unemployment_rate_company: parseFloat(document.getElementById('editUnempCo').value) || 0,
        injury_rate_company: parseFloat(document.getElementById('editInjuryCo').value) || 0,
        housing_fund_rate_employee: parseFloat(document.getElementById('editHfEmp').value) || 0,
        housing_fund_rate_company: parseFloat(document.getElementById('editHfCo').value) || 0,
    };

    try {
        const csrf = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
        const resp = await fetch('/api/finance/social-configs/' + id + '/', {
            method: 'PATCH',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
            body: JSON.stringify(data)
        });
        if (!resp.ok) throw new Error('保存失败');
        editModal.hide();
        showToast('配置已保存', 'success');
        loadConfigs();
    } catch (err) {
        showToast('保存失败: ' + err.message, 'error');
    }
}
</script>
{% endblock %}
