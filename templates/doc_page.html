<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{{ doc_title }} - GREEN ERP 开发文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body { background: #f8f9fa; }
    .doc-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px 0;
      margin-bottom: 30px;
    }
    .doc-header a { color: #7ec8e3; }
    .doc-nav {
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .doc-content { font-size: 15px; line-height: 1.7; }
    .doc-content h1 { font-size: 1.8rem; border-bottom: 2px solid #1a1a2e; padding-bottom: 8px; margin-bottom: 16px; }
    .doc-content h2 { font-size: 1.4rem; margin-top: 30px; border-left: 4px solid #1a1a2e; padding-left: 12px; }
    .doc-content h3 { font-size: 1.1rem; color: #444; }
    .doc-content table { font-size: 14px; }
    .doc-content pre { background: #1a1a2e; color: #e0e0e0; border-radius: 8px; padding: 16px; overflow-x: auto; }
    .doc-content code { background: #f0f0f0; border-radius: 3px; padding: 2px 6px; font-size: 0.9em; }
    .doc-content pre code { background: none; padding: 0; color: inherit; }
    blockquote { border-left: 4px solid #7ec8e3; background: #e8f4f8; padding: 12px 16px; margin: 16px 0; }
    .breadcrumb { background: transparent; padding: 0; font-size: 13px; }
  </style>
</head>
<body>
  <div class="doc-header">
    <div class="container">
      <div class="d-flex align-items-center gap-3 mb-2">
        <i class="bi bi-book-half" style="font-size:1.5rem"></i>
        <h4 class="mb-0">{{ doc_title }}</h4>
      </div>
      <div class="small">
        <a href="/api/docs/">&larr; 返回API文档</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/permission-system-fix-record-2026-05-22/">权限修复记录</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/permission-system-spec/">权限规范</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/upgrade-log/">升级日志</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/financial-system-reform/">财务改革</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/%E5%A4%9A%E7%A7%9F%E6%88%B7SaaS%E5%B9%B3%E5%8F%B0%E8%AE%BE%E8%AE%A1%E8%A7%84%E8%8C%83/">多租户设计</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/%E7%B3%BB%E7%BB%9F%E5%8D%87%E7%BA%A7%E6%96%B9%E5%90%91%E9%9C%80%E6%B1%82%E5%88%86%E6%9E%90%E6%8A%A5%E5%91%8A/">升级需求分析</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/%E8%B4%A8%E9%87%8F%E5%AE%89%E5%85%A8%E4%B8%8E%E8%AE%A4%E8%AF%81%E5%90%88%E8%A7%84%E8%A7%84%E8%8C%83/">质量安全认证</a>
        <span class="text-muted mx-2">|</span>
        <a href="/docs/%E7%B3%BB%E7%BB%9F%E6%B7%B1%E5%BA%A6%E5%AE%A1%E8%AE%A1%E6%8A%A5%E5%91%8A%E4%B8%8E%E4%BF%AE%E6%94%B9%E8%AE%A1%E5%88%92/">系统审计报告</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-9 doc-content">
        {{ doc_content|safe }}
      </div>
      <div class="col-md-3">
        <div class="doc-nav">
          <div class="card">
            <div class="card-header"><i class="bi bi-list-ul"></i> 文档目录</div>
            <div class="list-group list-group-flush">
              <a href="/docs/permission-system-fix-record-2026-05-22/" class="list-group-item list-group-item-action {% if 'permission-system-fix' in doc_name %}active{% endif %}">权限系统修复记录</a>
              <a href="/docs/permission-system-spec/" class="list-group-item list-group-item-action {% if 'permission-system-spec' in doc_name %}active{% endif %}">权限体系规范</a>
              <a href="/docs/upgrade-log/" class="list-group-item list-group-item-action {% if 'upgrade-log' in doc_name %}active{% endif %}">升级日志</a>
              <a href="/docs/changelog/" class="list-group-item list-group-item-action {% if 'changelog' in doc_name %}active{% endif %}">更新日志</a>
              <a href="/docs/financial-system-reform/" class="list-group-item list-group-item-action {% if 'financial-system-reform' in doc_name %}active{% endif %}">财务报表改革方案</a>
              <a href="/docs/%E5%A4%9A%E7%A7%9F%E6%88%B7SaaS%E5%B9%B3%E5%8F%B0%E8%AE%BE%E8%AE%A1%E8%A7%84%E8%8C%83/" class="list-group-item list-group-item-action {% if '多租户' in doc_name %}active{% endif %}">多租户SaaS平台设计规范</a>
              <a href="/docs/%E7%B3%BB%E7%BB%9F%E5%8D%87%E7%BA%A7%E6%96%B9%E5%90%91%E9%9C%80%E6%B1%82%E5%88%86%E6%9E%90%E6%8A%A5%E5%91%8A/" class="list-group-item list-group-item-action {% if '系统升级' in doc_name %}active{% endif %}">系统升级方向需求分析报告</a>
              <a href="/docs/%E8%B4%A8%E9%87%8F%E5%AE%89%E5%85%A8%E4%B8%8E%E8%AE%A4%E8%AF%81%E5%90%88%E8%A7%84%E8%A7%84%E8%8C%83/" class="list-group-item list-group-item-action {% if '质量安全' in doc_name %}active{% endif %}">质量安全与认证合规规范</a>
              <a href="/docs/%E7%B3%BB%E7%BB%9F%E6%B7%B1%E5%BA%A6%E5%AE%A1%E8%AE%A1%E6%8A%A5%E5%91%8A%E4%B8%8E%E4%BF%AE%E6%94%B9%E8%AE%A1%E5%88%92/" class="list-group-item list-group-item-action {% if '审计' in doc_name %}active{% endif %}">系统深度审计报告与修改计划</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
