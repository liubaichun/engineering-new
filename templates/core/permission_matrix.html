{% extends "base.html" %}
{% load static %}

{% block title %}权限矩阵 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.permission-matrix { font-size: 0.82rem; }
.matrix-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
.matrix-table th, .matrix-table td { border: 1px solid #e2e8f0; padding: 6px 8px; text-align: center; vertical-align: middle; }
.matrix-table thead th { background: #f8fafc; font-weight: 600; color: #334155; position: sticky; top: 0; z-index: 2; }
.matrix-table .company-header { min-width: 140px; }
.matrix-table .module-header { min-width: 120px; text-align: left !important; }
.matrix-table .action-header { min-width: 70px; text-align: center; }
.matrix-table tbody td:first-child { background: #f8fafc; font-weight: 600; color: #475569; text-align: left !important; }
.matrix-table tbody td:nth-child(3) { text-align: center; }
.permission-matrix .unsaved { background: #fff7ed !important; }
.permission-matrix .badge-module { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.72rem; background: #e0f2fe; color: #0369a1; }
.permission-matrix .sticky-left { position: sticky; left: 0; z-index: 1; background: #f8fafc; }
.permission-matrix .sticky-left-2 { position: sticky; left: 120px; z-index: 1; background: #fff; }
.permission-matrix .perm-cell input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563eb; }
.permission-matrix .perm-cell label { display: inline-flex; align-items: center; cursor: pointer; margin: 0 2px; }
.permission-matrix .perm-cell { text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="permission-matrix">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
        <div>
            <h4><i class="bi bi-grid-3x3 me-2"></i>权限矩阵</h4>
            <p class="text-muted mb-0" style="font-size: 0.9rem;">
                用户 × 公司 × 模块动作 细粒度权限配置
            </p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <select id="userSelect" class="form-select form-select-sm" style="width: 180px;" onchange="loadMatrix()">
                <option value="">— 选择用户 —</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="saveAll()" id="saveBtn" disabled>
                <i class="bi bi-save me-1"></i>保存修改
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="refreshMatrix()" title="刷新">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <div class="card" style="overflow: auto; max-height: calc(100vh - 200px);">
        <div class="card-body p-2">
            <div id="matrixLoading" class="text-center py-5 text-muted">
                <div class="spinner-border text-primary mb-2"></div><p>加载中...</p>
            </div>
            <div id="matrixEmpty" class="text-center py-5 text-muted" style="display:none;">
                <i class="bi bi-people fs-1 d-block mb-2"></i><p>请从上方选择一位用户</p>
            </div>
            <div id="matrixContainer" style="display:none;">
                <table class="matrix-table" id="matrixTable">
                    <thead id="matrixHead"></thead>
                    <tbody id="matrixBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-2 text-muted" style="font-size: 0.8rem;">
        <i class="bi bi-info-circle me-1"></i>
        <strong>操作说明：</strong>勾选 = 授权该动作 | 取消 = 撤销授权 &nbsp;|&nbsp;
        <strong>橙色底色</strong> = 未保存的修改
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentUserId = null;
let matrixData = null;
let unsavedChanges = new Map(); // key: `${company_id}-${module_id}-${action_id}`, value: bool
let userList = [];

// ─── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadUsers();
    const sel = document.getElementById('userSelect');
    if (sel.options.length > 1) {
        sel.selectedIndex = 1;
        loadMatrix();
    }
});

// ─── Load 用户列表 ────────────────────────────────────────────────────────────
async function loadUsers() {
    try {
        const resp = await fetch('/api/core/users/?page_size=200', { credentials: 'include' });
        const data = await resp.json();
        userList = data.results || [];
        const sel = document.getElementById('userSelect');
        userList.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.username}（${u.email || '无邮箱'}）`;
            sel.appendChild(opt);
        });
    } catch (e) {
        console.error('加载用户列表失败', e);
    }
}

// ─── Load 矩阵 ────────────────────────────────────────────────────────────────
async function loadMatrix() {
    const userId = document.getElementById('userSelect').value;
    if (!userId) {
        matrixData = null;
        document.getElementById('matrixLoading').style.display = 'none';
        document.getElementById('matrixEmpty').style.display = 'block';
        document.getElementById('matrixContainer').style.display = 'none';
        document.getElementById('saveBtn').disabled = true;
        return;
    }
    currentUserId = parseInt(userId);
    unsavedChanges.clear();

    document.getElementById('matrixEmpty').style.display = 'none';
    document.getElementById('matrixContainer').style.display = 'none';
    document.getElementById('matrixLoading').style.display = 'block';

    try {
        const resp = await fetch(
            `/api/core/user-company-permissions/matrix/?user_id=${currentUserId}`,
            { credentials: 'include' }
        );
        if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
        matrixData = await resp.json();
        renderMatrix();
    } catch (e) {
        alert('加载权限矩阵失败: ' + e.message);
        console.error(e);
    } finally {
        document.getElementById('matrixLoading').style.display = 'none';
    }
}

function refreshMatrix() {
    if (currentUserId) loadMatrix();
}

// ─── Render ────────────────────────────────────────────────────────────────────
function renderMatrix() {
    const { modules, companies, matrix } = matrixData;
    document.getElementById('matrixContainer').style.display = 'block';

    // ── 表头 ──
    // 列: 模块 | 动作 | 公司1 | 公司2 | ...
    const thead = document.getElementById('matrixHead');
    let thHtml = '<tr>';
    thHtml += '<th class="module-header sticky-left">模块</th>';
    thHtml += '<th class="action-header sticky-left-2">动作</th>';
    companies.forEach(c => {
        thHtml += `<th class="company-header">${escapeHtml(c.name)}</th>`;
    });
    thHtml += '</tr>';
    thead.innerHTML = thHtml;

    // ── 表体：按 module × action 分行 ──
    const tbody = document.getElementById('matrixBody');
    let bodyHtml = '';

    modules.forEach(mod => {
        // 模块分组标题行
        const actionCount = mod.actions ? mod.actions.length : 0;
        bodyHtml += `<tr data-module-id="${mod.id}">`;
        bodyHtml += `<td class="sticky-left" rowspan="${actionCount || 1}">
            <span class="badge-module">${escapeHtml(mod.label || mod.name)}</span>
            <div class="text-muted mt-1" style="font-size:0.72rem;">${escapeHtml(mod.name)}</div>
        </td>`;

        if (actionCount === 0) {
            bodyHtml += `<td class="sticky-left-2 text-muted">—</td>`;
            companies.forEach(() => { bodyHtml += '<td class="perm-cell text-muted">无动作</td>'; });
            bodyHtml += '</tr>';
            return;
        }

        mod.actions.forEach((act, idx) => {
            if (idx > 0) {
                bodyHtml += `<tr data-module-id="${mod.id}" data-action-id="${act.id}">`;
            } else {
                bodyHtml += `<tr data-module-id="${mod.id}" data-action-id="${act.id}">`;
            }
            bodyHtml += `<td class="sticky-left-2">${escapeHtml(act.label || act.name)}</td>`;

            companies.forEach(comp => {
                // 找该用户-公司-模块-动作的记录
                const rec = matrix.find(
                    r => r.company_id === comp.id &&
                         r.module_id === mod.id &&
                         r.action_id === act.id
                );
                const isGranted = rec && rec.is_granted;
                const key = `${comp.id}-${mod.id}-${act.id}`;
                const hasChange = unsavedChanges.has(key);
                const cellClass = hasChange ? 'perm-cell unsaved' : 'perm-cell';

                bodyHtml += `<td class="${cellClass}" data-company="${comp.id}" data-module="${mod.id}" data-action="${act.id}">
                    <input type="checkbox"
                        ${isGranted ? 'checked' : ''}
                        onchange="onPermChange(this)"
                        title="${escapeHtml(comp.name)} / ${escapeHtml(mod.label)} / ${escapeHtml(act.label)}">
                </td>`;
            });

            bodyHtml += '</tr>';
        });
    });

    tbody.innerHTML = bodyHtml;
}

// ─── 交互 ─────────────────────────────────────────────────────────────────────
function onPermChange(el) {
    const td = el.closest('td.perm-cell');
    const company = td.dataset.company;
    const module = td.dataset.module;
    const action = td.dataset.action;
    const key = `${company}-${module}-${action}`;

    if (el.checked) {
        unsavedChanges.set(key, true);
    } else {
        unsavedChanges.set(key, false);
    }

    td.classList.add('unsaved');
    document.getElementById('saveBtn').disabled = false;
}

// ─── Save ─────────────────────────────────────────────────────────────────────
async function saveAll() {
    if (!currentUserId || unsavedChanges.size === 0) return;

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>保存中...';

    try {
        // 把 Map 转为 {company_id, module_id, action_id, is_granted} 数组
        const updates = [];
        unsavedChanges.forEach((isGranted, key) => {
            const [company_id, module_id, action_id] = key.split('-').map(Number);
            updates.push({ company_id, module_id, action_id, is_granted });
        });

        const resp = await fetch(
            '/api/core/user-company-permissions/matrix_bulk_update/',
            {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId, updates }),
            }
        );

        const status = resp.status;
        let data = {};
        if (status >= 200 && status < 300) {
            data = await Promise.race([
                resp.clone().json(),
                new Promise(resolve => setTimeout(() => resolve({}), 8000))
            ]).catch(() => ({}));
        }

        if (!resp.ok) {
            throw new Error(data.detail || `HTTP ${status}`);
        }

        unsavedChanges.clear();
        await loadMatrix();
        alert(data.detail || `保存成功（${updates.length} 项）`);
    } catch (e) {
        alert('保存失败: ' + e.message);
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="bi bi-save me-1"></i>保存修改';
    }
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
{% endblock %}
