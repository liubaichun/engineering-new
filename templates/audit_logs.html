{% extends "base_content.html" %}

{% block title %}操作审计日志 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.summary-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
}
.summary-item {
    background: var(--card-bg);
    border-radius: var(--card-radius);
    padding: 14px 20px;
    flex: 1;
    box-shadow: var(--card-shadow);
}
.summary-item .num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text-primary);
}
.summary-item .label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 2px;
}
.summary-item.highlight {
    border-left: 3px solid var(--primary);
}
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-muted);
}
.loading i { font-size: 1.5rem; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
.detail-panel {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 480px;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    z-index: 200;
    overflow-y: auto;
}
.detail-panel.show { display: block; }
.detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f8fafc;
}
.detail-header h4 { margin: 0; font-size: 1rem; font-weight: 600; }
.detail-body { padding: 24px; }
.detail-meta { display: grid; grid-template-columns: 80px 1fr; gap: 12px; font-size: 0.88rem; }
.detail-meta dt { color: var(--text-muted); font-size: 0.8rem; }
.detail-meta dd { margin: 0; color: var(--text-primary); }
.detail-section { margin-bottom: 24px; }
.detail-section-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
}
.changes-json {
    background: #0f172a;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
}
.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 199;
}
.overlay.show { display: block; }
.filter-bar {
    padding: 16px 20px;
    background: #f8fafc;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}
.pagination-wrapper {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
}
.badge-action { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.badge-create { background: #dcfce7; color: #166534; }
.badge-update { background: #fef3c7; color: #92400e; }
.badge-delete { background: #fee2e2; color: #991b1b; }
.badge-approve { background: #dbeafe; color: #1e40af; }
.badge-reject { background: #fee2e2; color: #991b1b; }
.badge-permission_grant { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
.badge-permission_revoke { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
.badge-app { background: #e0e7ff; color: #3730a3; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
.obj-repr { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; color: #475569; }
.changes-preview { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; color: var(--text-muted); font-size: 0.8rem; }
</style>
{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <div>
        <h4><i class="bi bi-clock-history me-2"></i>操作审计日志</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">查看所有系统操作记录</p>
    </div>
    <div>
        <button class="btn btn-primary btn-sm" onclick="exportLogs()">
            <i class="bi bi-download me-1"></i>导出
        </button>
    </div>
</div>

<!-- 汇总统计 -->
<div class="summary-bar" id="summaryBar">
    <div class="summary-item highlight">
        <div class="num" id="totalCount">—</div>
        <div class="label">总记录数</div>
    </div>
    <div class="summary-item">
        <div class="num" id="createCount">—</div>
        <div class="label">新增</div>
    </div>
    <div class="summary-item">
        <div class="num" id="updateCount">—</div>
        <div class="label">修改</div>
    </div>
    <div class="summary-item">
        <div class="num" id="deleteCount">—</div>
        <div class="label">删除</div>
    </div>
    <div class="summary-item">
        <div class="num" id="todayCount">—</div>
        <div class="label">今日操作</div>
    </div>
</div>

<!-- 主表卡片 -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>审计记录</h5>
    </div>
    <div class="filter-bar">
        <select id="filterApp" class="form-select form-select-sm" style="width: auto;" onchange="loadLogs(1)">
            <option value="">全部应用</option>
            <option value="finance">财务管理</option>
            <option value="crm">客户管理</option>
            <option value="tasks">任务管理</option>
            <option value="equipment">设备管理</option>
            <option value="approvals">审批管理</option>
            <option value="core">系统核心</option>
        </select>
        <select id="filterAction" class="form-select form-select-sm" style="width: auto;" onchange="loadLogs(1)">
            <option value="">全部操作</option>
            <option value="create">新增</option>
            <option value="update">修改</option>
            <option value="delete">删除</option>
            <option value="approve">审批通过</option>
            <option value="reject">审批拒绝</option>
            <option value="permission_grant">权限授予</option>
            <option value="permission_revoke">权限撤销</option>
        </select>
        <input type="text" id="filterUser" class="form-control form-control-sm" placeholder="操作用户" style="width: 130px;" onkeyup="if(event.key==='Enter')loadLogs(1)">
        <input type="date" id="filterDateFrom" class="form-control form-control-sm" style="width: 150px;" onchange="loadLogs(1)">
        <input type="date" id="filterDateTo" class="form-control form-control-sm" style="width: 150px;" onchange="loadLogs(1)">
        <button class="btn btn-primary btn-sm" onclick="loadLogs(1)">
            <i class="bi bi-search"></i> 搜索
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
            <i class="bi bi-x-circle"></i> 清空
        </button>
        <select class="form-select form-select-sm" id="pageSize" style="width: auto;" onchange="changePageSize()">
            <option value="20">20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
        </select>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <div id="tableContainer">
                <div class="loading"><i class="bi bi-arrow-repeat"></i> 加载中...</div>
            </div>
        </div>
        <div class="pagination-wrapper" id="paginationWrapper" style="display:none;">
            <div class="pagination-info" id="paginationInfo"></div>
            <ul class="pagination mb-0" id="pagination"></ul>
        </div>
    </div>
</div>

<!-- 详情面板 -->
<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
    <div class="detail-header">
        <h4><i class="bi bi-info-circle me-2"></i>操作详情</h4>
        <button class="btn btn-outline-secondary btn-sm" onclick="closeDetail()">
            <i class="bi bi-x"></i>
        </button>
    </div>
    <div class="detail-body" id="detailBody"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 全局状态
let currentPage = 1;
let pageSize = 20;
let totalCount = 0;

async function loadLogs(page = 1) {
    currentPage = page;
    const container = document.getElementById('tableContainer');
    container.innerHTML = '<div class="loading"><i class="bi bi-arrow-repeat"></i> 加载中...</div>';

    const appLabel = document.getElementById('filterApp').value;
    const action = document.getElementById('filterAction').value;
    const username = document.getElementById('filterUser').value;
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;

    const params = new URLSearchParams({
        page: currentPage, page_size: pageSize,
        app_label: appLabel, action: action,
        username: username, date_from: dateFrom, date_to: dateTo,
    });

    try {
        // 统计独立加载（不阻塞列表）
        loadStatistics();

        // 加载日志列表
        const res = await fetch(`/api/core/operation-audit-logs/?${params}`, { credentials: 'include' });
        if (res.status === 403 || res.status === 401) {
            container.innerHTML = '<div class="empty-state"><i class="bi bi-lock"></i><p>无权限查看审计日志（仅管理员可访问）</p></div>';
            return;
        }
        const data = await res.json();
        totalCount = data.count || 0;
        renderTable(data.results || []);
        renderPagination();
    } catch (e) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>加载失败：' + e.message + '</p></div>';
    }
}

// 独立加载统计数据
async function loadStatistics() {
    try {
        const res = await fetch(`/api/core/operation-audit-logs/statistics/`, { credentials: 'include' });
        if (res.ok) {
            const stats = await res.json();
            document.getElementById('totalCount').textContent = stats.total ?? 0;
            document.getElementById('createCount').textContent = stats.create ?? 0;
            document.getElementById('updateCount').textContent = stats.update ?? 0;
            document.getElementById('deleteCount').textContent = stats.delete ?? 0;
            document.getElementById('todayCount').textContent = stats.today ?? 0;
        }
    } catch (e) {
        console.error('加载审计统计失败', e);
    }
}

function renderTable(logs) {
    const container = document.getElementById('tableContainer');
    if (!logs || logs.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-clipboard"></i><p>暂无审计记录</p></div>';
        return;
    }

    const rows = logs.map(log => {
        const actionClass = log.action === 'create' ? 'badge-create' : log.action === 'update' ? 'badge-update' : log.action === 'delete' ? 'badge-delete' : log.action === 'permission_grant' ? 'badge-permission_grant' : log.action === 'permission_revoke' ? 'badge-permission_revoke' : log.action === 'approve' ? 'badge-approve' : 'badge-update';
        const time = new Date(log.created_at).toLocaleString('zh-CN');
        const changes = log.changes ? JSON.parse(log.changes) : {};
        const changesPreview = changes.type ? `${changes.type}: ${Object.keys(changes.data || {}).slice(0,3).join(', ')}` : (log.changes ? log.changes.slice(0,60) : '');

        return `<tr onclick="showDetail(${log.id})" style="cursor:pointer">
            <td style="width:140px"><span class="badge-action ${actionClass}">${log.action_display || log.action}</span></td>
            <td><span class="badge-app">${log.app_label_display || log.app_label}</span><br><small style="color:#94a3b8">${log.model_name}</small></td>
            <td><strong>${log.username}</strong></td>
            <td><span class="obj-repr" title="${escHtml(log.object_repr)}">${escHtml(log.object_repr || '—')}</span></td>
            <td><span class="changes-preview">${escHtml(changesPreview || '—')}</span></td>
            <td style="color:#94a3b8;font-size:0.8rem">${time}</td>
            <td><small style="color:#94a3b8">${log.ip_address || '—'}</small></td>
        </tr>`;
    }).join('');

    container.innerHTML = `<table class="table table-hover">
        <thead>
            <tr>
                <th>操作</th>
                <th>应用/模型</th>
                <th>用户</th>
                <th>对象</th>
                <th>变更摘要</th>
                <th>时间</th>
                <th>IP</th>
            </tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>`;
}

async function showDetail(id) {
    const res = await fetch(`/api/core/operation-audit-logs/${id}/`, { credentials: 'include' });
    if (!res.ok) return;
    const log = await res.json();
    const changes = log.changes ? JSON.stringify(JSON.parse(log.changes), null, 2) : '无';
    document.getElementById('detailBody').innerHTML = `
        <div class="detail-section">
            <div class="detail-section-title">基本信息</div>
            <dl class="detail-meta">
                <dt>日志ID</dt><dd>${log.id}</dd>
                <dt>操作用户</dt><dd>${log.username} ${log.user_name ? '(' + log.user_name + ')' : ''}</dd>
                <dt>操作类型</dt><dd><span class="badge-action badge-${log.action}">${log.action_display}</span></dd>
                <dt>应用</dt><dd>${log.app_label_display} (${log.app_label})</dd>
                <dt>模型</dt><dd>${log.model_name}</dd>
                <dt>对象ID</dt><dd>${log.object_id || '—'}</dd>
                <dt>对象</dt><dd>${escHtml(log.object_repr || '—')}</dd>
                <dt>关联审批</dt><dd>${log.approval_flow_id || '—'}</dd>
                <dt>IP地址</dt><dd>${log.ip_address || '—'}</dd>
                <dt>User Agent</dt><dd style="word-break:break-all;font-size:0.8rem">${log.user_agent || '—'}</dd>
                <dt>操作时间</dt><dd>${new Date(log.created_at).toLocaleString('zh-CN')}</dd>
            </dl>
        </div>
        <div class="detail-section">
            <div class="detail-section-title">变更内容</div>
            <pre class="changes-json">${changes}</pre>
        </div>`;
    document.getElementById('overlay').classList.add('show');
    document.getElementById('detailPanel').classList.add('show');
}

function closeDetail() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('detailPanel').classList.remove('show');
}

function updateSummary(data) {
    document.getElementById('totalCount').textContent = data.count || 0;
    const logs = data.results || [];
    document.getElementById('createCount').textContent = logs.filter(l => l.action === 'create').length;
    document.getElementById('updateCount').textContent = logs.filter(l => l.action === 'update').length;
    document.getElementById('deleteCount').textContent = logs.filter(l => l.action === 'delete').length;
    const today = new Date().toDateString();
    document.getElementById('todayCount').textContent = logs.filter(l => new Date(l.created_at).toDateString() === today).length;
}

function renderPagination() {
    const totalPages = Math.ceil(totalCount / pageSize);
    document.getElementById('paginationWrapper').style.display = totalCount > 0 ? 'flex' : 'none';
    document.getElementById('paginationInfo').textContent = `共 ${totalCount} 条记录`;
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<li class="page-item"><a class="page-link" href="#" onclick="loadLogs(${currentPage-1});return false">&laquo;</a></li>`;
    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, currentPage + 2);
    if (start > 1) html += `<li class="page-item"><a class="page-link" href="#" onclick="loadLogs(1);return false">1</a></li>`;
    if (start > 2) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
    for (let i = start; i <= end; i++) {
        html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="loadLogs(${i});return false">${i}</a></li>`;
    }
    if (end < totalPages) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
    if (currentPage < totalPages) html += `<li class="page-item"><a class="page-link" href="#" onclick="loadLogs(${currentPage+1});return false">&raquo;</a></li>`;
    document.getElementById('pagination').innerHTML = html;
}

function clearFilters() {
    document.getElementById('filterApp').value = '';
    document.getElementById('filterAction').value = '';
    document.getElementById('filterUser').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    loadLogs(1);
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportLogs() {
    const appLabel = document.getElementById('filterApp').value;
    const action = document.getElementById('filterAction').value;
    const params = new URLSearchParams({ page_size: 1000, app_label: appLabel, action: action });
    window.open(`/api/core/operation-audit-logs/?${params}`, '_blank');
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSize').value);
    currentPage = 1;
    loadLogs(1);
}

document.addEventListener('DOMContentLoaded', () => loadLogs(1));
</script>
{% endblock %}
