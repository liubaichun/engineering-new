{% extends "base.html" %}

{% block title %}项目甘特图{% endblock %}

{% block content %}
<style>
* { box-sizing: border-box; }
.gantt-page { max-width: 1400px; margin: 0 auto; padding: 20px; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.stat-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.stat-chip { background:#fff; border-radius:8px; padding:8px 16px; display:flex; align-items:center; gap:8px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
.stat-chip .num { font-size:1.4rem; font-weight:700; color:#1e293b; }
.stat-chip .label { font-size:0.8rem; color:#64748b; }
.filter-row { background:#fff; border-radius:10px; padding:12px 16px; margin-bottom:16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.filter-row .form-select, .filter-row .form-control { font-size:13px; }
.gantt-card { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.1); overflow:hidden; }
.gantt-tabs { display:flex; border-bottom:1px solid #e2e8f0; padding:0 16px; background:#f8fafc; }
.gantt-tab { padding:10px 20px; cursor:pointer; font-size:13px; color:#64748b; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .2s; }
.gantt-tab:hover { color:#1e293b; }
.gantt-tab.active { color:#3b82f6; border-bottom-color:#3b82f6; font-weight:600; }
.gantt-toolbar { padding:12px 16px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; justify-content:space-between; }
.gantt-toolbar .view-title { font-weight:700; color:#1e293b; font-size:0.95rem; }
.gantt-toolbar .date-range { font-size:0.8rem; color:#94a3b8; }
.gantt-body { overflow-x:auto; padding:0; }
.gantt-table { width:100%; border-collapse:collapse; font-size:0.82rem; min-width:900px; }
.gantt-table thead tr { background:#f8fafc; }
.gantt-table th { padding:8px 12px; text-align:left; font-weight:600; color:#475569; border-bottom:2px solid #e2e8f0; white-space:nowrap; font-size:0.78rem; }
.gantt-table th.gantt-col { min-width:200px; }
.gantt-table th.date-col { min-width:32px; text-align:center; font-size:0.68rem; color:#94a3b8; font-weight:500; padding:6px 4px; }
.gantt-table th.date-col.weekend { background:#fef2f2; color:#fca5a5; }
.gantt-table td { padding:8px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
.gantt-table tr:hover td { background:#f8fafc; }
.gantt-table tr.project-row td { background:#fafbfc; font-weight:600; }
.gantt-table tr.project-row td:first-child { color:#1e293b; }
.gantt-table td.bar-cell { position:relative; padding:4px 0; }
.task-name { font-weight:500; color:#334155; font-size:0.82rem; }
.task-meta { font-size:0.72rem; color:#94a3b8; }
.gantt-bar { position:absolute; height:20px; border-radius:4px; font-size:0.68rem; color:#fff; display:flex; align-items:center; padding:0 6px; font-weight:600; white-space:nowrap; overflow:hidden; min-width:24px; cursor:pointer; top:50%; transform:translateY(-50%); transition:opacity .2s; }
.gantt-bar:hover { opacity:0.85; filter:brightness(1.1); }
.gantt-bar.project-bar { height:22px; top:50%; transform:translateY(-50%); }
.gantt-bar.draft { background:#94a3b8; }
.gantt-bar.active { background:#3b82f6; }
.gantt-bar.completed { background:#10b981; }
.gantt-bar.archived { background:#64748b; }
.gantt-bar.pending { background:#fbbf24; }
.gantt-bar.in_progress { background:#3b82f6; }
.gantt-bar.review { background:#f59e0b; }
.gantt-bar.cancelled { background:#ef4444; }
.gantt-bar.rejected { background:#ef4444; }
.gantt-today { position:absolute; top:0; bottom:0; width:2px; background:#ef4444; z-index:10; }
.gantt-empty { text-align:center; padding:60px 20px; color:#94a3b8; }
.gantt-empty i { font-size:3rem; margin-bottom:12px; display:block; }
.priority-low { color:#94a3b8; }
.priority-medium { color:#3b82f6; }
.priority-high { color:#f59e0b; }
.priority-critical { color:#ef4444; }
.badge-st { padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:600; }
.st-draft { background:#f1f5f9; color:#64748b; }
.st-active { background:#dbeafe; color:#2563eb; }
.st-completed { background:#d1fae5; color:#059669; }
.st-archived { background:#f1f5f9; color:#94a3b8; }
.badge-appr { padding:2px 6px; border-radius:4px; font-size:0.68rem; font-weight:600; }
.appr-draft { background:#f1f5f9; color:#64748b; }
.appr-pending { background:#fef3c7; color:#d97706; }
.appr-approved { background:#d1fae5; color:#059669; }
.appr-rejected { background:#fee2e2; color:#dc2626; }
.progress-mini { font-size:0.72rem; color:#94a3b8; }
.project-expand { cursor:pointer; margin-right:4px; color:#94a3b8; font-size:0.9rem; }
.project-expand:hover { color:#3b82f6; }
.collapse-icon { transition:transform .2s; display:inline-block; }
.collapse-icon.collapsed { transform:rotate(-90deg); }
.chart-container { height:400px; padding:16px; }
</style>

<div class="gantt-page">
    <div class="page-header">
        <h4><i class="bi bi-bar-chart-fill" style="color:#3b82f6"></i> 项目甘特图</h4>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" style="width:130px" id="filter-status">
                <option value="">全部状态</option>
                <option value="draft">草稿</option>
                <option value="active">进行中</option>
                <option value="completed">已完成</option>
                <option value="archived">已归档</option>
            </select>
            <select class="form-select form-select-sm" style="width:140px" id="filter-owner">
                <option value="">全部负责人</option>
            </select>
            <button class="btn btn-outline-primary btn-sm" onclick="loadGantt()">
                <i class="bi bi-search"></i> 搜索
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="exportGantt()">
                <i class="bi bi-download"></i> 导出
            </button>
        </div>
    </div>

    <!-- 统计 -->
    <div class="stat-bar">
        <div class="stat-chip"><span class="num" id="stat-total">-</span><span class="label">项目总数</span></div>
        <div class="stat-chip" style="border-left:3px solid #3b82f6"><span class="num" id="stat-active">-</span><span class="label">进行中</span></div>
        <div class="stat-chip" style="border-left:3px solid #10b981"><span class="num" id="stat-completed">-</span><span class="label">已完成</span></div>
        <div class="stat-chip" style="border-left:3px solid #fbbf24"><span class="num" id="stat-pending">-</span><span class="label">待审批</span></div>
        <div class="stat-chip" style="border-left:3px solid #94a3b8"><span class="num" id="stat-task-count">-</span><span class="label">任务总数</span></div>
    </div>

    <!-- Tab -->
    <div class="gantt-card">
        <div class="gantt-tabs">
            <div class="gantt-tab active" onclick="switchView('table')" id="tab-table">
                <i class="bi bi-list-ul"></i> 甘特图
            </div>
            <div class="gantt-tab" onclick="switchView('echarts')" id="tab-echarts">
                <i class="bi bi-bar-chart"></i> 图表视图
            </div>
        </div>

        <!-- 甘特图视图 -->
        <div id="view-table">
            <div class="gantt-toolbar">
                <div>
                    <span class="view-title" id="gantt-title">项目甘特图</span>
                    <span class="date-range ms-2" id="gantt-range"></span>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <div class="d-flex align-items-center gap-1" style="font-size:12px;color:#64748b;">
                        <span style="width:12px;height:12px;border-radius:2px;background:#94a3b8;display:inline-block;"></span>草稿
                        <span style="width:12px;height:12px;border-radius:2px;background:#3b82f6;display:inline-block;"></span>进行中
                        <span style="width:12px;height:12px;border-radius:2px;background:#10b981;display:inline-block;"></span>已完成
                        <span style="width:12px;height:12px;border-radius:2px;background:#ef4444;display:inline-block;"></span>异常
                    </div>
                </div>
            </div>
            <div class="gantt-body" id="gantt-container"></div>
        </div>

        <!-- ECharts 视图 -->
        <div id="view-echarts" style="display:none;">
            <div class="chart-container"><div id="echarts-main" style="height:380px;"></div></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
const API_PROJECTS = '/api/tasks/projects/';
const API_GANTT = '/api/tasks/projects/gantt_all/';
let ganttData = [];
let collapsed = {};

document.addEventListener('DOMContentLoaded', () => {
    loadGantt();
    loadOwners();
});

async function loadOwners() {
    try {
        const r = await fetch(API_PROJECTS + '?page_size=200', { credentials: 'include' });
        const d = await r.json();
        const list = d.results || d;
        const sel = document.getElementById('filter-owner');
        const owners = [...new Set(list.map(p => p.owner).filter(Boolean))];
        sel.innerHTML = '<option value="">全部负责人</option>' +
            owners.map(o => `<option value="${o}">${o}</option>`).join('');
    } catch(e) {}
}

async function loadGantt() {
    const params = new URLSearchParams();
    const st = document.getElementById('filter-status').value;
    const owner = document.getElementById('filter-owner').value;
    if (st) params.append('status', st);
    if (owner) params.append('owner', owner);

    try {
        const r = await fetch(API_GANTT + '?' + params.toString(), { credentials: 'include' });
        ganttData = await r.json();
        renderStats(ganttData);
        renderGantt(ganttData);
        renderECharts(ganttData);
    } catch(e) {
        console.error(e);
        document.getElementById('gantt-container').innerHTML = '<div class="gantt-empty"><i class="bi bi-exclamation-triangle"></i>加载失败</div>';
    }
}

function renderStats(data) {
    const projects = data.filter(d => d.type === 'project');
    const tasks = data.filter(d => d.type === 'task');
    document.getElementById('stat-total').textContent = projects.length;
    document.getElementById('stat-active').textContent = projects.filter(p => p.status === 'active').length;
    document.getElementById('stat-completed').textContent = projects.filter(p => p.status === 'completed').length;
    document.getElementById('stat-pending').textContent = projects.filter(p => p.status === 'draft').length;
    document.getElementById('stat-task-count').textContent = tasks.length;
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGantt(data) {
    const container = document.getElementById('gantt-container');
    const projects = data.filter(d => d.type === 'project');
    const tasks = data.filter(d => d.type === 'task');

    if (!projects.length) {
        container.innerHTML = '<div class="gantt-empty"><i class="bi bi-calendar-x"></i>暂无项目数据<br><small>请先在项目管理中创建项目并设置时间范围</small></div>';
        document.getElementById('gantt-range').textContent = '';
        return;
    }

    const allDates = data.flatMap(d => {
        const r = [];
        if (d.start) r.push(new Date(d.start));
        if (d.end) r.push(new Date(d.end));
        return r;
    });
    if (!allDates.length) {
        container.innerHTML = '<div class="gantt-empty"><i class="bi bi-calendar-x"></i>项目暂无时间范围<br><small>请在项目详情中设置开始和结束日期</small></div>';
        return;
    }
    const minDate = new Date(Math.min(...allDates.map(d => d.getTime())));
    const maxDate = new Date(Math.max(...allDates.map(d => d.getTime())));
    minDate.setDate(minDate.getDate() - 3);
    maxDate.setDate(maxDate.getDate() + 7);
    const totalDays = Math.ceil((maxDate - minDate) / 86400000);
    const dayWidth = 32;
    const totalWidth = totalDays * dayWidth;

    let headerHtml = `<table class="gantt-table"><thead><tr><th class="gantt-col" style="width:240px;">任务 / 项目</th>`;
    headerHtml += `<th style="min-width:${totalWidth}px;">`;

    let monthHtml = '<div style="display:flex;">';
    let cur = new Date(minDate);
    while (cur <= maxDate) {
        const monthEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
        const daysInMonth = monthEnd.getDate();
        monthHtml += `<div style="width:${daysInMonth * dayWidth}px;min-width:${daysInMonth * dayWidth}px;text-align:center;font-size:0.75rem;font-weight:700;color:#475569;border-right:1px solid #e2e8f0;padding:4px 0;">${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}</div>`;
        cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    }
    monthHtml += '</div>';

    let dayHtml = '<div style="display:flex;">';
    cur = new Date(minDate);
    while (cur <= maxDate) {
        const isWeekend = cur.getDay() === 0 || cur.getDay() === 6;
        dayHtml += `<div class="date-col${isWeekend ? ' weekend' : ''}" style="width:${dayWidth}px;min-width:${dayWidth}px;">${cur.getDate()}</div>`;
        cur.setDate(cur.getDate() + 1);
    }
    dayHtml += '</div>';

    headerHtml += monthHtml + dayHtml + '</th></tr></thead></table>';
    document.getElementById('gantt-range').textContent =
        `${minDate.getFullYear()}-${minDate.getMonth()+1}-${minDate.getDate()} ~ ${maxDate.getFullYear()}-${maxDate.getMonth()+1}-${maxDate.getDate()} · ${projects.length} 个项目`;

    let bodyHtml = '<table class="gantt-table"><tbody>';
    const today = new Date();
    today.setHours(0,0,0,0);
    const todayOffset = (today - minDate) / 86400000 * dayWidth;

    projects.forEach(proj => {
        const pid = proj.id;
        const projTasks = tasks.filter(t => t.parent === pid);
        const isCollapsed = collapsed[pid];
        const projStart = proj.start ? new Date(proj.start) : null;
        const projEnd = proj.end ? new Date(proj.end) : null;

        bodyHtml += `<tr class="project-row">`;
        bodyHtml += `<td>
            <span class="project-expand" onclick="toggleProject(${pid})">
                <i class="bi bi-chevron-down collapse-icon${isCollapsed ? ' collapsed' : ''}" id="icon-${pid}"></i>
            </span>
            <span class="task-name">${escapeHtml(proj.name)}</span>
            <div class="task-meta">${escapeHtml(proj.owner || '')} · ${projTasks.length} 个任务</div>
        </td>`;
        bodyHtml += `<td class="bar-cell" style="min-width:${totalWidth}px;">`;
        if (projStart && projEnd) {
            const startOffset = Math.max(0, (projStart - minDate) / 86400000) * dayWidth;
            const duration = Math.max(1, (projEnd - projStart) / 86400000 + 1);
            const barWidth = Math.max(30, duration * dayWidth - 4);
            const progress = proj.progress || 0;
            const progressWidth = barWidth * progress / 100;
            bodyHtml += `<div class="gantt-bar project-bar ${proj.status}" style="left:${startOffset+2}px;width:${barWidth}px;" title="${escapeHtml(proj.name)} | ${progress}%">`;
            if (progress > 0) {
                bodyHtml += `<div style="position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.3);width:${progressWidth}px;border-radius:4px;"></div>`;
            }
            bodyHtml += `<span style="position:relative;z-index:1">${progress}%</span></div>`;
        }
        if (today >= minDate && today <= maxDate) {
            bodyHtml += `<div class="gantt-today" style="left:${todayOffset}px;"></div>`;
        }
        bodyHtml += `</td></tr>`;

        if (!isCollapsed) {
            projTasks.forEach(task => {
                const taskStart = task.start ? new Date(task.start) : null;
                const taskEnd = task.end ? new Date(task.end) : null;
                const priorityColors = { low: '#94a3b8', medium: '#3b82f6', high: '#f59e0b', critical: '#ef4444' };
                const barColor = priorityColors[task.priority] || '#3b82f6';

                bodyHtml += `<tr>`;
                bodyHtml += `<td style="padding-left:32px;">
                    <div class="task-name" style="font-size:0.78rem;">${escapeHtml(task.name)}</div>
                    <div class="task-meta">${escapeHtml(task.assignee || '')}</div>
                </td>`;
                bodyHtml += `<td class="bar-cell" style="min-width:${totalWidth}px;position:relative;">`;
                if (taskStart && taskEnd) {
                    const startOffset = Math.max(0, (taskStart - minDate) / 86400000) * dayWidth;
                    const duration = Math.max(1, (taskEnd - taskStart) / 86400000 + 1);
                    const barWidth = Math.max(24, duration * dayWidth - 4);
                    const statusLabel = { pending: '待办', in_progress: '进行中', completed: '完成', cancelled: '取消' }[task.status] || task.status;
                    bodyHtml += `<div class="gantt-bar ${task.status}" style="left:${startOffset+2}px;width:${barWidth}px;background:${barColor};" title="${escapeHtml(task.name)} | ${statusLabel}">${escapeHtml(statusLabel)}</div>`;
                }
                if (today >= minDate && today <= maxDate) {
                    bodyHtml += `<div class="gantt-today" style="left:${todayOffset}px;"></div>`;
                }
                bodyHtml += `</td></tr>`;
            });
        }
    });
    bodyHtml += '</tbody></table>';

    container.innerHTML = '<div style="overflow-x:auto;">' + headerHtml + bodyHtml + '</div>';
}

function toggleProject(pid) {
    collapsed[pid] = !collapsed[pid];
    renderGantt(ganttData);
}

function renderECharts(data) {
    if (!document.getElementById('echarts-main')) return;
    const chartDom = document.getElementById('echarts-main');
    const chart = echarts.init(chartDom);
    const projects = data.filter(d => d.type === 'project');

    const getStatusColor = (status) => {
        const map = { draft: '#94a3b8', active: '#3b82f6', completed: '#10b981', archived: '#64748b' };
        return map[status] || '#94a3b8';
    };

    const chartData = projects.map((p, i) => {
        const start = p.start ? new Date(p.start) : null;
        const end = p.end ? new Date(p.end) : null;
        return {
            name: p.name,
            value: [
                i,
                start ? start.getTime() : '',
                end ? end.getTime() : '',
                p.progress || 0,
            ],
            itemStyle: { color: getStatusColor(p.status) },
        };
    });

    const option = {
        tooltip: {
            formatter: (p) => {
                const proj = projects[p.value[0]];
                if (!proj) return '';
                const start = proj.start ? new Date(proj.start).toLocaleDateString() : '-';
                const end = proj.end ? new Date(proj.end).toLocaleDateString() : '-';
                return `<b>${proj.name}</b><br/>状态: ${proj.status}<br/>进度: ${proj.progress || 0}%<br/>开始: ${start}<br/>结束: ${end}`;
            }
        },
        grid: { top: 10, right: 40, bottom: 30, left: 10, containLabel: true },
        xAxis: {
            type: 'time',
            axisLabel: { fontSize: 11, color: '#64748b' },
            splitLine: { lineStyle: { color: '#f1f5f9' } },
        },
        yAxis: {
            type: 'category',
            data: projects.map(p => p.name),
            axisLabel: { fontSize: 12, color: '#334155' },
            inverse: true,
        },
        series: [{
            type: 'custom',
            renderItem: (params, api) => {
                const categoryIndex = api.value(0);
                const start = api.coord([api.value(1), categoryIndex]);
                const end = api.coord([api.value(2), categoryIndex]);
                const height = 18;
                const y = start[1] - height / 2;
                const proj = projects[categoryIndex];
                const progress = api.value(3) || 0;
                const barWidth = Math.abs(end[0] - start[0]);
                const textWidth = barWidth > 40 ? barWidth : 0;

                return {
                    type: 'group',
                    children: [
                        {
                            type: 'rect',
                            shape: { x: start[0], y, width: barWidth, height, r: 4 },
                            style: { fill: getStatusColor(proj?.status || 'draft'), opacity: 0.85 },
                        },
                        {
                            type: 'rect',
                            shape: { x: start[0], y, width: Math.max(0, barWidth * progress / 100), height, r: [4, 0, 0, 4] },
                            style: { fill: 'rgba(255,255,255,0.25)' },
                        },
                        {
                            type: 'text',
                            style: {
                                x: start[0] + 6,
                                y: y + height / 2,
                                text: `${progress}%`,
                                fill: '#fff',
                                fontSize: 10,
                                fontWeight: 'bold',
                                textVerticalAlign: 'middle',
                            }
                        }
                    ]
                };
            },
            encode: {
                x: [1, 2],
                y: 0,
            },
            data: chartData,
        }],
    };

    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
}

function switchView(view) {
    document.getElementById('tab-table').classList.toggle('active', view === 'table');
    document.getElementById('tab-echarts').classList.toggle('active', view === 'echarts');
    document.getElementById('view-table').style.display = view === 'table' ? '' : 'none';
    document.getElementById('view-echarts').style.display = view === 'echarts' ? '' : 'none';
    if (view === 'echarts') {
        setTimeout(() => {
            const chart = echarts.getInstanceByDom(document.getElementById('echarts-main'));
            if (chart) chart.resize();
        }, 100);
    }
}

function exportGantt() {
    const projects = ganttData.filter(d => d.type === 'project');
    const tasks = ganttData.filter(d => d.type === 'task');
    let csv = '\uFEFF项目名称,项目状态,进度,负责人,开始日期,结束日期,任务数\n';
    projects.forEach(p => {
        const projTasks = tasks.filter(t => t.parent === p.id);
        csv += `"${p.name}","${p.status}","${p.progress||0}%","${p.owner||''}","${p.start||''}","${p.end||''}","${projTasks.length}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `项目甘特图_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
{% endblock %}
