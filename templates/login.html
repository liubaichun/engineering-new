<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 企业信息化管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        --primary: #3b82f6;
        --primary-dark: #2563eb;
        --primary-light: #dbeafe;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
        background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .login-container {
        width: 100%;
        max-width: 440px;
    }

    .login-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        overflow: hidden;
        animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
        background: linear-gradient(135deg, var(--primary) 0%, #60a5fa 100%);
        padding: 40px 32px;
        text-align: center;
        color: #fff;
    }

    .login-header .icon {
        width: 64px;
        height: 64px;
        background: rgba(255,255,255,0.2);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 1.8rem;
    }

    .login-header h3 {
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 4px;
    }

    .login-header p {
        opacity: 0.85;
        font-size: 0.9rem;
    }

    .login-body {
        padding: 32px;
    }

    .form-label {
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 8px;
        font-size: 0.9rem;
    }

    .form-control {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.95rem;
        transition: all 0.2s;
    }

    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .input-group {
        position: relative;
    }

    .input-group .form-control {
        padding-right: 44px;
    }

    .input-group-text {
        position: absolute;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 8px 12px;
        z-index: 5;
    }

    .input-group-text:hover { color: var(--primary); }

    .form-check-input {
        width: 18px;
        height: 18px;
        border-radius: 5px;
        margin-top: 0;
    }

    .form-check-input:checked {
        background-color: var(--primary);
        border-color: var(--primary);
    }

    .form-check-label {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-left: 4px;
    }

    .btn-login {
        background: var(--primary);
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-weight: 600;
        font-size: 1rem;
        color: #fff;
        transition: all 0.2s;
        width: 100%;
    }

    .btn-login:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(59,130,246,0.35);
    }

    .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    .alert {
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.9rem;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: var(--text-secondary);
        font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
    }

    .register-hint {
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-top: 20px;
    }

    .register-hint a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }

    .register-hint a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
        .login-header { padding: 32px 24px; }
        .login-body { padding: 24px; }
    }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="icon">
                <i class="bi bi-grid-3x3-gap"></i>
            </div>
            <h3>企业信息化管理系统</h3>
            <p>Engineering Management System</p>
        </div>
        
        <div class="login-body">
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
            
            <form id="loginForm" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="请输入用户名" required autocomplete="username">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="请输入密码" required autocomplete="current-password">
                        <span class="input-group-text" onclick="togglePassword()">
                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" name="remember">
                    <label class="form-check-label" for="rememberMe">30天内自动登录</label>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span id="btnText">登 录</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                </button>
            </form>
            
            <div class="divider">或</div>
            
            <div class="register-hint">
                还没有账号？<a href="#" id="goRegister">立即注册</a>
                &nbsp;|&nbsp;
                <a href="/password-reset/" id="forgotPassword">忘记密码</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    var input = document.getElementById('password');
    var icon = document.getElementById('toggleIcon');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-slash';
    }
}

// 获取CSRF token
function getCsrfToken() {
    return document.cookie.split(';').find(row => row.trim().startsWith('csrftoken='))?.split('=')[1];
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var remember = document.getElementById('rememberMe').checked;
    var errorAlert = document.getElementById('errorAlert');
    var loginBtn = document.getElementById('loginBtn');
    var btnText = document.getElementById('btnText');
    var btnSpinner = document.getElementById('btnSpinner');
    
    // 验证
    if (!username) {
        errorAlert.textContent = '请输入用户名';
        errorAlert.classList.remove('d-none');
        return;
    }
    
    if (!password) {
        errorAlert.textContent = '请输入密码';
        errorAlert.classList.remove('d-none');
        return;
    }
    
    errorAlert.classList.add('d-none');
    loginBtn.disabled = true;
    btnText.textContent = '登录中...';
    btnSpinner.classList.remove('d-none');
    
    // 发送登录请求到后端
    fetch('/api/core/auth/login/', {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken()
        },
        body: JSON.stringify({ username, password, remember })
    })
    .then(function(response) {
        if (response.ok) {
            return response.json();
        } else {
            // 解析后端返回的详细错误信息
            return response.json().then(function(errData) {
                var msg = errData?.message || errData?.errors?.non_field_errors?.[0] || '用户名或密码错误';
                throw new Error(msg);
            }).catch(function() {
                throw new Error('登录失败，请检查网络后重试');
            });
        }
    })
    .then(function(data) {
        btnText.textContent = '登录成功';
        btnSpinner.classList.add('d-none');

        setTimeout(function() {
            window.location.href = '/dashboard/';
        }, 500);
    })
    .catch(function(error) {
        errorAlert.textContent = error.message || '登录失败，请重试';
        errorAlert.classList.remove('d-none');
        loginBtn.disabled = false;
        btnText.textContent = '登 录';
        btnSpinner.classList.add('d-none');
    });
});

document.getElementById('goRegister').addEventListener('click', function(e) {
    e.preventDefault();
    window.location.href = '/register/';
});
</script>
</body>
</html>
