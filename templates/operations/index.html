{% extends "base.html" %}

{% block title %}运营管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
iframe.tab-iframe { width: 100% !important; border: none; background: transparent; display: block; }
</style>
{% endblock %}

{% block content %}
<ul class="nav nav-tabs mb-4" id="operationsTab" role="tablist">
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'materials' or not active_tab %} active{% endif %}" href="#" onclick="showTab('materials');return false;">
            <i class="bi bi-box me-1"></i>物料管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'equipment' %} active{% endif %}" href="#" onclick="showTab('equipment');return false;">
            <i class="bi bi-gear me-1"></i>设备管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'repair' %} active{% endif %}" href="#" onclick="showTab('repair');return false;">
            <i class="bi bi-wrench me-1"></i>设备报修
        </a>
    </li>
</ul>

<div class="tab-content" style="width:100%; margin:0 -32px;">
    <div id="materials" style="display:{% if active_tab == 'materials' or not active_tab %}block{% else %}none{% endif %};">
        <iframe src="/materials/" class="tab-iframe" id="frame-materials" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="equipment" style="display:{% if active_tab == 'equipment' %}block{% else %}none{% endif %};">
        <iframe src="/equipment/" class="tab-iframe" id="frame-equipment" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="repair" style="display:{% if active_tab == 'repair' %}block{% else %}none{% endif %};">
        <iframe src="/repair/requests/" class="tab-iframe" id="frame-repair" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
</div>

<script>
function showTab(tab) {
    var tabs = ['materials','equipment','repair'];
    tabs.forEach(function(t) {
        var div = document.getElementById(t);
        var link = document.querySelector('#operationsTab .nav-link[onclick*="'+t+'"]');
        if (t === tab) {
            div.style.display = 'block';
            if (link) link.classList.add('active');
        } else {
            div.style.display = 'none';
            if (link) link.classList.remove('active');
        }
    });
}
function resizeIframe(iframe) {
    try {
        var h = iframe.contentWindow.document.body.scrollHeight;
        if (h > 0) iframe.style.height = Math.max(h + 50, 600) + 'px';
    } catch(e) {}
}
</script>
{% endblock %}
