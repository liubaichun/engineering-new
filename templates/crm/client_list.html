{% extends "base_content.html" %}

{% block title %}客户管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.client-status-active { color: #10b981; }
.client-status-inactive { color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-building me-2"></i>客户管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">管理客户信息和联系人</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="showClientModal()" data-perm="crm:customer:create">
            <i class="bi bi-plus-lg me-1"></i>新建客户
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchName" placeholder="搜索客户名称" onkeyup="filterClients()">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filterCategory" onchange="filterClients()">
                    <option value="">全部分类</option>
                    <option value="enterprise">企业客户</option>
                    <option value="government">政府事业单位</option>
                    <option value="special">特殊客户</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filterStatus" onchange="filterClients()">
                    <option value="">全部状态</option>
                    <option value="true">合作中</option>
                    <option value="false">已停止</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filterCompany" onchange="filterClients()">
                    <option value="">全部公司</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>编码</th>
                        <th>客户名称</th>
                        <th>联系人</th>
                        <th>电话</th>
                        <th>银行账号</th>
                        <th>开户行</th>
                        <th>分类</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>公司</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody">
                    <tr>
                        <td colspan="11" class="text-center py-4">
                            <div class="spinner-border text-primary"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" id="clientPaginationArea" style="display:none;">
            <div class="text-muted" style="font-size:0.875rem;">共 <span id="clientTotalCount">0</span> 条</div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="clientPrevBtn" onclick="clientPrevPage()">上一页</button>
                <span class="mx-2" id="clientPageInfo">1 / 1</span>
                <button class="btn btn-sm btn-outline-secondary" id="clientNextBtn" onclick="clientNextPage()">下一页</button>
                <span class="text-muted mx-1" style="font-size:0.8rem;">跳至</span>
                <input type="number" class="form-control form-control-sm" id="clientJumpPage" min="1" style="width:60px;" onkeypress="if(event.key==='Enter')clientJumpPage()">
                <button class="btn btn-sm btn-outline-primary" onclick="clientJumpPage()">跳转</button>
                <select class="form-select form-select-sm" id="pageSize" style="width: auto;" onchange="changePageSize()">
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- 客户Modal -->
<div class="modal fade" id="clientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="clientModalTitle"><i class="bi bi-building me-2"></i>新建客户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="clientId">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">客户名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="clientName" placeholder="公司或客户名称">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">联系人</label>
                        <input type="text" class="form-control" id="contactPerson" placeholder="联系人姓名">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">联系电话</label>
                        <input type="text" class="form-control" id="contactPhone" placeholder="电话">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="contactEmail" placeholder="email@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">客户分类</label>
                        <select class="form-select" id="clientCategory">
                            <option value="">选择分类</option>
                            <option value="enterprise">企业客户</option>
                            <option value="government">政府事业单位</option>
                            <option value="special">特殊客户</option>
                        </select>
                    </div>
                    <div class="col-md-6" id="clientSourceRow">
                        <label class="form-label">客户来源</label>
                        <div class="input-group">
                            <select class="form-select" id="clientSource">
                                <option value="">选择来源</option>
                            </select>
                            <button class="btn btn-outline-secondary" type="button" onclick="addNewClientSource()" title="新增来源">+</button>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">地址</label>
                        <input type="text" class="form-control" id="address" placeholder="公司地址">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">对方类型</label>
                        <select class="form-select" id="counterpartyType">
                            <option value="">选择类型</option>
                            <option value="enterprise">企业</option>
                            <option value="individual">个人</option>
                            <option value="government">政府/事业单位</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">纳税人识别号</label>
                        <input type="text" class="form-control" id="taxId" placeholder="税号">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">银行账号</label>
                        <input type="text" class="form-control" id="bankAccount" placeholder="对公账户">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">开户行</label>
                        <input type="text" class="form-control" id="bankName" placeholder="开户银行">
                    </div>
                    <div class="col-12">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="remark" rows="2" placeholder="备注信息"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveClient()">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var clientModal;
var allClients = [];
var allCompanies = [];
var currentPage = 1;
let pageSize = 20;

document.addEventListener('DOMContentLoaded', function() {
    clientModal = new bootstrap.Modal(document.getElementById('clientModal'));
    loadClients();
    loadClientSources();
    loadCompanies();
});

async function loadClients() {
    try {
        var allData = [];
        var page = 1;
        while (true) {
            var response = await fetch('/api/crm/clients/?page=' + page, { credentials: 'include' });
            if (!response.ok) throw new Error('API不存在');
            var data = await response.json();
            allData = allData.concat(data.results || []);
            if (!data.next) break;
            page++;
        }
        allClients = allData;
    } catch (error) {
        console.error('加载客户失败，使用空数据:', error);
        allClients = [];
    }
    currentPage = 1;
    renderClients();
}

async function loadCompanies() {
    try {
        var response = await fetch('/api/finance/companies/', { credentials: 'include' });
        var data = await response.json();
        allCompanies = data.results !== undefined ? data.results : (Array.isArray(data) ? data : []);
        var select = document.getElementById('filterCompany');
        select.innerHTML = '<option value="">全部公司</option>';
        allCompanies.forEach(function(c) {
            select.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
        });
    } catch (error) {
        console.error('加载公司失败:', error);
    }
}

function renderClients() {
    var search = document.getElementById('searchName').value.toLowerCase();
    var category = document.getElementById('filterCategory').value;
    var status = document.getElementById('filterStatus').value;
    var companyId = document.getElementById('filterCompany').value;

    var filtered = allClients.filter(function(c) {
        if (search && !c.name.toLowerCase().includes(search)) return false;
        if (category && c.category !== category) return false;
        if (status && String(c.is_active) !== status) return false;
        if (companyId && String(c.company) !== companyId) return false;
        return true;
    });

    var totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    var start = (currentPage - 1) * pageSize;
    var pageData = filtered.slice(start, start + pageSize);

    var tbody = document.getElementById('clientTableBody');
    if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">暂无客户数据</td></tr>';
    } else {
        var html = '';
        pageData.forEach(function(client) {
            var statusClass = client.is_active ? 'client-status-active' : 'client-status-inactive';
            var statusText = client.is_active ? '合作中' : '已停止';
            var createdAt = client.created_at ? formatDate(client.created_at) : '-';
            var categoryMap = { enterprise: '企业客户', government: '政府事业单位', special: '特殊客户' };
            var categoryText = categoryMap[client.category] || '-';

            html += '<tr>';
            html += '<td><small>' + escapeHtml(client.code || '-') + '</small></td>';
            html += '<td><strong>' + escapeHtml(client.name) + '</strong></td>';
            html += '<td>' + escapeHtml(client.contact_person || '-') + '</td>';
            html += '<td>' + escapeHtml(client.contact_phone || '-') + '</td>';
            html += '<td><small>' + escapeHtml(client.bank_account || '-') + '</small></td>';
            html += '<td><small>' + escapeHtml(client.bank_name || '-') + '</small></td>';
            html += '<td><span class="badge bg-secondary">' + escapeHtml(categoryText) + '</span></td>';
            html += '<td><span class="' + statusClass + '"><i class="bi bi-circle-fill me-1"></i>' + statusText + '</span></td>';
            html += '<td>' + createdAt + '</td>';
            html += '<td><small>' + escapeHtml(client.company_name || '-') + '</small></td>';
            html += '<td>';
            html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="editClient(' + client.id + ')"><i class="bi bi-pencil"></i></button>';
            html += '<button class="btn btn-sm btn-outline-info me-1" onclick="window.location.href=\'/crm/clients/' + client.id + '/360/\'" title="客户360°视图"><i class="bi bi-compass"></i></button>';
            html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteClient(' + client.id + ')" data-perm="crm:customer:delete"><i class="bi bi-trash"></i></button>';
            html += '</td></tr>';
        });
        tbody.innerHTML = html;
    }

    // Update pagination UI
    var totalCountEl = document.getElementById('clientTotalCount');
    var pageInfoEl = document.getElementById('clientPageInfo');
    var prevBtn = document.getElementById('clientPrevBtn');
    var nextBtn = document.getElementById('clientNextBtn');
    var jumpInput = document.getElementById('clientJumpPage');
    var area = document.getElementById('clientPaginationArea');

    totalCountEl.textContent = filtered.length;
    pageInfoEl.textContent = currentPage + ' / ' + totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    jumpInput.max = totalPages;
    jumpInput.value = '';
    area.style.display = filtered.length > 0 ? 'flex' : 'none';
}

function filterClients() {
    currentPage = 1;
    renderClients();
}

function clientPrevPage() {
    if (currentPage > 1) { currentPage--; renderClients(); }
}
function clientNextPage() {
    var totalPages = Math.ceil(allClients.filter(function(c) {
        var search = document.getElementById('searchName').value.toLowerCase();
        var category = document.getElementById('filterCategory').value;
        var status = document.getElementById('filterStatus').value;
        if (search && !c.name.toLowerCase().includes(search)) return false;
        if (category && c.category !== category) return false;
        if (status && String(c.is_active) !== status) return false;
        return true;
    }).length / pageSize);
    if (currentPage < totalPages) { currentPage++; renderClients(); }
}
function clientJumpPage() {
    var target = parseInt(document.getElementById('clientJumpPage').value);
    var totalPages = Math.ceil(allClients.filter(function(c) {
        var search = document.getElementById('searchName').value.toLowerCase();
        var category = document.getElementById('filterCategory').value;
        var status = document.getElementById('filterStatus').value;
        if (search && !c.name.toLowerCase().includes(search)) return false;
        if (category && c.category !== category) return false;
        if (status && String(c.is_active) !== status) return false;
        return true;
    }).length / pageSize);
    if (target >= 1 && target <= totalPages) { currentPage = target; renderClients(); }
}

function showClientModal() {
    document.getElementById('clientModalTitle').innerHTML = '<i class="bi bi-building me-2"></i>新建客户';
    document.getElementById('clientId').value = '';
    document.getElementById('clientName').value = '';
    document.getElementById('contactPerson').value = '';
    document.getElementById('contactPhone').value = '';
    document.getElementById('contactEmail').value = '';
    document.getElementById('clientCategory').value = '';
    document.getElementById('clientSource').value = '';
    document.getElementById('address').value = '';
    document.getElementById('counterpartyType').value = '';
    document.getElementById('taxId').value = '';
    document.getElementById('bankAccount').value = '';
    document.getElementById('bankName').value = '';
    document.getElementById('remark').value = '';
    clientModal.show();
}

function editClient(clientId) {
    var client = allClients.find(function(c) { return c.id === clientId; });
    if (!client) return;

    document.getElementById('clientModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑客户';
    document.getElementById('clientId').value = client.id;
    document.getElementById('clientName').value = client.name;
    document.getElementById('contactPerson').value = client.contact_person || '';
    document.getElementById('contactPhone').value = client.contact_phone || '';
    document.getElementById('contactEmail').value = client.contact_email || '';
    document.getElementById('clientCategory').value = client.category || '';
    document.getElementById('clientSource').value = client.source || '';
    document.getElementById('address').value = client.address || '';
    document.getElementById('counterpartyType').value = client.counterparty_type || '';
    document.getElementById('taxId').value = client.tax_id || '';
    document.getElementById('bankAccount').value = client.bank_account || '';
    document.getElementById('bankName').value = client.bank_name || '';
    document.getElementById('remark').value = client.remark || '';
    clientModal.show();
}

async function saveClient() {
    var clientId = document.getElementById('clientId').value;
    var name = document.getElementById('clientName').value.trim();

    if (!name) { showToast('请输入客户名称', 'warning'); return; }

    var payload = {
        name: name,
        contact_person: document.getElementById('contactPerson').value.trim(),
        contact_phone: document.getElementById('contactPhone').value.trim(),
        contact_email: document.getElementById('contactEmail').value.trim(),
        category: document.getElementById('clientCategory').value,
        source: document.getElementById('clientSource').value || null,
        address: document.getElementById('address').value.trim(),
        counterparty_type: document.getElementById('counterpartyType').value,
        tax_id: document.getElementById('taxId').value.trim(),
        bank_account: document.getElementById('bankAccount').value.trim(),
        bank_name: document.getElementById('bankName').value.trim(),
        remark: document.getElementById('remark').value.trim()
    };

    var url = '/api/crm/clients/';
    var method = 'POST';
    if (clientId) {
        url += clientId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || '保存失败');
        }

        showToast(clientId ? '客户已更新' : '客户已创建', 'success');
        clientModal.hide();
        document.getElementById('clientModal').addEventListener('hidden.bs.modal', function handler() {
            document.getElementById('clientModal').removeEventListener('hidden.bs.modal', handler);
            loadClients();
        });
    } catch (error) {
        console.error('保存客户失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteClient(clientId) {
    if (!confirm('确定要删除此客户吗？')) return;

    try {
        var response = await fetch('/api/crm/clients/' + clientId + '/', {
            method: 'DELETE',
            credentials: 'include'
        });

        if (!response.ok) throw new Error('删除失败');
        showToast('客户已删除', 'success');
        loadClients();
    } catch (error) {
        showToast('删除失败', 'error');
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSize').value);
    currentPage = 1;
    renderClients();
}

async function loadClientSources() {
    try {
        var resp = await fetch('/api/crm/sources/', {credentials:'include'});
        var data = await resp.json();
        var sources = data.results || data;
        var sel = document.getElementById('clientSource');
        sources.forEach(function(s) {
            sel.innerHTML += '<option value="'+s.id+'">'+escapeHtml(s.name)+'</option>';
        });
    } catch (error) {
        console.error('加载客户来源失败:', error);
    }
}

async function addNewClientSource() {
    var name = prompt('请输入新来源名称（如：抖音/小红书、客户转介绍）:');
    if (!name) return;
    var resp = await fetch('/api/crm/sources/', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type':'application/json', 'X-CSRFToken': getCookie('csrftoken')},
        body: JSON.stringify({name: name})
    });
    if (resp.ok) {
        var newSource = await resp.json();
        var sel = document.getElementById('clientSource');
        sel.innerHTML += '<option value="'+newSource.id+'" selected>'+escapeHtml(newSource.name)+'</option>';
        showToast('来源已添加', 'success');
    } else {
        showToast('添加失败', 'error');
    }
}
</script>
{% endblock %}
