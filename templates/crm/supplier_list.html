{% extends "base.html" %}

{% block title %}供应商管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.supplier-status-active { color: #10b981; }
.supplier-status-inactive { color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-truck me-2"></i>供应商管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">管理供应商信息和代理品牌</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="showSupplierModal()" data-perm="crm:supplier:create">
            <i class="bi bi-plus-lg me-1"></i>新建供应商
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchName" placeholder="搜索供应商名称/品牌" onkeyup="filterSuppliers()">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filterStatus" onchange="filterSuppliers()">
                    <option value="">全部状态</option>
                    <option value="active">合作中</option>
                    <option value="inactive">已停止</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>编码</th>
                        <th>供应商名称</th>
                        <th>联系人</th>
                        <th>电话</th>
                        <th>银行账号</th>
                        <th>开户行</th>
                        <th>代理品牌</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="supplierTableBody">
                    <tr>
                        <td colspan="10" class="text-center py-4">
                            <div class="spinner-border text-primary"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" id="supplierPaginationArea" style="display:none;">
            <div class="text-muted" style="font-size:0.875rem;">共 <span id="supplierTotalCount">0</span> 条</div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="supplierPrevBtn" onclick="supplierPrevPage()">上一页</button>
                <span class="mx-2" id="supplierPageInfo">1 / 1</span>
                <button class="btn btn-sm btn-outline-secondary" id="supplierNextBtn" onclick="supplierNextPage()">下一页</button>
                <span class="text-muted mx-1" style="font-size:0.8rem;">跳至</span>
                <input type="number" class="form-control form-control-sm" id="supplierJumpPage" min="1" style="width:60px;" onkeypress="if(event.key==='Enter')supplierJumpPage()">
                <button class="btn btn-sm btn-outline-primary" onclick="supplierJumpPage()">跳转</button>
            </div>
        </div>
    </div>
</div>

<!-- 供应商Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="supplierModalTitle"><i class="bi bi-truck me-2"></i>新建供应商</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="supplierId">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">供应商名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="supplierName" placeholder="供应商公司名称">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">联系人</label>
                        <input type="text" class="form-control" id="contactPerson" placeholder="联系人姓名">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">联系电话</label>
                        <input type="text" class="form-control" id="contactPhone" placeholder="电话">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="contactEmail" placeholder="email@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">合作状态</label>
                        <select class="form-select" id="supplierStatus">
                            <option value="active">合作中</option>
                            <option value="inactive">已停止</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">代理品牌</label>
                        <input type="text" class="form-control" id="supplierBrands" placeholder="多个品牌用逗号分隔">
                    </div>
                    <div class="col-12">
                        <label class="form-label">地址</label>
                        <input type="text" class="form-control" id="supplierAddress" placeholder="公司地址">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">对方类型</label>
                        <select class="form-select" id="counterpartyType">
                            <option value="">选择类型</option>
                            <option value="enterprise">企业</option>
                            <option value="individual">个人</option>
                            <option value="government">政府/事业单位</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">纳税人识别号</label>
                        <input type="text" class="form-control" id="taxId" placeholder="税号">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">银行账号</label>
                        <input type="text" class="form-control" id="bankAccount" placeholder="对公账户">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">开户行</label>
                        <input type="text" class="form-control" id="bankName" placeholder="开户银行">
                    </div>
                    <div class="col-12">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="supplierRemark" rows="2" placeholder="备注信息"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveSupplier()">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var supplierModal;
var allSuppliers = [];
var currentPage = 1;
var pageSize = 20;

document.addEventListener('DOMContentLoaded', function() {
    supplierModal = new bootstrap.Modal(document.getElementById('supplierModal'));
    loadSuppliers();
});

async function loadSuppliers() {
    try {
        var allData = [];
        var page = 1;
        while (true) {
            var response = await fetch('/api/crm/suppliers/?page=' + page, { credentials: 'include' });
            if (!response.ok) throw new Error('API不存在');
            var data = await response.json();
            allData = allData.concat(data.results || []);
            if (!data.next) break;
            page++;
        }
        allSuppliers = allData;
    } catch (error) {
        console.error('加载供应商失败:', error);
        allSuppliers = [];
    }
    currentPage = 1;
    renderSuppliers();
}

function renderSuppliers() {
    var search = document.getElementById('searchName').value.toLowerCase();
    var status = document.getElementById('filterStatus').value;

    var filtered = allSuppliers.filter(function(s) {
        if (search && !s.name.toLowerCase().includes(search) && !(s.brands || '').toLowerCase().includes(search)) return false;
        if (status && s.status !== status) return false;
        return true;
    });

    var totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    var start = (currentPage - 1) * pageSize;
    var pageData = filtered.slice(start, start + pageSize);

    var tbody = document.getElementById('supplierTableBody');
    if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">暂无供应商数据</td></tr>';
    } else {
        var html = '';
        pageData.forEach(function(s) {
            var statusClass = s.status === 'active' ? 'supplier-status-active' : 'supplier-status-inactive';
            var statusText = s.status === 'active' ? '合作中' : '已停止';
            var createdAt = s.created_at ? formatDate(s.created_at) : '-';

            html += '<tr>';
            html += '<td><small>' + escapeHtml(s.code || '-') + '</small></td>';
            html += '<td><strong>' + escapeHtml(s.name) + '</strong></td>';
            html += '<td>' + escapeHtml(s.contact_person || '-') + '</td>';
            html += '<td>' + escapeHtml(s.contact_phone || '-') + '</td>';
            html += '<td><small>' + escapeHtml(s.bank_account || '-') + '</small></td>';
            html += '<td><small>' + escapeHtml(s.bank_name || '-') + '</small></td>';
            html += '<td><small>' + escapeHtml(s.brands || '-') + '</small></td>';
            html += '<td><span class="' + statusClass + '"><i class="bi bi-circle-fill me-1"></i>' + statusText + '</span></td>';
            html += '<td>' + createdAt + '</td>';
            html += '<td>';
            html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="editSupplier(' + s.id + ')"><i class="bi bi-pencil"></i></button>';
            html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteSupplier(' + s.id + ')" data-perm="crm:supplier:delete"><i class="bi bi-trash"></i></button>';
            html += '</td></tr>';
        });
        tbody.innerHTML = html;
    }

    // Update pagination UI
    var totalCountEl = document.getElementById('supplierTotalCount');
    var pageInfoEl = document.getElementById('supplierPageInfo');
    var prevBtn = document.getElementById('supplierPrevBtn');
    var nextBtn = document.getElementById('supplierNextBtn');
    var jumpInput = document.getElementById('supplierJumpPage');
    var area = document.getElementById('supplierPaginationArea');

    totalCountEl.textContent = filtered.length;
    pageInfoEl.textContent = currentPage + ' / ' + totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    jumpInput.max = totalPages;
    jumpInput.value = '';
    area.style.display = filtered.length > 0 ? 'flex' : 'none';
}

function filterSuppliers() {
    currentPage = 1;
    renderSuppliers();
}

function supplierPrevPage() {
    if (currentPage > 1) { currentPage--; renderSuppliers(); }
}
function supplierNextPage() {
    var totalPages = Math.ceil(allSuppliers.filter(function(s) {
        var search = document.getElementById('searchName').value.toLowerCase();
        var status = document.getElementById('filterStatus').value;
        if (search && !s.name.toLowerCase().includes(search) && !(s.brands || '').toLowerCase().includes(search)) return false;
        if (status && s.status !== status) return false;
        return true;
    }).length / pageSize);
    if (currentPage < totalPages) { currentPage++; renderSuppliers(); }
}
function supplierJumpPage() {
    var target = parseInt(document.getElementById('supplierJumpPage').value);
    var totalPages = Math.ceil(allSuppliers.filter(function(s) {
        var search = document.getElementById('searchName').value.toLowerCase();
        var status = document.getElementById('filterStatus').value;
        if (search && !s.name.toLowerCase().includes(search) && !(s.brands || '').toLowerCase().includes(search)) return false;
        if (status && s.status !== status) return false;
        return true;
    }).length / pageSize);
    if (target >= 1 && target <= totalPages) { currentPage = target; renderSuppliers(); }
}

function showSupplierModal() {
    document.getElementById('supplierModalTitle').innerHTML = '<i class="bi bi-truck me-2"></i>新建供应商';
    document.getElementById('supplierId').value = '';
    document.getElementById('supplierName').value = '';
    document.getElementById('contactPerson').value = '';
    document.getElementById('contactPhone').value = '';
    document.getElementById('contactEmail').value = '';
    document.getElementById('supplierStatus').value = 'active';
    document.getElementById('supplierBrands').value = '';
    document.getElementById('supplierAddress').value = '';
    document.getElementById('counterpartyType').value = '';
    document.getElementById('taxId').value = '';
    document.getElementById('bankAccount').value = '';
    document.getElementById('bankName').value = '';
    document.getElementById('supplierRemark').value = '';
    supplierModal.show();
}

function editSupplier(id) {
    var s = allSuppliers.find(function(x) { return x.id === id; });
    if (!s) return;

    document.getElementById('supplierModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑供应商';
    document.getElementById('supplierId').value = s.id;
    document.getElementById('supplierName').value = s.name;
    document.getElementById('contactPerson').value = s.contact_person || '';
    document.getElementById('contactPhone').value = s.contact_phone || '';
    document.getElementById('contactEmail').value = s.contact_email || '';
    document.getElementById('supplierStatus').value = s.status || 'active';
    document.getElementById('supplierBrands').value = s.brands || '';
    document.getElementById('supplierAddress').value = s.address || '';
    document.getElementById('counterpartyType').value = s.counterparty_type || '';
    document.getElementById('taxId').value = s.tax_id || '';
    document.getElementById('bankAccount').value = s.bank_account || '';
    document.getElementById('bankName').value = s.bank_name || '';
    document.getElementById('supplierRemark').value = s.remark || '';
    supplierModal.show();
}

async function saveSupplier() {
    var supplierId = document.getElementById('supplierId').value;
    var name = document.getElementById('supplierName').value.trim();

    if (!name) { showToast('请输入供应商名称', 'warning'); return; }

    var payload = {
        name: name,
        contact_person: document.getElementById('contactPerson').value.trim(),
        contact_phone: document.getElementById('contactPhone').value.trim(),
        contact_email: document.getElementById('contactEmail').value.trim(),
        status: document.getElementById('supplierStatus').value,
        brands: document.getElementById('supplierBrands').value.trim(),
        address: document.getElementById('supplierAddress').value.trim(),
        counterparty_type: document.getElementById('counterpartyType').value,
        tax_id: document.getElementById('taxId').value.trim(),
        bank_account: document.getElementById('bankAccount').value.trim(),
        bank_name: document.getElementById('bankName').value.trim(),
        remark: document.getElementById('supplierRemark').value.trim()
    };

    var url = '/api/crm/suppliers/';
    var method = 'POST';
    if (supplierId) {
        url += supplierId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || '保存失败');
        }

        showToast(supplierId ? '供应商已更新' : '供应商已创建', 'success');
        supplierModal.hide();
        document.getElementById('supplierModal').addEventListener('hidden.bs.modal', function handler() {
            document.getElementById('supplierModal').removeEventListener('hidden.bs.modal', handler);
            loadSuppliers();
        });
    } catch (error) {
        console.error('保存供应商失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteSupplier(id) {
    if (!confirm('确定要删除此供应商吗？')) return;

    try {
        var response = await fetch('/api/crm/suppliers/' + id + '/', {
            method: 'DELETE',
            credentials: 'include'
        });

        if (!response.ok) throw new Error('删除失败');
        showToast('供应商已删除', 'success');
        loadSuppliers();
    } catch (error) {
        showToast('删除失败', 'error');
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
