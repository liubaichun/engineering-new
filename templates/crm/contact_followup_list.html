{% extends "base.html" %}

{% block title %}联系人与跟进 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.contact-status-primary { color: #10b981; }
.followup-type-call { color: #3b82f6; }
.followup-type-visit { color: #8b5cf6; }
.followup-type-email { color: #6b7280; }
.followup-type-meeting { color: #f59e0b; }
.followup-type-other { color: #6b7280; }
</style>
{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-people me-2"></i>联系人与跟进</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">管理客户联系人和跟进记录</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="showContactModal()" data-perm="crm:customer:create">
            <i class="bi bi-plus-lg me-1"></i>新建联系人
        </button>
        <button class="btn btn-outline-primary btn-sm" onclick="showFollowupModal()" data-perm="crm:customer:create">
            <i class="bi bi-journal-text me-1"></i>新建跟进
        </button>
    </div>
</div>

<ul class="nav nav-tabs mb-3" id="crmTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="contacts-tab" data-bs-toggle="tab" data-bs-target="#contacts-pane" type="button">联系人</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="followups-tab" data-bs-toggle="tab" data-bs-target="#followups-pane" type="button">跟进记录</button>
    </li>
</ul>

<div class="tab-content" id="crmTabContent">
    <!-- 联系人 Tab -->
    <div class="tab-pane fade show active" id="contacts-pane">
        <div class="card">
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchContact" placeholder="搜索联系人姓名/电话" onkeyup="filterContacts()">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="filterContactClient" onchange="filterContacts()">
                            <option value="">全部客户</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>客户</th>
                                <th>职位</th>
                                <th>电话</th>
                                <th>邮箱</th>
                                <th>主联系</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="contactTableBody">
                            <tr>
                                <td colspan="8" class="text-center py-4">
                                    <div class="spinner-border text-primary"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 跟进记录 Tab -->
    <div class="tab-pane fade" id="followups-pane">
        <div class="card">
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="searchFollowup" placeholder="搜索跟进内容" onkeyup="filterFollowups()">
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterFollowupType" onchange="filterFollowups()">
                            <option value="">全部方式</option>
                            <option value="call">电话</option>
                            <option value="visit">拜访</option>
                            <option value="email">邮件</option>
                            <option value="meeting">会议</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterFollowupClient" onchange="filterFollowups()">
                            <option value="">全部客户</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>客户</th>
                                <th>联系人</th>
                                <th>方式</th>
                                <th>跟进内容</th>
                                <th>下次计划</th>
                                <th>下次日期</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="followupTableBody">
                            <tr>
                                <td colspan="8" class="text-center py-4">
                                    <div class="spinner-border text-primary"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 联系人Modal -->
<div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contactModalTitle"><i class="bi bi-person me-2"></i>新建联系人</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="contactId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="contactName" placeholder="联系人姓名">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">所属客户</label>
                        <select class="form-select" id="contactClient">
                            <option value="">选择客户</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">职位</label>
                        <input type="text" class="form-control" id="contactPosition" placeholder="如：采购经理">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">手机</label>
                        <input type="text" class="form-control" id="contactPhone" placeholder="手机号">
                    </div>
                    <div class="col-12">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="contactEmail" placeholder="email@example.com">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="contactIsPrimary">
                            <label class="form-check-label" for="contactIsPrimary">主要联系人</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="contactRemark" rows="2" placeholder="备注信息"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveContact()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 跟进记录Modal -->
<div class="modal fade" id="followupModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="followupModalTitle"><i class="bi bi-journal-text me-2"></i>新建跟进记录</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="followupId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">所属客户 <span class="text-danger">*</span></label>
                        <select class="form-select" id="followupClient" onchange="onFollowupClientChange()">
                            <option value="">选择客户</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">关联联系人</label>
                        <select class="form-select" id="followupContact">
                            <option value="">选择联系人（可选）</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">跟进方式</label>
                        <select class="form-select" id="followupType">
                            <option value="call">电话</option>
                            <option value="visit">拜访</option>
                            <option value="email">邮件</option>
                            <option value="meeting">会议</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">下次跟进日期</label>
                        <input type="date" class="form-control" id="followupNextDate">
                    </div>
                    <div class="col-12">
                        <label class="form-label">跟进内容 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="followupContent" rows="4" placeholder="详细记录本次跟进内容"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">下次计划</label>
                        <textarea class="form-control" id="followupNextPlan" rows="2" placeholder="下次跟进计划"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">附件</label>
                        <input type="file" class="form-control" id="followupAttachment">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveFollowup()">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var contactModal, followupModal;
var allContacts = [];
var allFollowups = [];
var allClients = [];
var contactClientMap = {};
var followupClientMap = {};

document.addEventListener('DOMContentLoaded', function() {
    contactModal = new bootstrap.Modal(document.getElementById('contactModal'));
    followupModal = new bootstrap.Modal(document.getElementById('followupModal'));
    loadClients();
    loadContacts();
    loadFollowups();
});

async function loadClients() {
    try {
        var resp = await fetch('/api/crm/clients/', {credentials:'include'});
        var data = await resp.json();
        allClients = data.results || data;

        // 填充联系人模态框的客户选择
        var contactClientSel = document.getElementById('contactClient');
        // 填充跟进记录模态框的客户选择
        var followupClientSel = document.getElementById('followupClient');
        // 填充跟进Tab过滤的客户选择
        var filterClientSel = document.getElementById('filterFollowupClient');

        allClients.forEach(function(c) {
            contactClientMap[c.id] = c.name;
            followupClientMap[c.id] = c.name;

            contactClientSel.innerHTML += '<option value="'+c.id+'">'+escapeHtml(c.name)+'</option>';
            followupClientSel.innerHTML += '<option value="'+c.id+'">'+escapeHtml(c.name)+'</option>';
            filterClientSel.innerHTML += '<option value="'+c.id+'">'+escapeHtml(c.name)+'</option>';
        });

        // 填充联系人Tab的过滤客户选择
        var filterContactClientSel = document.getElementById('filterContactClient');
        allClients.forEach(function(c) {
            filterContactClientSel.innerHTML += '<option value="'+c.id+'">'+escapeHtml(c.name)+'</option>';
        });
    } catch (error) {
        console.error('加载客户失败:', error);
    }
}

async function loadContacts() {
    try {
        var response = await fetch('/api/crm/contacts/', { credentials: 'include' });
        if (!response.ok) throw new Error('API不存在');
        var data = await response.json();
        allContacts = data.results || data;
    } catch (error) {
        console.error('加载联系人失败:', error);
        allContacts = [];
    }
    renderContacts();
}

function renderContacts() {
    var search = document.getElementById('searchContact').value.toLowerCase();
    var clientId = document.getElementById('filterContactClient').value;

    var filtered = allContacts.filter(function(c) {
        if (search && !c.name.toLowerCase().includes(search) && !(c.phone || '').toLowerCase().includes(search)) return false;
        if (clientId && String(c.client) !== clientId) return false;
        return true;
    });

    var tbody = document.getElementById('contactTableBody');
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无联系人数据</td></tr>';
        return;
    }

    var html = '';
    filtered.forEach(function(c) {
        var isPrimaryBadge = c.is_primary ? '<span class="badge bg-success">是</span>' : '-';
        var clientName = c.client_name || contactClientMap[c.client] || '-';

        html += '<tr>';
        html += '<td><strong>' + escapeHtml(c.name) + '</strong></td>';
        html += '<td>' + escapeHtml(clientName) + '</td>';
        html += '<td>' + escapeHtml(c.position || '-') + '</td>';
        html += '<td>' + escapeHtml(c.phone || '-') + '</td>';
        html += '<td>' + escapeHtml(c.email || '-') + '</td>';
        html += '<td>' + isPrimaryBadge + '</td>';
        html += '<td>' + (c.created_at ? formatDate(c.created_at) : '-') + '</td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="editContact(' + c.id + ')"><i class="bi bi-pencil"></i></button>';
        html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteContact(' + c.id + ')" data-perm="crm:customer:delete"><i class="bi bi-trash"></i></button>';
        html += '</td></tr>';
    });

    tbody.innerHTML = html;
}

function filterContacts() {
    renderContacts();
}

function showContactModal() {
    document.getElementById('contactModalTitle').innerHTML = '<i class="bi bi-person me-2"></i>新建联系人';
    document.getElementById('contactId').value = '';
    document.getElementById('contactName').value = '';
    document.getElementById('contactClient').value = '';
    document.getElementById('contactPosition').value = '';
    document.getElementById('contactPhone').value = '';
    document.getElementById('contactEmail').value = '';
    document.getElementById('contactIsPrimary').checked = false;
    document.getElementById('contactRemark').value = '';
    contactModal.show();
}

function editContact(contactId) {
    var c = allContacts.find(function(x) { return x.id === contactId; });
    if (!c) return;

    document.getElementById('contactModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑联系人';
    document.getElementById('contactId').value = c.id;
    document.getElementById('contactName').value = c.name;
    document.getElementById('contactClient').value = c.client || '';
    document.getElementById('contactPosition').value = c.position || '';
    document.getElementById('contactPhone').value = c.phone || '';
    document.getElementById('contactEmail').value = c.email || '';
    document.getElementById('contactIsPrimary').checked = c.is_primary;
    document.getElementById('contactRemark').value = c.remark || '';
    contactModal.show();
}

async function saveContact() {
    var contactId = document.getElementById('contactId').value;
    var name = document.getElementById('contactName').value.trim();

    if (!name) { showToast('请输入联系人姓名', 'warning'); return; }

    var payload = {
        name: name,
        client: document.getElementById('contactClient').value || null,
        position: document.getElementById('contactPosition').value.trim(),
        phone: document.getElementById('contactPhone').value.trim(),
        email: document.getElementById('contactEmail').value.trim(),
        is_primary: document.getElementById('contactIsPrimary').checked,
        remark: document.getElementById('contactRemark').value.trim()
    };

    var url = '/api/crm/contacts/';
    var method = 'POST';
    if (contactId) {
        url += contactId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || '保存失败');
        }

        showToast(contactId ? '联系人已更新' : '联系人已创建', 'success');
        contactModal.hide();
        loadContacts();
    } catch (error) {
        console.error('保存联系人失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteContact(contactId) {
    if (!confirm('确定要删除此联系人吗？')) return;

    try {
        var response = await fetch('/api/crm/contacts/' + contactId + '/', {
            method: 'DELETE',
            credentials: 'include'
        });

        if (!response.ok) throw new Error('删除失败');
        showToast('联系人已删除', 'success');
        loadContacts();
    } catch (error) {
        showToast('删除失败', 'error');
    }
}

// ========== 跟进记录 ==========

async function loadFollowups() {
    try {
        var response = await fetch('/api/crm/followups/', { credentials: 'include' });
        if (!response.ok) throw new Error('API不存在');
        var data = await response.json();
        allFollowups = data.results || data;
    } catch (error) {
        console.error('加载跟进记录失败:', error);
        allFollowups = [];
    }
    renderFollowups();
}

function renderFollowups() {
    var search = document.getElementById('searchFollowup').value.toLowerCase();
    var type = document.getElementById('filterFollowupType').value;
    var clientId = document.getElementById('filterFollowupClient').value;

    var filtered = allFollowups.filter(function(f) {
        if (search && !(f.content || '').toLowerCase().includes(search) && !(f.next_plan || '').toLowerCase().includes(search)) return false;
        if (type && f.follow_type !== type) return false;
        if (clientId && String(f.client) !== clientId) return false;
        return true;
    });

    var tbody = document.getElementById('followupTableBody');
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无跟进记录</td></tr>';
        return;
    }

    var typeIconMap = {
        'call': 'bi-telephone',
        'visit': 'bi-person-walking',
        'email': 'bi-envelope',
        'meeting': 'bi-people',
        'other': 'bi-three-dots'
    };
    var typeColorMap = {
        'call': 'followup-type-call',
        'visit': 'followup-type-visit',
        'email': 'followup-type-email',
        'meeting': 'followup-type-meeting',
        'other': 'followup-type-other'
    };

    var html = '';
    filtered.forEach(function(f) {
        var typeClass = typeColorMap[f.follow_type] || 'followup-type-other';
        var typeIcon = typeIconMap[f.follow_type] || 'bi-circle';
        var typeText = f.follow_type_display || f.follow_type || '-';
        var clientName = f.client_name || followupClientMap[f.client] || '-';
        var contactName = f.contact_name || '-';
        var nextDate = f.next_date || '-';

        html += '<tr>';
        html += '<td>' + escapeHtml(clientName) + '</td>';
        html += '<td>' + escapeHtml(contactName) + '</td>';
        html += '<td><span class="' + typeClass + '"><i class="bi ' + typeIcon + ' me-1"></i>' + escapeHtml(typeText) + '</span></td>';
        html += '<td><small>' + escapeHtml((f.content || '').substring(0, 50)) + (f.content && f.content.length > 50 ? '...' : '') + '</small></td>';
        html += '<td><small>' + escapeHtml((f.next_plan || '').substring(0, 30)) + (f.next_plan && f.next_plan.length > 30 ? '...' : '') + '</small></td>';
        html += '<td>' + nextDate + '</td>';
        html += '<td>' + (f.created_at ? formatDate(f.created_at) : '-') + '</td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="viewFollowup(' + f.id + ')"><i class="bi bi-eye"></i></button>';
        html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteFollowup(' + f.id + ')" data-perm="crm:customer:delete"><i class="bi bi-trash"></i></button>';
        html += '</td></tr>';
    });

    tbody.innerHTML = html;
}

function filterFollowups() {
    renderFollowups();
}

function showFollowupModal() {
    document.getElementById('followupModalTitle').innerHTML = '<i class="bi bi-journal-text me-2"></i>新建跟进记录';
    document.getElementById('followupId').value = '';
    document.getElementById('followupClient').value = '';
    document.getElementById('followupContact').value = '';
    document.getElementById('followupType').value = 'call';
    document.getElementById('followupContent').value = '';
    document.getElementById('followupNextPlan').value = '';
    document.getElementById('followupNextDate').value = '';
    document.getElementById('followupAttachment').value = '';
    // 重置联系人下拉
    document.getElementById('followupContact').innerHTML = '<option value="">选择联系人（可选）</option>';
    followupModal.show();
}

function editFollowup(followupId) {
    var f = allFollowups.find(function(x) { return x.id === followupId; });
    if (!f) return;

    document.getElementById('followupModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑跟进记录';
    document.getElementById('followupId').value = f.id;
    document.getElementById('followupClient').value = f.client || '';
    // 加载联系人列表
    loadContactOptionsForFollowup(f.client);
    setTimeout(function() {
        document.getElementById('followupContact').value = f.contact || '';
    }, 100);
    document.getElementById('followupType').value = f.follow_type || 'call';
    document.getElementById('followupContent').value = f.content || '';
    document.getElementById('followupNextPlan').value = f.next_plan || '';
    document.getElementById('followupNextDate').value = f.next_date || '';
    followupModal.show();
}

function viewFollowup(followupId) {
    editFollowup(followupId);
}

async function saveFollowup() {
    var followupId = document.getElementById('followupId').value;
    var clientId = document.getElementById('followupClient').value;
    var content = document.getElementById('followupContent').value.trim();

    if (!clientId) { showToast('请选择客户', 'warning'); return; }
    if (!content) { showToast('请输入跟进内容', 'warning'); return; }

    var formData = new FormData();
    formData.append('client', clientId);
    formData.append('contact', document.getElementById('followupContact').value || '');
    formData.append('follow_type', document.getElementById('followupType').value);
    formData.append('content', content);
    formData.append('next_plan', document.getElementById('followupNextPlan').value.trim());
    formData.append('next_date', document.getElementById('followupNextDate').value || '');

    var attachmentFile = document.getElementById('followupAttachment').files[0];
    if (attachmentFile) {
        formData.append('attachment', attachmentFile);
    }

    var url = '/api/crm/followups/';
    var method = 'POST';
    if (followupId) {
        url += followupId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
            credentials: 'include',
            body: formData
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || '保存失败');
        }

        showToast(followupId ? '跟进记录已更新' : '跟进记录已创建', 'success');
        followupModal.hide();
        loadFollowups();
    } catch (error) {
        console.error('保存跟进记录失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteFollowup(followupId) {
    if (!confirm('确定要删除此跟进记录吗？')) return;

    try {
        var response = await fetch('/api/crm/followups/' + followupId + '/', {
            method: 'DELETE',
            credentials: 'include'
        });

        if (!response.ok) throw new Error('删除失败');
        showToast('跟进记录已删除', 'success');
        loadFollowups();
    } catch (error) {
        showToast('删除失败', 'error');
    }
}

async function onFollowupClientChange() {
    var clientId = document.getElementById('followupClient').value;
    loadContactOptionsForFollowup(clientId);
}

async function loadContactOptionsForFollowup(clientId) {
    var sel = document.getElementById('followupContact');
    sel.innerHTML = '<option value="">选择联系人（可选）</option>';

    if (!clientId) return;

    try {
        var resp = await fetch('/api/crm/contacts/?client=' + clientId, {credentials:'include'});
        var data = await resp.json();
        var contacts = data.results || data;
        contacts.forEach(function(c) {
            sel.innerHTML += '<option value="'+c.id+'">'+escapeHtml(c.name)+(c.position ? ' ('+escapeHtml(c.position)+')' : '')+'</option>';
        });
    } catch (error) {
        console.error('加载联系人列表失败:', error);
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
