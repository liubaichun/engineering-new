{% extends "base.html" %}

{% block title %}CRM管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
iframe.tab-iframe { width: 100% !important; border: none; background: transparent; display: block; }
</style>
{% endblock %}

{% block content %}
<ul class="nav nav-tabs mb-4" id="crmTab" role="tablist">
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'clients' or not active_tab %} active{% endif %}" href="#" onclick="showTab('clients');return false;">
            <i class="bi bi-building me-1"></i>客户管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'contracts' %} active{% endif %}" href="#" onclick="showTab('contracts');return false;">
            <i class="bi bi-file-earming-text me-1"></i>合同管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'suppliers' %} active{% endif %}" href="#" onclick="showTab('suppliers');return false;">
            <i class="bi bi-truck me-1"></i>供应商管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'opportunities' %} active{% endif %}" href="#" onclick="showTab('opportunities');return false;">
            <i class="bi bi-lightning me-1"></i>商机管理
        </a>
    </li>
</ul>

<div class="tab-content" style="width:100%; margin:0 -32px;">
    <div id="clients" style="display:{% if active_tab == 'clients' or not active_tab %}block{% else %}none{% endif %};">
        <iframe src="/crm/clients/" class="tab-iframe" id="frame-clients" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="contracts" style="display:{% if active_tab == 'contracts' %}block{% else %}none{% endif %};">
        <iframe src="/crm/contracts/" class="tab-iframe" id="frame-contracts" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="suppliers" style="display:{% if active_tab == 'suppliers' %}block{% else %}none{% endif %};">
        <iframe src="/crm/suppliers/" class="tab-iframe" id="frame-suppliers" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
    <div id="opportunities" style="display:{% if active_tab == 'opportunities' %}block{% else %}none{% endif %};">
        <iframe src="/crm/opportunities/" class="tab-iframe" id="frame-opportunities" onload="resizeIframe(this)" style="height:600px;width:100%;"></iframe>
    </div>
</div>

<script>
function showTab(tab) {
    var tabs = ['clients','contracts','suppliers','opportunities'];
    tabs.forEach(function(t) {
        var div = document.getElementById(t);
        var link = document.querySelector('#crmTab .nav-link[onclick*="'+t+'"]');
        if (t === tab) {
            div.style.display = 'block';
            if (link) link.classList.add('active');
        } else {
            div.style.display = 'none';
            if (link) link.classList.remove('active');
        }
    });
}
function resizeIframe(iframe) {
    try {
        var h = iframe.contentWindow.document.body.scrollHeight;
        if (h > 0) iframe.style.height = Math.max(h + 50, 600) + 'px';
    } catch(e) {}
}
</script>
{% endblock %}
