{% extends "base.html" %}

{% block title %}角色管理 - 企业信息化管理系统{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-shield me-2"></i>角色管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">基于公司的用户角色分配（管理员/员工）</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="showRoleModal()">
            <i class="bi bi-plus-lg me-1"></i>分配角色
        </button>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>公司角色列表</h6>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="roleList">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary spinner-border-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card" id="roleDetailCard" style="display: none;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0" id="roleDetailTitle">角色详情</h6>
                <div>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editCurrentRole()">
                        <i class="bi bi-pencil"></i>编辑
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentRole()">
                        <i class="bi bi-trash"></i>删除
                    </button>
                </div>
            </div>
            <div class="card-body" id="roleDetailBody">
            </div>
        </div>
        <div class="card" id="roleEmptyCard">
            <div class="card-body text-center text-muted py-5">
                <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
                <p class="mt-3">选择一条角色记录查看详情</p>
            </div>
        </div>
    </div>
</div>

<!-- 角色Modal -->
<div class="modal fade" id="roleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="roleModalTitle"><i class="bi bi-shield-plus me-2"></i>分配角色</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="roleId">
                <div class="mb-3">
                    <label class="form-label">用户 <span class="text-danger">*</span></label>
                    <select class="form-select" id="roleUser">
                        <option value="">请选择用户</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">公司 <span class="text-danger">*</span></label>
                    <select class="form-select" id="roleCompany">
                        <option value="">请选择公司</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">角色 <span class="text-danger">*</span></label>
                    <select class="form-select" id="roleRole">
                        <option value="">请选择角色</option>
                        <option value="admin">公司管理员</option>
                        <option value="staff">普通员工</option>
                    </select>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="roleIsPrimary">
                        <label class="form-check-label" for="roleIsPrimary">设为默认公司</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var roleModal;
var allRoles = [];
var currentRoleId = null;

document.addEventListener('DOMContentLoaded', function() {
    roleModal = new bootstrap.Modal(document.getElementById('roleModal'));
    loadCurrentUser();
    loadRoles();
});

async function loadCurrentUser() {
    try {
        var response = await fetch('/api/core/auth/user/', { credentials: 'include' });
        if (response.ok) {
            var data = await response.json();
            window.currentUser = data.user;
        }
    } catch (error) {
        console.error('获取当前用户信息失败:', error);
    }
}

async function loadRoles() {
    try {
        var response = await fetch('/api/core/company-roles/', { credentials: 'include' });
        var data = await response.json();
        allRoles = data.results || data;
        renderRoleList();
    } catch (error) {
        console.error('加载角色失败:', error);
        document.getElementById('roleList').innerHTML =
            '<div class="text-center text-danger py-4">加载失败: ' + error.message + '</div>';
    }
}

function renderRoleList() {
    var container = document.getElementById('roleList');
    if (!Array.isArray(allRoles) || allRoles.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">暂无角色分配记录</div>';
        return;
    }

    var html = '';
    allRoles.forEach(function(role) {
        var isActive = currentRoleId == role.id;
        var roleClass = role.role === 'admin' ? 'text-danger' : 'text-primary';
        var roleBadge = role.role === 'admin' ? '管理员' : '员工';
        html += '<a href="#" class="list-group-item list-group-item-action ' + (isActive ? 'active' : '') + '" '
              + 'onclick="showRoleDetail(' + role.id + '); return false;">'
              + '<div class="d-flex justify-content-between align-items-start">'
              + '<div>'
              + '<i class="bi bi-shield me-2"></i>' + escapeHtml(role.user_username || role.user_display || '用户' + role.user)
              + '<div class="small text-muted mt-1">' + escapeHtml(role.company_name || '公司' + role.company) + '</div>'
              + '</div>'
              + '<span class="badge bg-' + (role.role === 'admin' ? 'danger' : 'primary') + '">' + roleBadge + '</span>'
              + '</div></a>';
    });
    container.innerHTML = html;
}

function showRoleDetail(roleId) {
    currentRoleId = roleId;
    renderRoleList();

    var role = allRoles && Array.isArray(allRoles) ? allRoles.find(function(r) { return r.id === roleId; }) : null;
    if (!role) return;

    document.getElementById('roleEmptyCard').style.display = 'none';
    document.getElementById('roleDetailCard').style.display = 'block';
    document.getElementById('roleDetailTitle').textContent = '角色详情';

    var roleDisplay = role.role === 'admin' ? '公司管理员' : '普通员工';
    var roleBadgeClass = role.role === 'admin' ? 'bg-danger' : 'bg-primary';

    var html = '<div class="row">';
    html += '<div class="col-md-6">';
    html += '<p><strong>用户：</strong>' + escapeHtml(role.user_username || '用户' + role.user) + '</p>';
    html += '<p><strong>用户显示名：</strong>' + escapeHtml(role.user_display || '-') + '</p>';
    html += '</div>';
    html += '<div class="col-md-6">';
    html += '<p><strong>公司：</strong>' + escapeHtml(role.company_name || '公司' + role.company) + '</p>';
    html += '<p><strong>角色：</strong><span class="badge ' + roleBadgeClass + '">' + roleDisplay + '</span></p>';
    html += '</div>';
    html += '</div>';

    html += '<hr>';
    html += '<p><strong>更多信息：</strong></p>';
    html += '<p><strong>是否默认公司：</strong>' + (role.is_primary ? '是' : '否') + '</p>';
    html += '<p><strong>分配人：</strong>' + escapeHtml(role.assigned_by_username || '系统') + '</p>';
    html += '<p><strong>分配时间：</strong>' + (role.assigned_at ? new Date(role.assigned_at).toLocaleString('zh-CN') : '-') + '</p>';

    document.getElementById('roleDetailBody').innerHTML = html;
}

async function showRoleModal() {
    document.getElementById('roleModalTitle').innerHTML = '<i class="bi bi-shield-plus me-2"></i>分配角色';
    document.getElementById('roleId').value = '';
    document.getElementById('roleIsPrimary').checked = false;

    // Load users and companies
    await Promise.all([loadUsersForSelect(), loadCompaniesForSelect()]);

    document.getElementById('roleUser').value = '';
    document.getElementById('roleCompany').value = '';
    document.getElementById('roleRole').value = '';
    roleModal.show();
}

async function loadUsersForSelect() {
    var select = document.getElementById('roleUser');
    try {
        var response = await fetch('/api/core/users/?is_active=true&page_size=500', { credentials: 'include' });
        var data = await response.json();
        var users = data.results || data;
        select.innerHTML = '<option value="">请选择用户</option>';
        users.forEach(function(u) {
            select.innerHTML += '<option value="' + u.id + '">' + escapeHtml(u.username) + ' (' + escapeHtml(u.first_name || u.username) + ')</option>';
        });
    } catch (error) {
        console.error('加载用户列表失败:', error);
    }
}

async function loadCompaniesForSelect() {
    var select = document.getElementById('roleCompany');
    try {
        var response = await fetch('/api/core/companies/active/', { credentials: 'include' });
        var data = await response.json();
        var companies = data.companies || [];
        select.innerHTML = '<option value="">请选择公司</option>';
        companies.forEach(function(c) {
            select.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
        });
    } catch (error) {
        console.error('加载公司列表失败:', error);
    }
}

async function editCurrentRole() {
    if (!currentRoleId) return;
    var role = allRoles && Array.isArray(allRoles) ? allRoles.find(function(r) { return r.id === currentRoleId; }) : null;
    if (!role) return;

    await loadUsersForSelect();
    await loadCompaniesForSelect();

    document.getElementById('roleModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑角色';
    document.getElementById('roleId').value = role.id;
    document.getElementById('roleUser').value = role.user;
    document.getElementById('roleUser').disabled = true;
    document.getElementById('roleCompany').value = role.company;
    document.getElementById('roleCompany').disabled = true;
    document.getElementById('roleRole').value = role.role;
    document.getElementById('roleIsPrimary').checked = role.is_primary || false;
    roleModal.show();
}

async function saveRole() {
    var roleId = document.getElementById('roleId').value;
    var userId = document.getElementById('roleUser').value;
    var companyId = document.getElementById('roleCompany').value;
    var roleCode = document.getElementById('roleRole').value;
    var isPrimary = document.getElementById('roleIsPrimary').checked;

    if (!userId) { showToast('请选择用户', 'warning'); return; }
    if (!companyId) { showToast('请选择公司', 'warning'); return; }
    if (!roleCode) { showToast('请选择角色', 'warning'); return; }

    var payload = {
        user: parseInt(userId),
        company: parseInt(companyId),
        role: roleCode,
        is_primary: isPrimary
    };

    var url = '/api/core/company-roles/';
    var method = 'POST';

    if (roleId) {
        url += roleId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || error.code || '保存失败');
        }

        showToast(roleId ? '角色已更新' : '角色已分配', 'success');
        roleModal.hide();
        loadRoles();
    } catch (error) {
        console.error('保存角色失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteCurrentRole() {
    if (!currentRoleId) return;
    if (!confirm('确定要删除此角色分配记录吗？')) return;

    try {
        var response = await fetch('/api/core/company-roles/' + currentRoleId + '/', {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include'
        });

        if (!response.ok && response.status !== 204) throw new Error('删除失败');

        showToast('角色分配已删除', 'success');
        currentRoleId = null;
        document.getElementById('roleDetailCard').style.display = 'none';
        document.getElementById('roleEmptyCard').style.display = 'block';
        loadRoles();
    } catch (error) {
        showToast('删除失败: ' + error.message, 'error');
    }
}

// Fix: reset disabled state when modal closes
document.getElementById('roleModal').addEventListener('hidden.bs.modal', function() {
    document.getElementById('roleUser').disabled = false;
    document.getElementById('roleCompany').disabled = false;
});

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
