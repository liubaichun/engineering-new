{% extends "base.html" %}

{% block title %}角色管理 - 企业信息化管理系统{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-shield me-2"></i>角色管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">管理系统角色和权限</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="showRoleModal()" data-perm="role.add">
            <i class="bi bi-plus-lg me-1"></i>新建角色
        </button>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>角色列表</h6>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="roleList">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary spinner-border-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card" id="roleDetailCard" style="display: none;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0" id="roleDetailTitle">角色详情</h6>
                <div>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editCurrentRole()">
                        <i class="bi bi-pencil"></i>编辑
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentRole()" data-perm="role.delete">
                        <i class="bi bi-trash"></i>删除
                    </button>
                </div>
            </div>
            <div class="card-body" id="roleDetailBody">
            </div>
        </div>
        <div class="card" id="roleEmptyCard">
            <div class="card-body text-center text-muted py-5">
                <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
                <p class="mt-3">选择角色查看详情</p>
            </div>
        </div>
    </div>
</div>

<!-- 角色Modal -->
<div class="modal fade" id="roleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="roleModalTitle"><i class="bi bi-shield-plus me-2"></i>新建角色</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="roleId">
                <div class="mb-3">
                    <label class="form-label">角色名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="roleName" placeholder="如：项目经理">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色代码 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="roleCode" placeholder="如：project_manager">
                    <small class="text-muted">唯一标识，用于权限判断</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="roleDescription" rows="2" placeholder="角色描述"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">权限分配 <span class="text-muted" style="font-size:0.8rem;">（勾选即为角色授予权限）</span></label>
                    <div id="rolePermissionList" class="border rounded p-2" style="max-height:300px;overflow-y:auto;background:#fafafa;">
                        <div class="text-muted text-center py-3">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var roleModal;
var allRoles = [];
var currentRoleId = null;

document.addEventListener('DOMContentLoaded', function() {
    roleModal = new bootstrap.Modal(document.getElementById('roleModal'));
    loadCurrentUser();
    loadRoles();
    loadPermissions();
});

async function loadCurrentUser() {
    try {
        var response = await fetch('/api/core/auth/user/', { credentials: 'include' });
        if (response.ok) {
            var data = await response.json();
            window.currentUser = data.user;
        }
    } catch (error) {
        console.error('获取当前用户信息失败:', error);
    }
}

async function loadRoles() {
    try {
        var response = await fetch('/api/core/roles/', { credentials: 'include' });
        var data = await response.json();
        allRoles = data.results || data;
        renderRoleList();
    } catch (error) {
        console.error('加载角色失败:', error);
    }
}

async function loadPermissions() {
    try {
        var response = await fetch('/api/core/permissions/', { credentials: 'include' });
        var data = await response.json();
        window.allPermissions = data.results || data;
    } catch (error) {
        console.error('加载权限失败:', error);
    }
}

function renderRoleList() {
    var container = document.getElementById('roleList');
    if (allRoles.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">暂无角色</div>';
        return;
    }
    
    var html = '';
    allRoles.forEach(function(role) {
        var isActive = currentRoleId == role.id;
        html += '<a href="#" class="list-group-item list-group-item-action ' + (isActive ? 'active' : '') + '" '
              + 'onclick="showRoleDetail(' + role.id + '); return false;">'
              + '<i class="bi bi-shield me-2"></i>' + escapeHtml(role.name)
              + '<small class="text-muted ms-2">' + escapeHtml(role.code) + '</small>'
              + '</a>';
    });
    container.innerHTML = html;
}

function showRoleDetail(roleId) {
    currentRoleId = roleId;
    renderRoleList();

    var role = allRoles.find(function(r) { return r.id === roleId; });
    if (!role) return;

    document.getElementById('roleEmptyCard').style.display = 'none';
    document.getElementById('roleDetailCard').style.display = 'block';
    document.getElementById('roleDetailTitle').textContent = role.name;

    var permissions = window.allPermissions || [];
    var rolePermIds = role.permissions || [];

    var html = '<p class="text-muted mb-3">' + escapeHtml(role.description || '无描述') + '</p>';
    html += '<p><strong>角色代码：</strong><code>' + escapeHtml(role.code) + '</code></p>';
    html += '<p><strong>用户数：</strong>' + (role.user_count || 0) + '</p>';
    html += '<hr>';

    // 检查当前登录用户是否是超级管理员
    var isSuperuser = (window.currentUser && window.currentUser.is_superuser);
    var isCurrentRole = (currentRoleId && parseInt(currentRoleId) === parseInt(roleId));

    if (isSuperuser && isCurrentRole) {
        html += '<div class="alert alert-info py-2 mb-3" style="font-size:0.85rem;">';
        html += '<i class="bi bi-info-circle me-1"></i>您是超级管理员，拥有所有权限，无需为角色分配具体权限。';
        html += '</div>';
    } else {
        html += '<p class="mb-2"><strong>权限分配：</strong> <span class="text-muted" style="font-size:0.8rem;">（勾选即为角色授予权限）</span></p>';
    }

    if (permissions.length === 0) {
        html += '<span class="text-muted">暂无权限定义</span>';
    } else {
        // 按分类分组
        var grouped = {};
        permissions.forEach(function(p) {
            var cat = p.category || '其他';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(p);
        });

        for (var cat in grouped) {
            html += '<div class="mb-3"><strong class="text-muted" style="font-size:0.85rem;">' + cat + '</strong>';
            html += '<div class="row g-2 mt-1">';
            grouped[cat].forEach(function(p) {
                var has = rolePermIds.indexOf(p.id) !== -1;
                // 超级管理员查看自己角色时，全部显示为已授权（只读模式）
                var isSelfSuperuser = isSuperuser && isCurrentRole;
                html += '<div class="col-md-6">';
                html += '<div class="form-check">';
                if (isSelfSuperuser) {
                    // 超级管理员角色：只读展示，全部勾选
                    html += '<input class="form-check-input" type="checkbox" checked disabled>';
                    html += '<label class="form-check-label text-muted">';
                } else {
                    html += '<input class="form-check-input" type="checkbox" id="perm_' + p.id + '" value="' + p.id + '" ' + (has ? 'checked' : '') + ' onchange="toggleRolePermission(' + roleId + ', ' + p.id + ', this.checked)">';
                    html += '<label class="form-check-label" for="perm_' + p.id + '" title="' + escapeHtml(p.resource || '') + '">';
                }
                html += escapeHtml(p.name);
                if (p.resource) {
                    html += ' <small class="text-muted">(' + escapeHtml(p.resource) + ')</small>';
                }
                html += '</label></div></div>';
            });
            html += '</div></div>';
        }
        if (isSelfSuperuser) {
            html += '<div class="text-muted mt-2" style="font-size:0.8rem;">';
            html += '<i class="bi bi-lock me-1"></i>超级管理员角色权限由系统控制，无法手动修改';
            html += '</div>';
        }
    }

    document.getElementById('roleDetailBody').innerHTML = html;
}

async function toggleRolePermission(roleId, permissionId, granted) {
    try {
        var response = await fetch('/api/core/role-permissions/toggle/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify({
                role_id: roleId,
                permission_id: permissionId,
                granted: granted
            })
        });
        var result = await response.json();
        if (result.status === 'success') {
            showToast(granted ? '权限已分配' : '权限已撤销', 'success');
            // 刷新角色列表，更新内存中的permissions
            loadRoles().then(function() {
                showRoleDetail(roleId);
            });
        } else {
            showToast(result.message || '操作失败', 'error');
        }
    } catch (error) {
        showToast('操作失败: ' + error.message, 'error');
    }
}

function showRoleModal() {
    document.getElementById('roleModalTitle').innerHTML = '<i class="bi bi-shield-plus me-2"></i>新建角色';
    document.getElementById('roleId').value = '';
    document.getElementById('roleName').value = '';
    document.getElementById('roleCode').value = '';
    document.getElementById('roleCode').readOnly = false;
    document.getElementById('roleDescription').value = '';
    renderModalPermissions(null);
    roleModal.show();
}

function editCurrentRole() {
    if (!currentRoleId) return;
    var role = allRoles.find(function(r) { return r.id === currentRoleId; });
    if (!role) return;

    document.getElementById('roleModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑角色';
    document.getElementById('roleId').value = role.id;
    document.getElementById('roleName').value = role.name;
    document.getElementById('roleCode').value = role.code;
    document.getElementById('roleCode').readOnly = true;
    document.getElementById('roleDescription').value = role.description || '';
    renderModalPermissions(role.permissions || []);
    roleModal.show();
}

async function saveRole() {
    var roleId = document.getElementById('roleId').value;
    var name = document.getElementById('roleName').value.trim();
    var code = document.getElementById('roleCode').value.trim();
    var description = document.getElementById('roleDescription').value.trim();

    if (!name) { showToast('请输入角色名称', 'warning'); return; }
    if (!code) { showToast('请输入角色代码', 'warning'); return; }

    // 收集弹窗中勾选的权限ID
    var permissionIds = [];
    if (window.allPermissions && window.allPermissions.length > 0) {
        var checkboxes = document.querySelectorAll('#rolePermissionList input[type="checkbox"]');
        checkboxes.forEach(function(cb) {
            if (cb.checked) permissionIds.push(parseInt(cb.value));
        });
    }

    var payload = { name: name, code: code, description: description };
    if (permissionIds.length > 0) {
        payload.permission_ids = permissionIds;
    }

    var url = '/api/core/roles/';
    var method = 'POST';
    if (roleId) {
        url += roleId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            var error = await response.json();
            throw new Error(error.detail || error.code || '保存失败');
        }

        showToast(roleId ? '角色已更新' : '角色已创建', 'success');
        roleModal.hide();
        document.getElementById('roleModal').addEventListener('hidden.bs.modal', function handler() {
            document.getElementById('roleModal').removeEventListener('hidden.bs.modal', handler);
            loadRoles();
        });
    } catch (error) {
        console.error('保存角色失败:', error);
        showToast(error.message || '保存失败', 'error');
    }
}

function renderModalPermissions(rolePermIds) {
    var container = document.getElementById('rolePermissionList');
    var permissions = window.allPermissions || [];

    if (permissions.length === 0) {
        container.innerHTML = '<div class="text-muted text-center py-3">暂无可用权限（请先在权限管理中创建权限）</div>';
        return;
    }

    var grouped = {};
    var MODULE_ORDER = ['项目', '任务', '财务', '审批', '客户', '合同', '文件', '工资', '系统', '其他'];
    permissions.forEach(function(p) {
        var cat = p.category || '其他';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(p);
    });

    var html = '';
    MODULE_ORDER.forEach(function(cat) {
        if (!grouped[cat] || grouped[cat].length === 0) return;
        html += '<div class="mb-2">';
        html += '<div class="fw-bold text-secondary border-bottom pb-1 mb-1" style="font-size:0.8rem;">' + cat + '</div>';
        grouped[cat].forEach(function(p) {
            var has = rolePermIds && rolePermIds.indexOf(p.id) !== -1;
            html += '<div class="form-check">';
            html += '<input class="form-check-input" type="checkbox" id="modal_perm_' + p.id + '" value="' + p.id + '" ' + (has ? 'checked' : '') + '>';
            html += '<label class="form-check-label" for="modal_perm_' + p.id + '" title="' + escapeHtml(p.resource || '') + '">';
            html += escapeHtml(p.name);
            html += '</label></div>';
        });
        html += '</div>';
    });

    // 如果有未分类的
    if (grouped['其他'] && grouped['其他'].length > 0) {
        // 已包含在上面
    }

    // 全选/取消全选
    html += '<div class="border-top pt-2 mt-2">';
    html += '<div class="form-check">';
    html += '<input class="form-check-input" type="checkbox" id="modal_perm_select_all" onchange="toggleAllModalPermissions(this.checked)">';
    html += '<label class="form-check-label fw-bold" for="modal_perm_select_all">全选 / 取消全选</label>';
    html += '</div></div>';

    container.innerHTML = html;
}

function toggleAllModalPermissions(checked) {
    var checkboxes = document.querySelectorAll('#rolePermissionList input[type="checkbox"]');
    checkboxes.forEach(function(cb) { cb.checked = checked; });
}

async function deleteCurrentRole() {
    if (!currentRoleId) return;
    if (!confirm('确定要删除此角色吗？')) return;
    
    try {
        var response = await fetch('/api/core/roles/' + currentRoleId + '/', {
            method: 'DELETE',
            credentials: 'include'
        });
        
        if (!response.ok) throw new Error('删除失败');
        
        showToast('角色已删除', 'success');
        currentRoleId = null;
        document.getElementById('roleDetailCard').style.display = 'none';
        document.getElementById('roleEmptyCard').style.display = 'block';
        loadRoles();
    } catch (error) {
        showToast('删除失败', 'error');
    }
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
