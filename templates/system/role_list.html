{% extends "base.html" %}

{% block title %}角色管理 - 企业信息化管理系统{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-shield me-2"></i>角色管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">公司自定义角色 + 用户角色分配</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="showRoleDefModal()">
            <i class="bi bi-plus-lg me-1"></i>新建角色
        </button>
        <button class="btn btn-primary btn-sm" onclick="showAssignModal()">
            <i class="bi bi-person-plus me-1"></i>分配角色
        </button>
    </div>
</div>

<div class="row">
    <!-- 左侧：公司角色定义 -->
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>公司角色定义</h6>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="roleDefList">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary spinner-border-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧：用户角色分配 -->
    <div class="col-md-7">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-people me-2"></i>用户角色分配</h6>
                <div class="d-flex gap-2 align-items-center">
                    <select class="form-select form-select-sm" id="filterCompany" style="width: auto;" onchange="loadUserAssignments()">
                        <option value="">全公司</option>
                    </select>
                    <select class="form-select form-select-sm" id="filterRole" style="width: auto;" onchange="loadUserAssignments()">
                        <option value="">全角色</option>
                    </select>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive" id="userAssignmentTable">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary spinner-border-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新建角色定义Modal -->
<div class="modal fade" id="roleDefModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="roleDefModalTitle">
                    <i class="bi bi-shield-plus me-2"></i>新建角色
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="roleDefId">
                <div class="mb-3">
                    <label class="form-label">公司 <span class="text-danger">*</span></label>
                    <select class="form-select" id="roleDefCompany">
                        <option value="">请选择公司</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">角色名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="roleDefName" placeholder="如：财务审核员">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色代码 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="roleDefCode" placeholder="如：finance_auditor">
                    <div class="form-text">字母、数字、下划线，唯一标识</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="roleDefDescription" rows="2" placeholder="可选"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveRoleDef()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 分配角色Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="assignModalTitle">
                    <i class="bi bi-person-plus me-2"></i>分配角色
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="assignId">
                <div class="mb-3">
                    <label class="form-label">用户 <span class="text-danger">*</span></label>
                    <select class="form-select" id="assignUser">
                        <option value="">请选择用户</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">公司 <span class="text-danger">*</span></label>
                    <select class="form-select" id="assignCompany" onchange="loadAvailableRoles()">
                        <option value="">请选择公司</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">角色 <span class="text-danger">*</span></label>
                    <select class="form-select" id="assignRole">
                        <option value="">请先选择公司</option>
                    </select>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="assignIsPrimary">
                        <label class="form-check-label" for="assignIsPrimary">设为默认公司</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveAssign()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ── 全局数据存储（挂载到window以兼容ES模块）───────────────────────────────────
window.allRoleDefs = [];
window.allAssignments = [];
window.roleDefModal = null;
window.assignModal = null;
var currentDefId = null;

document.addEventListener('DOMContentLoaded', function() {
    window.roleDefModal = new bootstrap.Modal(document.getElementById('roleDefModal'));
    window.assignModal = new bootstrap.Modal(document.getElementById('assignModal'));
    // loadCurrentUser: no-op, user info comes from server-side template context
    loadRoleDefs();
    loadCompaniesForFilter();
    loadUserAssignments();
});

// ── 角色定义 ──────────────────────────────────────────────────────────────────

async function loadRoleDefs() {
    try {
        var response = await fetch('/api/core/company-role-defs/', { credentials: 'include' });
        if (!response.ok) throw new Error('加载失败: ' + response.status);
        var data = await response.json();
        console.log('[DEBUG] loadRoleDefs raw data:', JSON.stringify(data).substring(0, 200));
        console.log('[DEBUG] data.results:', data.results);
        console.log('[DEBUG] data.results || data:', data.results || data);
        window.allRoleDefs = data.results || data;
        console.log('[DEBUG] allRoleDefs after assign:', JSON.stringify(window.allRoleDefs));
        console.log('[DEBUG] calling renderRoleDefList, container:', document.getElementById('roleDefList')?.tagName);
        renderRoleDefList();
        console.log('[DEBUG] renderRoleDefList done');
    } catch (error) {
        console.error('[DEBUG] loadRoleDefs error:', error, 'status:', error?.response?.status);
        document.getElementById('roleDefList').innerHTML =
            '<div class="text-center text-danger py-4">加载失败: ' + error.message + '</div>';
    }
}

function renderRoleDefList() {
    var container = document.getElementById('roleDefList');
    if (!Array.isArray(window.allRoleDefs) || window.allRoleDefs.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">暂无角色定义</div>';
        return;
    }
    var html = '';
    window.allRoleDefs.forEach(function(def) {
        var isActive = currentDefId == def.id;
        html += '<div class="list-group-item list-group-item-action ' + (isActive ? 'active' : '') + '" '
              + 'onclick="showRoleDefDetail(' + def.id + '); return false;" style="cursor:pointer;">'
              + '<div class="d-flex justify-content-between align-items-start">'
              + '<div>'
              + '<i class="bi bi-shield me-2"></i>' + escapeHtml(def.name)
              + '<div class="small text-muted mt-1">' + escapeHtml(def.company_name) + '</div>'
              + '</div>'
              + '<span class="badge bg-' + (def.is_active === false ? 'secondary' : 'primary') + '">'
              + (def.is_active === false ? '已停用' : '活跃')
              + '</span>'
              + '</div></div>';
    });
    container.innerHTML = html;
}

function showRoleDefModal(id) {
    document.getElementById('roleDefModalTitle').innerHTML = '<i class="bi bi-shield-plus me-2"></i>新建角色';
    document.getElementById('roleDefId').value = '';
    document.getElementById('roleDefCompany').innerHTML = '<option value="">请选择公司</option>';
    document.getElementById('roleDefName').value = '';
    document.getElementById('roleDefCode').value = '';
    document.getElementById('roleDefDescription').value = '';
    window.roleDefModal.show();
    // Load companies for select
    fetch('/api/core/companies/active/', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var companies = data.companies || [];
            var sel = document.getElementById('roleDefCompany');
            companies.forEach(function(c) {
                sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
            });
        });
}

function showRoleDefDetail(id) {
    currentDefId = id;
    renderRoleDefList();
}

async function saveRoleDef() {
    var defId = document.getElementById('roleDefId').value;
    var companyId = document.getElementById('roleDefCompany').value;
    var name = document.getElementById('roleDefName').value.trim();
    var code = document.getElementById('roleDefCode').value.trim();
    var description = document.getElementById('roleDefDescription').value.trim();

    if (!companyId) { showToast('请选择公司', 'warning'); return; }
    if (!name) { showToast('请填写角色名称', 'warning'); return; }
    if (!code) { showToast('请填写角色代码', 'warning'); return; }

    var payload = { company: parseInt(companyId), name: name, code: code, description: description };
    var url = '/api/core/company-role-defs/';
    var method = 'POST';

    if (defId) {
        url += defId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            var err = await response.json();
            throw new Error(err.detail || JSON.stringify(err));
        }
        showToast(defId ? '角色已更新' : '角色已创建', 'success');
        window.roleDefModal.hide();
        loadRoleDefs();
    } catch (error) {
        showToast(error.message || '保存失败', 'error');
    }
}

// ── 用户角色分配 ──────────────────────────────────────────────────────────────

async function loadCompaniesForFilter() {
    var sel = document.getElementById('filterCompany');
    try {
        var response = await fetch('/api/core/companies/active/', { credentials: 'include' });
        var data = await response.json();
        var companies = data.companies || [];
        companies.forEach(function(c) {
            sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
        });
    } catch (error) {}
}

async function loadUserAssignments() {
    var companyId = document.getElementById('filterCompany').value;
    var roleName = document.getElementById('filterRole').value;
    var url = '/api/core/company-roles/?page_size=500';
    if (companyId) url += '&company_id=' + companyId;
    try {
        var response = await fetch(url, { credentials: 'include' });
        if (!response.ok) throw new Error('加载失败');
        var data = await response.json();
        window.allAssignments = data.results || data;
        renderUserAssignments(roleName);
        populateRoleFilter();
    } catch (error) {
        document.getElementById('userAssignmentTable').innerHTML =
            '<div class="text-center text-danger py-4">加载失败: ' + error.message + '</div>';
    }
}

function populateRoleFilter() {
    var sel = document.getElementById('filterRole');
    var used = {};
    window.allAssignments.forEach(function(a) {
        if (a.company_role_id && !used[a.company_role_id]) {
            used[a.company_role_id] = true;
            sel.innerHTML += '<option value="' + a.company_role_id + '">' + escapeHtml(a.company_role_name || '未命名') + '</option>';
        }
    });
}

function renderUserAssignments(roleNameFilter) {
    var container = document.getElementById('userAssignmentTable');
    var filtered = window.allAssignments;
    if (roleNameFilter) {
        filtered = window.allAssignments.filter(function(a) {
            return String(a.company_role_id) === String(roleNameFilter);
        });
    }
    if (!Array.isArray(filtered) || filtered.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">暂无分配记录</div>';
        return;
    }
    var html = '<table class="table table-hover mb-0" style="font-size:0.875rem;">';
    html += '<thead><tr>';
    html += '<th>用户</th><th>公司</th><th>角色</th><th>默认</th><th>分配人</th><th>时间</th><th>操作</th>';
    html += '</tr></thead><tbody>';
    filtered.forEach(function(a) {
        html += '<tr>';
        html += '<td>' + escapeHtml(a.user_username || '用户' + a.user) + '</td>';
        html += '<td>' + escapeHtml(a.company_name || '-') + '</td>';
        html += '<td><span class="badge bg-primary">' + escapeHtml(a.company_role_name || '未分配') + '</span></td>';
        html += '<td>' + (a.is_primary ? '<i class="bi bi-check-circle-fill text-success"></i>' : '-') + '</td>';
        html += '<td>' + escapeHtml(a.assigned_by_username || '系统') + '</td>';
        html += '<td>' + (a.assigned_at ? new Date(a.assigned_at).toLocaleString('zh-CN') : '-') + '</td>';
        html += '<td><button class="btn btn-sm btn-outline-danger py-0" onclick="deleteAssign(' + a.id + ')">删除</button></td>';
        html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function showAssignModal(id) {
    document.getElementById('assignModalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>分配角色';
    document.getElementById('assignId').value = '';
    document.getElementById('assignUser').innerHTML = '<option value="">请选择用户</option>';
    document.getElementById('assignCompany').innerHTML = '<option value="">请选择公司</option>';
    document.getElementById('assignRole').innerHTML = '<option value="">请先选择公司</option>';
    document.getElementById('assignIsPrimary').checked = false;
    window.assignModal.show();
    // Load users
    try {
        var resp = await fetch('/api/core/users/?is_active=true&page_size=500', { credentials: 'include' });
        var data = await resp.json();
        var users = data.results || data;
        var sel = document.getElementById('assignUser');
        users.forEach(function(u) {
            sel.innerHTML += '<option value="' + u.id + '">' + escapeHtml(u.username) + ' (' + escapeHtml(u.first_name || u.username) + ')</option>';
        });
    } catch (error) {}
    // Load companies
    try {
        var resp = await fetch('/api/core/companies/active/', { credentials: 'include' });
        var data = await resp.json();
        var companies = data.companies || [];
        var sel = document.getElementById('assignCompany');
        companies.forEach(function(c) {
            sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
        });
    } catch (error) {}
}

async function loadAvailableRoles() {
    var companyId = document.getElementById('assignCompany').value;
    var sel = document.getElementById('assignRole');
    if (!companyId) {
        sel.innerHTML = '<option value="">请先选择公司</option>';
        return;
    }
    try {
        var resp = await fetch('/api/core/company-roles/available_roles/?company_id=' + companyId, { credentials: 'include' });
        var data = await resp.json();
        var roles = data.roles || [];
        sel.innerHTML = '<option value="">请选择角色</option>';
        roles.forEach(function(r) {
            sel.innerHTML += '<option value="' + r.id + '">' + escapeHtml(r.name) + '</option>';
        });
    } catch (error) {
        sel.innerHTML = '<option value="">加载失败</option>';
    }
}

async function saveAssign() {
    var assignId = document.getElementById('assignId').value;
    var userId = document.getElementById('assignUser').value;
    var companyId = document.getElementById('assignCompany').value;
    var roleId = document.getElementById('assignRole').value;
    var isPrimary = document.getElementById('assignIsPrimary').checked;

    if (!userId) { showToast('请选择用户', 'warning'); return; }
    if (!companyId) { showToast('请选择公司', 'warning'); return; }
    if (!roleId) { showToast('请选择角色', 'warning'); return; }

    var payload = {
        user: parseInt(userId),
        company: parseInt(companyId),
        company_role: parseInt(roleId),
        is_primary: isPrimary
    };
    var url = '/api/core/company-roles/';
    var method = 'POST';
    if (assignId) {
        url += assignId + '/';
        method = 'PATCH';
    }

    try {
        var response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'include',
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            var err = await response.json();
            throw new Error(err.detail || JSON.stringify(err));
        }
        showToast(assignId ? '分配已更新' : '角色已分配', 'success');
        window.assignModal.hide();
        loadUserAssignments();
    } catch (error) {
        showToast(error.message || '保存失败', 'error');
    }
}

async function deleteAssign(id) {
    if (!confirm('确定要删除此角色分配吗？')) return;
    try {
        var response = await fetch('/api/core/company-roles/' + id + '/', {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
            credentials: 'include'
        });
        if (!response.ok && response.status !== 204) throw new Error('删除失败');
        showToast('已删除', 'success');
        loadUserAssignments();
    } catch (error) {
        showToast('删除失败: ' + error.message, 'error');
    }
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
