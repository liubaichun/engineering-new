{% extends "base_content.html" %}

{% block title %}通知日志 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
.log-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    margin-bottom: 24px;
}
.log-header {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--bs-border-color);
    display: flex;
    align-items: center;
    gap: 8px;
}
.log-header i { color: var(--primary); }
.log-filters {
    padding: 12px 20px;
    border-bottom: 1px solid #f3f4f6;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
}
.log-filters select, .log-filters input {
    font-size: 0.85rem;
    padding: 6px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #fff;
}
.log-table { width: 100%; border-collapse: collapse; }
.log-table th {
    text-align: left;
    padding: 10px 20px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #64748b;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
}
.log-table td {
    padding: 10px 20px;
    font-size: 0.85rem;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: middle;
}
.log-table tr:hover td { background: #f8fafc; }
.status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 0.75rem;
}
.status-badge.sent { background: #d1fae5; color: #065f46; }
.status-badge.failed { background: #fee2e2; color: #991b1b; }
.channel-icon-sm {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.8rem; margin-right: 6px;
}
.channel-icon-sm.feishu { background: #e8f5e9; color: #4caf50; }
.channel-icon-sm.wecom { background: #e3f2fd; color: #2196f3; }
.channel-icon-sm.dingtalk { background: #fce4ec; color: #e91e63; }
.channel-icon-sm.email { background: #f3e5f5; color: #9c27b0; }
.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px 20px;
}
.pagination button {
    padding: 6px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #fff;
    font-size: 0.85rem;
    cursor: pointer;
}
.pagination button:hover { background: #f1f5f9; }
.pagination button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.pagination button:disabled { opacity: 0.5; cursor: default; }
.error-msg {
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.75rem;
    color: #ef4444;
    cursor: help;
}
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h4><i class="bi bi-list-check me-2"></i>通知日志</h4>
            <p class="text-muted mb-0">查看所有通知的发送记录和状态</p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadLogs()">
            <i class="bi bi-arrow-repeat me-1"></i>刷新
        </button>
    </div>
</div>

<div class="log-card">
    <div class="log-header">
        <i class="bi bi-journal-text"></i>发送记录
    </div>

    <div class="log-filters">
        <select id="filterStatus" onchange="loadLogs()">
            <option value="">全部状态</option>
            <option value="sent">已发送</option>
            <option value="failed">发送失败</option>
        </select>
        <select id="filterChannel" onchange="loadLogs()">
            <option value="">全部渠道</option>
            <option value="feishu">飞书</option>
            <option value="wecom">企业微信</option>
            <option value="dingtalk">钉钉</option>
            <option value="email">邮件</option>
        </select>
        <button class="btn btn-outline-primary btn-sm" onclick="loadLogs()"><i class="bi bi-funnel"></i>筛选</button>
    </div>

    <div id="logList">
        <div class="text-center py-4 text-muted">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <p class="mt-2 mb-0">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ================================================================
// 通知日志
// ================================================================

var currentPage = 1;
var pageSize = 20;
var totalLogs = 0;

if (document.readyState === 'loading') {
    document.addEventListener("DOMContentLoaded", function() { loadLogs(); });
} else {
    loadLogs();
}

function loadLogs(page) {
    if (page !== undefined) currentPage = page;
    var status = document.getElementById('filterStatus').value;
    var channel = document.getElementById('filterChannel').value;
    var params = '?page=' + currentPage + '&page_size=' + pageSize;
    if (status) params += '&status=' + status;
    if (channel) params += '&channel_type=' + channel;

    fetch('/api/channels/logs/' + params, { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            totalLogs = data.total || 0;
            renderLogs(data.logs || []);
            renderPagination();
        })
        .catch(function(e) {
            document.getElementById('logList').innerHTML =
                '<div class="text-center py-4 text-danger">加载失败: ' + e.message + '</div>';
        });
}

function getChannelIcon(type) {
    var icons = {
        feishu: 'bi-chat-quote',
        wecom: 'bi-people',
        dingtalk: 'bi-chat-dots',
        email: 'bi-envelope'
    };
    return icons[type] || 'bi-bell';
}

function renderLogs(logs) {
    var el = document.getElementById('logList');
    if (logs.length === 0) {
        el.innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2 mb-0">暂无通知日志</p></div>';
        return;
    }

    var html =
'<table class="log-table">' +
    '<thead><tr>' +
        '<th>渠道</th>' +
        '<th>通知类型</th>' +
        '<th>标题</th>' +
        '<th>接收人</th>' +
        '<th>状态</th>' +
        '<th>时间</th>' +
        '<th>错误信息</th>' +
    '</tr></thead><tbody>';

    for (var i = 0; i < logs.length; i++) {
        var l = logs[i];
        var statusClass = l.status === 'sent' ? 'sent' : 'failed';
        var statusLabel = l.status === 'sent' ? '已发送' : '失败';
        var icon = getChannelIcon(l.channel_type);
        var time = l.sent_at || l.created_at;
        if (time) {
            time = time.replace('T', ' ').substring(0, 19);
        }

        html +=
'<tr>' +
    '<td><span class="channel-icon-sm ' + (l.channel_type || '') + '"><i class="bi ' + icon + '"></i></span>' + (l.channel_name || '-') + '</td>' +
    '<td>' + (l.notification_type || '-') + '</td>' +
    '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (l.title || '') + '">' + (l.title || '-') + '</td>' +
    '<td>' + (l.username || '-') + '</td>' +
    '<td><span class="status-badge ' + statusClass + '">' + statusLabel + '</span></td>' +
    '<td style="font-size:0.75rem;color:#94a3b8;">' + (time || '-') + '</td>' +
    '<td>' + (l.error_message ? '<span class="error-msg" title="' + l.error_message + '">' + l.error_message + '</span>' : '-') + '</td>' +
'</tr>';
    }

    html += '</tbody></table>';
    el.innerHTML = html;
}

function renderPagination() {
    var el = document.getElementById('logList');
    var totalPages = Math.ceil(totalLogs / pageSize);
    if (totalPages <= 1) return;

    var html = '<div class="pagination">';
    html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="loadLogs(1)">首页</button>';
    html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="loadLogs(' + (currentPage - 1) + ')">上一页</button>';

    var start = Math.max(1, currentPage - 2);
    var end = Math.min(totalPages, currentPage + 2);
    for (var i = start; i <= end; i++) {
        html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="loadLogs(' + i + ')">' + i + '</button>';
    }

    html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="loadLogs(' + (currentPage + 1) + ')">下一页</button>';
    html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="loadLogs(' + totalPages + ')">末页</button>';
    html += '<span style="font-size:0.8rem;color:#94a3b8;margin-left:12px;">共 ' + totalLogs + ' 条</span>';
    html += '</div>';

    el.insertAdjacentHTML('beforeend', html);
}
</script>
{% endblock %}
