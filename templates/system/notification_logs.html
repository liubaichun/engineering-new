{% extends "base.html" %}
{% block title %}通知日志{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-journal-text me-2"></i>通知日志</h4>
        <p class="text-muted mb-0" style="font-size:0.9rem;">查看所有外部渠道通知的发送记录</p>
    </div>
</div>

<!-- 标签切换 -->
<ul class="nav nav-tabs mb-4" id="notifTab" role="tablist">
    <li class="nav-item"><a class="nav-link" href="/system/notification-channels/" id="tab-channels"><i class="bi bi-broadcast me-1"></i>渠道配置</a></li>
    <li class="nav-item"><a class="nav-link" href="/system/notification-router/" id="tab-router"><i class="bi bi-router me-1"></i>路由规则</a></li>
    <li class="nav-item"><a class="nav-link active" href="/system/notification-logs/" id="tab-logs"><i class="bi bi-journal-text me-1"></i>通知日志</a></li>
    <li class="nav-item"><a class="nav-link" href="/system/notification-preferences/" id="tab-prefs"><i class="bi bi-sliders me-1"></i>通知偏好</a></li>
</ul>

<!-- 统计卡片 -->
<div class="row mb-4 g-3">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body py-3">
                <div class="h3 mb-0 text-primary" id="stat-total">—</div>
                <div class="small text-muted">总记录数</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body py-3">
                <div class="h3 mb-0 text-success" id="stat-sent">—</div>
                <div class="small text-muted">发送成功</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body py-3">
                <div class="h3 mb-0 text-danger" id="stat-failed">—</div>
                <div class="small text-muted">发送失败</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body py-3">
                <div class="h3 mb-0 text-secondary" id="stat-pending">—</div>
                <div class="small text-muted">待发送</div>
            </div>
        </div>
    </div>
</div>

<!-- 筛选栏 -->
<div class="card mb-3">
    <div class="card-body py-2 d-flex align-items-center gap-3 flex-wrap">
        <div class="input-group" style="max-width:180px;">
            <span class="input-group-text">状态</span>
            <select class="form-select" id="filterStatus" onchange="loadLogs()">
                <option value="">全部</option>
                <option value="sent">已发送</option>
                <option value="failed">发送失败</option>
                <option value="pending">待发送</option>
            </select>
        </div>
        <div class="input-group" style="max-width:200px;">
            <span class="input-group-text">渠道类型</span>
            <select class="form-select" id="filterChannelType" onchange="loadLogs()">
                <option value="">全部</option>
                <option value="feishu">飞书</option>
                <option value="wecom">企微</option>
                <option value="dingtalk">钉钉</option>
                <option value="email">邮件</option>
            </select>
        </div>
        <div class="input-group" style="max-width:220px;">
            <span class="input-group-text">从</span>
            <input type="date" class="form-control" id="filterDateFrom" onchange="loadLogs()">
        </div>
        <div class="input-group" style="max-width:220px;">
            <span class="input-group-text">至</span>
            <input type="date" class="form-control" id="filterDateTo" onchange="loadLogs()">
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()">重置</button>
        <select class="form-select form-select-sm" id="pageSize" style="width: auto;" onchange="changePageSize()">
            <option value="20">20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
        </select>
    </div>
</div>

<!-- 日志列表 -->
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>渠道</th>
                        <th>用户</th>
                        <th>标题</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>错误信息</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary me-2"></span>加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- 分页 -->
    <div class="card-footer d-flex justify-content-between align-items-center">
        <div class="text-muted small" id="paginationInfo">—</div>
        <div id="paginationControls"></div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var currentPage = 1;
let pageSize = 50;

document.addEventListener('DOMContentLoaded', function() {
    loadLogs();
});

async function loadLogs(page = 1) {
    currentPage = page;
    const tbody = document.getElementById('logsTableBody');
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary me-2"></span>加载中...</td></tr>';

    const params = new URLSearchParams({
        page: currentPage,
        page_size: pageSize,
    });
    const status = document.getElementById('filterStatus').value;
    const channelType = document.getElementById('filterChannelType').value;
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;
    if (status) params.set('status', status);
    if (channelType) params.set('channel_type', channelType);
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);

    try {
        const resp = await fetch('/api/channels/logs/?' + params.toString(), { credentials: 'include' });
        if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">加载失败 (' + resp.status + ')</td></tr>'; return; }
        const result = await resp.json();
        const logs = result.results || result.logs || [];
        const total = result.count || result.total || logs.length || 0;

        // 更新统计
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-sent').textContent = result.stats ? result.stats.sent : '—';
        document.getElementById('stat-failed').textContent = result.stats ? result.stats.failed : '—';
        document.getElementById('stat-pending').textContent = result.stats ? result.stats.pending : '—';

        if (!logs.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无日志记录</td></tr>';
            document.getElementById('paginationInfo').textContent = '共 0 条';
            document.getElementById('paginationControls').innerHTML = '';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr>
                <td><small>${log.created_at ? new Date(log.created_at).toLocaleString('zh-CN') : '—'}</small></td>
                <td><span class="badge bg-secondary">${channelLabel(log.channel_type)}</span></td>
                <td><small>${escapeHtml(log.username || '—')}</small></td>
                <td><small>${escapeHtml(log.title || '—')}</small></td>
                <td><small>${escapeHtml(log.notification_type || '—')}</small></td>
                <td><span class="badge ${statusBadge(log.status)}">${statusLabel(log.status)}</span></td>
                <td><small class="text-danger">${escapeHtml(log.error_message || '')}</small></td>
            </tr>`).join('');

        document.getElementById('paginationInfo').textContent = '共 ' + total + ' 条';
        renderPagination(total);
    } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">加载失败：' + e.message + '</td></tr>';
    }
}

function statusBadge(s) {
    return {sent:'bg-success',failed:'bg-danger',pending:'bg-warning text-dark',read:'bg-info'}[s] || 'bg-secondary';
}

function statusLabel(s) {
    return {sent:'已发送',failed:'发送失败',pending:'待发送',read:'已读'}[s] || s;
}

function channelLabel(c) {
    return {feishu:'飞书',wecom:'企微',dingtalk:'钉钉',email:'邮件'}[c] || c || '—';
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const controls = document.getElementById('paginationControls');
    if (totalPages <= 1) { controls.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="loadLogs(' + (currentPage - 1) + ')">上一页</button>';
    html += '<span class="px-2 align-self-center">第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
    if (currentPage < totalPages) html += '<button class="btn btn-sm btn-outline-primary ms-1" onclick="loadLogs(' + (currentPage + 1) + ')">下一页</button>';
    controls.innerHTML = html;
}

function resetFilters() {
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterChannelType').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    loadLogs(1);
}

function escapeHtml(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSize').value);
    currentPage = 1;
    loadLogs(1);
}
</script>
{% endblock %}
