{% extends "base.html" %}

{% block title %}权限管理 - 企业信息化管理系统{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-key me-2"></i>权限管理</h4>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">管理系统权限配置</p>
    </div>
    <div class="d-flex gap-2">
        <input type="text" class="form-control form-control-sm" id="permSearchInput" placeholder="搜索权限名称或代码..." style="width: 220px;" oninput="filterPermissions()">
        <button class="btn btn-primary btn-sm" onclick="showPermissionModal()" data-perm="permission.add">
            <i class="bi bi-plus-lg me-1"></i>新建权限
        </button>
    </div>
</div>

<div class="d-flex gap-3" style="align-items: flex-start;">
    <!-- 左侧分类树 -->
    <div class="flex-shrink-0" style="width: 200px;">
        <div class="card">
            <div class="card-header py-2">
                <span class="fw-semibold" style="font-size:0.85rem;"><i class="bi bi-diagram-3 me-1"></i>分类</span>
            </div>
            <div class="card-body p-0" id="categoryTree" style="max-height: 600px; overflow-y: auto; font-size: 0.82rem;">
                <div class="text-center text-muted py-3">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 右侧表格 -->
    <div class="flex-grow-1">
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th style="width:50px;">ID</th>
                                <th style="width:180px;">权限名称</th>
                                <th style="width:200px;">权限代码</th>
                                <th style="width:100px;">分类</th>
                                <th>描述</th>
                                <th style="width:100px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="permissionTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block modal %}
<div class="modal fade" id="permissionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="permissionModalTitle"><i class="bi bi-plus-circle me-2"></i>新建权限</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2">
                    <label class="form-label form-label-sm fw-semibold">权限代码 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-sm" id="permCode" placeholder="如: system.user.add">
                </div>
                <div class="mb-2">
                    <label class="form-label form-label-sm fw-semibold">权限名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-sm" id="permName" placeholder="如: 新建用户">
                </div>
                <div class="mb-2">
                    <label class="form-label form-label-sm fw-semibold">分类</label>
                    <input type="text" class="form-control form-control-sm" id="permCategory" placeholder="如: 系统管理" list="permCategoryDatalist">
                    <datalist id="permCategoryDatalist"></datalist>
                </div>
                <div class="mb-2">
                    <label class="form-label form-label-sm fw-semibold">描述</label>
                    <textarea class="form-control form-control-sm" id="permDesc" rows="2" placeholder="权限描述（选填）"></textarea>
                </div>
                <input type="hidden" id="editPermId">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="savePermission()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var permissionModal;
var allPermissions = [];
var currentCategory = '';
var currentSearch = '';

document.addEventListener('DOMContentLoaded', function() {
    // 权限检查：只有 superuser 或有 system:role:manage 权限才能访问
    if (USER_PERMS.is_superuser) {
        permissionModal = new bootstrap.Modal(document.getElementById('permissionModal'));
        loadPermissions();
        return;
    }
    waitForPermissions(function() {
        if (!hasPermission('system:role:manage')) {
            document.querySelector('.main-content').innerHTML =
                '<div class="alert alert-danger m-4"><i class="bi bi-lock me-2"></i>您没有权限访问此页面，需要 system:role:manage 权限</div>';
            return;
        }
        permissionModal = new bootstrap.Modal(document.getElementById('permissionModal'));
        loadPermissions();
    });
});

async function loadPermissions() {
    try {
        var allData = [];
        var page = 1;
        while (true) {
            var response = await fetch('/api/core/permissions/?page=' + page + '&page_size=100', { credentials: 'include' });
            if (!response.ok) throw new Error('HTTP ' + response.status);
            var data = await response.json();
            if (Array.isArray(data.results)) {
                allData = allData.concat(data.results);
            } else if (Array.isArray(data)) {
                allData = allData.concat(data);
            }
            if (!data.next) break;
            page++;
            if (page > 20) break;
        }
        allPermissions = allData;
        buildCategoryTree();
        renderPermissions();
    } catch (error) {
        console.error('加载权限失败: ' + error.message);
        document.getElementById('permissionTableBody').innerHTML =
            '<tr><td colspan="6" class="text-center text-danger py-4">加载失败: ' + error.message + '</td></tr>';
    }
}

// 英文分类 -> 中文映射
var CAT_DISPLAY_MAP = {
    'approval': '审批管理',
    'crm': 'CRM管理',
    'equipment': '设备管理',
    'finance': '财务管理',
    'material': '物料管理',
    'project': '项目管理',
    'system': '系统管理',
    'hr': '人力资源',
    'inventory': '库存管理',
    'quality': '质量管理',
    'warehouse': '仓库管理'
};

// 获取分类显示名：英文转中文，中文保持原样
function getCategoryDisplay(cat) {
    cat = cat || '其他';
    // 判断是否纯英文（不含中文）
    if (/^[a-zA-Z]+$/.test(cat) && CAT_DISPLAY_MAP[cat.toLowerCase()]) {
        return CAT_DISPLAY_MAP[cat.toLowerCase()];
    }
    return cat;
}

function buildCategoryTree() {
    // 用中文显示名做分组key，解决 approval+审批管理、crm+CRM 等映射到同一中文名的重复问题
    var catMap = {};  // key: 中文显示名 -> { display: 中文名, count: 数量 }
    allPermissions.forEach(function(p) {
        var cat = p.category || '其他';
        var displayName = getCategoryDisplay(cat);  // 统一转中文
        if (!catMap[displayName]) catMap[displayName] = { display: displayName, count: 0 };
        catMap[displayName].count++;
    });

    var cats = Object.keys(catMap).sort();
    var container = document.getElementById('categoryTree');

    // 填充datalist（按中文显示名排序）
    var datalistHtml = cats.map(function(c) { return '<option value="' + escapeHtml(c) + '">'; }).join('');
    document.getElementById('permCategoryDatalist').innerHTML = datalistHtml;

    var html = '<div class="list-group list-group-flush">';
    html += '<a href="javascript:filterByCategory(\'\')" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center active" id="cat-all" style="font-size:0.82rem; padding: 0.4rem 0.75rem; border-radius:0;">';
    html += '<span><i class="bi bi-grid-3x3-gap me-1"></i>全部</span><span class="badge bg-primary rounded-pill">' + allPermissions.length + '</span></a>';

    cats.forEach(function(cat) {
        var info = catMap[cat];
        var catId = 'cat-' + escapeHtml(cat).replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
        var activeCls = currentCategory.toLowerCase() === cat.toLowerCase() ? 'active' : '';
        html += '<a href="javascript:filterByCategory(\'' + escapeHtml(info.display).replace(/'/g, "\\'") + '\')" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center ' + activeCls + '" id="' + catId + '" style="font-size:0.82rem; padding: 0.4rem 0.75rem; border-radius:0;">';
        html += '<span><i class="bi bi-folder me-1"></i>' + escapeHtml(info.display) + '</span><span class="badge bg-secondary rounded-pill">' + info.count + '</span></a>';
    });

    html += '</div>';
    container.innerHTML = html;
}

function filterByCategory(category) {
    currentCategory = category;
    document.querySelectorAll('#categoryTree .list-group-item').forEach(function(el) {
        el.classList.remove('active');
    });
    if (category) {
        var catId = 'cat-' + category.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
        var btn = document.getElementById(catId);
        if (btn) btn.classList.add('active');
    } else {
        var allBtn = document.getElementById('cat-all');
        if (allBtn) allBtn.classList.add('active');
    }
    renderPermissions();
}

// 分类比较（统一中文对比）
function categoryMatches(pCat, filterCat) {
    if (!filterCat) return true;
    return getCategoryDisplay(pCat) === filterCat;
}

function filterPermissions() {
    currentSearch = document.getElementById('permSearchInput').value.trim().toLowerCase();
    renderPermissions();
}

function renderPermissions() {
    var tbody = document.getElementById('permissionTableBody');

    if (!Array.isArray(allPermissions) || allPermissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无权限</td></tr>';
        return;
    }

    var filtered = allPermissions;
    if (currentCategory) {
        filtered = filtered.filter(function(p) { return categoryMatches(p.category, currentCategory); });
    }
    if (currentSearch) {
        filtered = filtered.filter(function(p) {
            return (p.name && p.name.toLowerCase().includes(currentSearch)) ||
                   (p.code && p.code.toLowerCase().includes(currentSearch)) ||
                   (p.description && p.description.toLowerCase().includes(currentSearch));
        });
    }

    var grouped = {};  // key: 中文显示名 -> { display: 中文名, items: [...] }
    filtered.forEach(function(p) {
        var cat = p.category || '其他';
        var displayName = getCategoryDisplay(cat);
        if (!grouped[displayName]) grouped[displayName] = { display: displayName, items: [] };
        grouped[displayName].items.push(p);
    });

    var html = '';
    for (var cat in grouped) {
        var info = grouped[cat];
        html += '<tr class="table-light"><td colspan="6"><strong><i class="bi bi-folder me-1"></i>' + escapeHtml(info.display) + '</strong> <span class="badge bg-secondary ms-1">' + info.items.length + '</span></td></tr>';
        info.items.forEach(function(p) {
            var desc = p.description ? '<span title="' + escapeHtml(p.description) + '">' + escapeHtml(p.description) + '</span>' : '<span class="text-muted">-</span>';
            html += '<tr>';
            html += '<td>' + p.id + '</td>';
            html += '<td><strong>' + escapeHtml(p.name) + '</strong></td>';
            html += '<td><code>' + escapeHtml(p.code) + '</code></td>';
            html += '<td><span class="badge bg-secondary">' + escapeHtml(getCategoryDisplay(p.category)) + '</span></td>';
            html += '<td style="max-width:300px;"><small class="text-muted">' + desc + '</small></td>';
            html += '<td>';
            html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="editPermission(' + p.id + ')"><i class="bi bi-pencil"></i></button>';
            html += '<button class="btn btn-sm btn-outline-danger" onclick="confirmDeletePermission(' + p.id + ')"><i class="bi bi-trash"></i></button>';
            html += '</td></tr>';
        });
    }

    if (!html) {
        html = '<tr><td colspan="6" class="text-center text-muted py-4">没有匹配的权限</td></tr>';
    }
    tbody.innerHTML = html;
}

function showPermissionModal() {
    document.getElementById('editPermId').value = '';
    document.getElementById('permCode').value = '';
    document.getElementById('permName').value = '';
    document.getElementById('permCategory').value = currentCategory || '';
    document.getElementById('permDesc').value = '';
    document.getElementById('permissionModalTitle').innerHTML = '<i class="bi bi-plus-circle me-2"></i>新建权限';
    if (!permissionModal) {
        permissionModal = new bootstrap.Modal(document.getElementById('permissionModal'));
    }
    permissionModal.show();
}

function editPermission(id) {
    var perm = allPermissions.find(function(p) { return p.id === id; });
    if (!perm) return;
    document.getElementById('editPermId').value = id;
    document.getElementById('permCode').value = perm.code;
    document.getElementById('permName').value = perm.name;
    document.getElementById('permCategory').value = perm.category || '';
    document.getElementById('permDesc').value = perm.description || '';
    document.getElementById('permissionModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>编辑权限';
    if (!permissionModal) {
        permissionModal = new bootstrap.Modal(document.getElementById('permissionModal'));
    }
    permissionModal.show();
}

function savePermission() {
    var code = document.getElementById('permCode').value.trim();
    var name = document.getElementById('permName').value.trim();
    var category = document.getElementById('permCategory').value.trim();
    var description = document.getElementById('permDesc').value.trim();
    var editId = document.getElementById('editPermId').value;

    if (!code || !name) {
        alert('权限代码和名称不能为空');
        return;
    }

    var payload = { code: code, name: name, category: category, description: description };
    var method = 'POST';
    var url = '/api/core/permissions/';

    if (editId) {
        method = 'PUT';
        url += editId + '/';
    }

    fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
        body: JSON.stringify(payload),
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.id || data.code) {
            permissionModal.hide();
            loadPermissions();
        } else {
            alert('保存失败: ' + (data.detail || JSON.stringify(data)));
        }
    })
    .catch(function(err) { alert('保存失败: ' + err.message); });
}

function confirmDeletePermission(id) {
    var perm = allPermissions.find(function(p) { return p.id === id; });
    if (!confirm('确定要删除权限「' + (perm ? perm.name : id) + '」吗？')) return;
    fetch('/api/core/permissions/' + id + '/', {
        method: 'DELETE',
        headers: { 'X-CSRFToken': getCsrfToken() },
        credentials: 'include'
    })
    .then(function(r) {
        if (r.status === 204 || r.ok) {
            loadPermissions();
        } else {
            alert('删除失败');
        }
    })
    .catch(function(err) { alert('删除失败: ' + err.message); });
}

function getCsrfToken() {
    var name = 'csrftoken';
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : '';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
{% endblock %}
