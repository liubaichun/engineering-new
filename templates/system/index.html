{% extends "base.html" %}

{% block title %}系统管理 - 企业信息化管理系统{% endblock %}

{% block styles %}
<style>
/* 系统管理Tab内容区域 — 精确计算剩余高度 */
.tab-content { position: relative; min-height: calc(100vh - 122px); }
.tab-content > div { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
iframe.tab-iframe { width: 100% !important; height: 100% !important; border: none; background: transparent; display: block; }
</style>
{% endblock %}

{% block content %}
<ul class="nav nav-tabs mb-4" id="systemTab" role="tablist">
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'companies' or not active_tab %} active{% endif %}" href="#" onclick="showTab('companies');return false;">
            <i class="bi bi-building me-1"></i>公司管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'users' %} active{% endif %}" href="#" onclick="showTab('users');return false;">
            <i class="bi bi-people me-1"></i>用户管理
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'audit' %} active{% endif %}" href="#" onclick="showTab('audit');return false;">
            <i class="bi bi-shield-check me-1"></i>审计日志
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'settings' %} active{% endif %}" href="#" onclick="showTab('settings');return false;">
            <i class="bi bi-sliders me-1"></i>参数设置
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'channels' %} active{% endif %}" href="#" onclick="showTab('channels');return false;">
            <i class="bi bi-bell me-1"></i>通知渠道
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'notification_logs' %} active{% endif %}" href="#" onclick="showTab('notification_logs');return false;">
            <i class="bi bi-journal-text me-1"></i>通知日志
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'permissions' %} active{% endif %}" href="#" onclick="showTab('permissions');return false;">
            <i class="bi bi-grid-3x3 me-1"></i>权限矩阵
        </a>
    </li>
    <li class="nav-item" role="presentation">
        <a class="nav-link{% if active_tab == 'api' %} active{% endif %}" href="#" onclick="showTab('api');return false;">
            <i class="bi bi-code-slash me-1"></i>API文档
        </a>
    </li>
</ul>

<div class="tab-content">
    <div id="companies" style="display:{% if active_tab == 'companies' or not active_tab %}block{% else %}none{% endif %};">
        <iframe src="/finance/companies/" class="tab-iframe" id="frame-companies"></iframe>
    </div>
    <div id="users" style="display:{% if active_tab == 'users' %}block{% else %}none{% endif %};">
        <iframe src="/system/users/" class="tab-iframe" id="frame-users"></iframe>
    </div>
    <div id="audit" style="display:{% if active_tab == 'audit' %}block{% else %}none{% endif %};">
        <iframe src="/system/audit-logs/" class="tab-iframe" id="frame-audit"></iframe>
    </div>
    <div id="settings" style="display:{% if active_tab == 'settings' %}block{% else %}none{% endif %};">
        <iframe src="/system/settings/" class="tab-iframe" id="frame-settings"></iframe>
    </div>
    <div id="channels" style="display:{% if active_tab == 'channels' %}block{% else %}none{% endif %};">
        <iframe src="/channels/" class="tab-iframe" id="frame-channels"></iframe>
    </div>
    <div id="notification_logs" style="display:{% if active_tab == 'notification_logs' %}block{% else %}none{% endif %};">
        <iframe src="/system/notification-logs/" class="tab-iframe" id="frame-notification-logs"></iframe>
    </div>
    <div id="permissions" style="display:{% if active_tab == 'permissions' %}block{% else %}none{% endif %};">
        <iframe src="/system/permission-matrix/" class="tab-iframe" id="frame-permissions"></iframe>
    </div>
    <div id="api" style="display:{% if active_tab == 'api' %}block{% else %}none{% endif %};">
        <iframe src="/api/docs/" class="tab-iframe" id="frame-api"></iframe>
    </div>
</div>

	<script>
    function showTab(tab) {
        var tabs = ['companies','users','audit','settings','channels','notification_logs','permissions','api'];
	    tabs.forEach(function(t) {
	        var div = document.getElementById(t);
	        var link = document.querySelector('#systemTab .nav-link[onclick*="'+t+'"]');
	        if (t === tab) {
	            div.style.display = 'block';
	            if (link) link.classList.add('active');
	        } else {
	            div.style.display = 'none';
	            if (link) link.classList.remove('active');
	        }
	    });
	}
	</script>
{% endblock %}
