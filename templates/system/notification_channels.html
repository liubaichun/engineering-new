{% extends "base.html" %}
{% block title %}通知渠道配置{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-speedometer me-2"></i>通知渠道配置</h4>
        <p class="text-muted mb-0" style="font-size:0.9rem;">配置飞书、企业微信、钉钉等通知渠道</p>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <span>已配置的通知渠道</span>
        <button class="btn btn-primary btn-sm float-end" onclick="showAddChannelModal()">
            <i class="bi bi-plus-lg me-1"></i>添加渠道
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>渠道名称</th>
                        <th>类型</th>
                        <th>Webhook地址</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th style="width:120px">操作</th>
                    </tr>
                </thead>
                <tbody id="channelTableBody">
                    <tr><td colspan="6" class="text-center text-muted py-4">暂无已配置的通知渠道</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="channelModalTitle"><i class="bi bi-speedometer me-2"></i>添加通知渠道</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="channelId">
                <div class="mb-3">
                    <label class="form-label">渠道名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="channelName" placeholder="如：飞书研发群通知">
                </div>
                <div class="mb-3">
                    <label class="form-label">渠道类型 <span class="text-danger">*</span></label>
                    <select class="form-select" id="channelType">
                        <option value="feishu">飞书</option>
                        <option value="wecom">企业微信</option>
                        <option value="dingtalk">钉钉</option>
                        <option value="email">邮件</option>
                        <option value="webhook">自定义Webhook</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Webhook地址 <span class="text-danger">*</span></label>
                    <input type="url" class="form-control" id="webhookUrl" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxx">
                    <div class="form-text">飞书/企微/钉钉的机器人Webhook地址</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Secret密钥（可选）</label>
                    <input type="text" class="form-control" id="channelSecret" placeholder="用于签名校验">
                </div>
                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <select class="form-select" id="channelStatus">
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">备注</label>
                    <textarea class="form-control" id="channelRemark" rows="2" placeholder="备注信息（可选）"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveChannel()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var channelModal;

document.addEventListener('DOMContentLoaded', function() {
    channelModal = new bootstrap.Modal(document.getElementById('channelModal'));
    loadChannels();
});

function getCsrfToken() {
    return document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='))?.split('=')[1] || '';
}

async function loadChannels() {
    const tbody = document.getElementById('channelTableBody');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary me-2"></span>加载中...</td></tr>';
    try {
        const resp = await fetch('/api/notifications/channels/', { credentials: 'include' });
        if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">加载失败 (' + resp.status + ')</td></tr>'; return; }
        const data = await resp.json();
        const channels = data.results || data || [];
        if (!channels.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无已配置的通知渠道</td></tr>';
            return;
        }
        tbody.innerHTML = channels.map(c => `
            <tr>
                <td>${c.name || '-'}</td>
                <td><span class="badge bg-secondary">${c.channel_type || '-'}</span></td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.webhook_url || '-'}</td>
                <td><span class="badge ${c.status === 'active' ? 'bg-success' : 'bg-secondary'}">${c.status === 'active' ? '启用' : '停用'}</span></td>
                <td>${c.created_at ? new Date(c.created_at).toLocaleDateString('zh-CN') : '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="testChannel(${c.id})" title="测试连通性"><i class="bi bi-lightning-charge"></i></button>
                    <button class="btn btn-sm btn-outline-secondary me-1" onclick="copyUrl('${c.webhook_url}')" title="复制Webhook地址"><i class="bi bi-clipboard"></i></button>
                    <button class="btn btn-sm btn-outline-secondary me-1" onclick="editChannel(${c.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteChannel(${c.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`).join('');
    } catch(e) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">加载失败：' + e.message + '</td></tr>';
    }
}

function showAddChannelModal() {
    document.getElementById('channelModalTitle').innerHTML = '<i class="bi bi-speedometer me-2"></i>添加通知渠道';
    document.getElementById('channelId').value = '';
    document.getElementById('channelName').value = '';
    document.getElementById('channelType').value = 'feishu';
    document.getElementById('webhookUrl').value = '';
    document.getElementById('channelSecret').value = '';
    document.getElementById('channelStatus').value = 'active';
    document.getElementById('channelRemark').value = '';
    channelModal.show();
}

async function editChannel(id) {
    try {
        const resp = await fetch('/api/notifications/channels/' + id + '/', { credentials: 'include' });
        if (!resp.ok) { alert('获取渠道信息失败'); return; }
        const c = await resp.json();
        document.getElementById('channelModalTitle').innerHTML = '<i class="bi bi-speedometer me-2"></i>编辑通知渠道';
        document.getElementById('channelId').value = c.id;
        document.getElementById('channelName').value = c.name || '';
        document.getElementById('channelType').value = c.channel_type || 'feishu';
        document.getElementById('webhookUrl').value = c.webhook_url || '';
        document.getElementById('channelSecret').value = c.secret || '';
        document.getElementById('channelStatus').value = c.status || 'active';
        document.getElementById('channelRemark').value = c.remark || '';
        channelModal.show();
    } catch(e) { alert('获取渠道信息失败：' + e.message); }
}

async function saveChannel() {
    const id = document.getElementById('channelId').value;
    const name = document.getElementById('channelName').value.trim();
    const channel_type = document.getElementById('channelType').value;
    const webhook_url = document.getElementById('webhookUrl').value.trim();
    const secret = document.getElementById('channelSecret').value.trim();
    const status = document.getElementById('channelStatus').value;
    const remark = document.getElementById('channelRemark').value.trim();
    if (!name || !webhook_url) { alert('请填写必填项'); return; }
    const method = id ? 'PUT' : 'POST';
    const url = id ? '/api/notifications/channels/' + id + '/' : '/api/notifications/channels/';
    try {
        const resp = await fetch(url, {
            method, credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
            body: JSON.stringify({ name, channel_type, webhook_url, secret, status, remark })
        });
        if (!resp.ok) { const d = await resp.json(); alert(d.detail || '保存失败'); return; }
        channelModal.hide();
        loadChannels();
    } catch(e) { alert('保存失败：' + e.message); }
}

async function deleteChannel(id) {
    if (!confirm('确定要删除该通知渠道吗？')) return;
    try {
        const resp = await fetch('/api/notifications/channels/' + id + '/', {
            method: 'DELETE', credentials: 'include',
            headers: { 'X-CSRFToken': getCsrfToken() }
        });
        if (!resp.ok && resp.status !== 204) { alert('删除失败'); return; }
        loadChannels();
    } catch(e) { alert('删除失败：' + e.message); }
}

async function testChannel(id) {
    const btn = event.currentTarget;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    try {
        const resp = await fetch('/api/notifications/channels/' + id + '/test_connection/', {
            method: 'POST', credentials: 'include',
            headers: { 'X-CSRFToken': getCsrfToken() }
        });
        const d = await resp.json();
        if (d.status === 'ok') {
            showToast('✅ ' + d.message, 'success');
        } else {
            showToast('❌ ' + d.message, 'danger');
        }
    } catch(e) {
        showToast('❌ 测试失败：' + e.message, 'danger');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-lightning-charge"></i>';
    }
}

function copyUrl(url) {
    if (!url) { showToast('Webhook地址为空', 'warning'); return; }
    navigator.clipboard.writeText(url).then(() => {
        showToast('✅ Webhook地址已复制', 'success');
    }).catch(() => {
        showToast('复制失败，请手动复制', 'warning');
    });
}

function showToast(message, type) {
    const container = document.getElementById('toastContainer') || createToastContainer();
    const id = 'toast-' + Date.now();
    const html = '<div id="' + id + '" class="toast align-items-center text-white bg-' + type + ' border-0" role="alert"><div class="d-flex"><div class="toast-body">' + message + '</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>';
    container.insertAdjacentHTML('beforeend', html);
    const toastEl = document.getElementById(id);
    const toast = new bootstrap.Toast(toastEl);
    toast.show();
    toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
}

function createToastContainer() {
    const div = document.createElement('div');
    div.id = 'toastContainer';
    div.className = 'toast-container position-fixed top-0 end-0 p-3';
    document.body.appendChild(div);
    return div;
}
</script>
{% endblock %}
