upstream green_web {
    server web:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # 静态文件
    location /static/ {
        alias /staticfiles/;
        expires 30d;
    }

    # 媒体文件
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # API 和页面
    location / {
        proxy_pass http://green_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
