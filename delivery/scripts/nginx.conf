# Nginx 反向代理配置 - GREEN 企业信息化管理系统
# 放置于: /etc/nginx/sites-available/green
# 启用: ln -s /etc/nginx/sites-available/green /etc/nginx/sites-enabled/green

upstream green_app {
    server 127.0.0.1:8001 fail_timeout=0;
}

server {
    listen 80;
    # listen [::]:80;  # IPv6 如需要
    server_name YOUR_SERVER_IP_OR_DOMAIN;

    # 上传文件大小限制
    client_max_body_size 100M;

    # 静态文件 - 由 Django collectstatic 收集到 staticfiles/
    location /static/ {
        alias /opt/green-engineering/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件（如上传的附件）
    location /media/ {
        alias /opt/green-engineering/media/;
        expires 7d;
    }

    # API 和页面 - 反向代理到 Gunicorn
    location / {
        proxy_pass http://green_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

