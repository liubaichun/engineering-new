# 企业信息化管理系统 GREEN — 买断版 Docker 容器编排 (v2.2.0)
#
# 使用方式：
#   1. 复制 .env.standalone.template 为 .env，修改其中的值
#   2. 运行: docker-compose -f docker-compose.standalone.yml up -d
#
# 停止：
#   docker-compose -f docker-compose.standalone.yml down
#
# 查看日志：
#   docker-compose -f docker-compose.standalone.yml logs -f web

services:
  db:
    image: postgres:16-alpine
    container_name: green_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-engineering_new}
      POSTGRES_USER: ${PG_USER:-engineering}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-engineering_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-engineering} -d ${PG_DATABASE:-engineering_new}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - green_net

  redis:
    image: redis:7-alpine
    container_name: green_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - green_net

  web:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: green_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PG_HOST=db
      - PG_PORT=5432
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/var/log
    ports:
      - "${APP_PORT:-8001}:8001"
    networks:
      - green_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/api/core/health/ || curl -sf http://localhost:8001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: green_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.standalone.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/staticfiles:ro
      - media_files:/media:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - green_net

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  green_net:
    driver: bridge
