[tool.ruff]
target-version = "py311"
line-length = 120

exclude = [
    "*/migrations/*",
    "*/tests/*",
    "venv/*",
    "staticfiles/*",
    "*/sites/*",
]

[tool.ruff.lint]
select = [
    "F",    # pyflakes - 未使用导入/变量（真正的bug风险）
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"*/tests/*" = ["F401", "F403", "N801", "N802"]
"config/settings/*.py" = ["F403", "F405"]
[tool.ruff.format]
quote-style = "single"
